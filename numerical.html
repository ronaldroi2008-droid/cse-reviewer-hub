<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSE Reviewer Hub – Numerical Ability</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #020617;
      --card: #020617;
      --card-alt: #0b1220;
      --border: #1f2937;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --text: #f9fafb;
      --muted: #9ca3af;
      --danger: #f97373;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app-shell {
      max-width: 1120px;
      margin: 24px auto 40px;
      padding: 20px;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.12), transparent),
        #020617;
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.75);
    }

    .app-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 8px;
    }

    .app-title {
      font-size: 1.7rem;
      margin: 0 0 4px;
      letter-spacing: 0.03em;
    }

    .app-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .badge {
      align-self: flex-start;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      border: 1px solid rgba(37, 99, 235, 0.4);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .back-link {
      display: inline-block;
      margin-bottom: 14px;
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      border-radius: 999px;
      padding: 4px 10px;
      border: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s, background 0.15s, transform 0.1s;
    }

    .back-link:hover {
      color: #bfdbfe;
      border-color: var(--border);
      background: rgba(15, 23, 42, 0.7);
      transform: translateY(-1px);
    }

    .mode-tabs {
      display: inline-flex;
      padding: 4px;
      border-radius: 999px;
      background: #020617;
      border: 1px solid var(--border);
      margin-bottom: 18px;
      gap: 4px;
    }

    .mode-tab {
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .mode-tab.active {
      background: linear-gradient(to right, #2563eb, #4f46e5);
      color: #f9fafb;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(220px, 260px) minmax(0, 1fr);
      gap: 18px;
      align-items: flex-start;
    }

    .topics-panel {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 14px 12px;
    }

    .panel-title {
      margin: 0 0 10px;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .topic-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 520px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .topic-pill {
      width: 100%;
      text-align: left;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #020617;
      padding: 7px 11px;
      font-size: 0.9rem;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    }

    .topic-pill span.label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topic-pill span.tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.8;
    }

    .topic-pill:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .topic-pill.active {
      background: linear-gradient(to right, #1d4ed8, #4f46e5);
      color: #f9fafb;
      border-color: transparent;
    }

    .content-panel {
      min-height: 420px;
    }

    .view {
      display: none;
    }

    .view--active {
      display: block;
    }

    .lesson-card,
    .quiz-card {
      background: var(--card-alt);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 16px 18px;
    }

    .lesson-title {
      margin: 0 0 6px;
      font-size: 1.2rem;
    }

    .lesson-intro {
      margin: 0 0 10px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .lesson-body section + section {
      margin-top: 10px;
    }

    .lesson-body h3 {
      margin: 0 0 4px;
      font-size: 0.95rem;
      color: #e5e7eb;
    }

    .lesson-body ul {
      margin: 0;
      padding-left: 18px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .lesson-body li + li {
      margin-top: 2px;
    }

    .tip-card {
      margin-top: 12px;
      border-radius: 13px;
      padding: 10px 12px;
      background: rgba(37, 99, 235, 0.08);
      border: 1px dashed rgba(37, 99, 235, 0.5);
      font-size: 0.88rem;
    }

    .tip-card h3 {
      margin: 0 0 4px;
      font-size: 0.9rem;
      color: #bfdbfe;
    }

    .tip-card ul {
      margin: 0;
      padding-left: 18px;
      color: #e5e7eb;
    }

    .tip-card li + li {
      margin-top: 2px;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      gap: 16px;
    }

    .quiz-meta {
      min-width: 0;
    }

    .quiz-meta .lesson-title {
      font-size: 1.05rem;
    }

    .quiz-meta .lesson-intro {
      font-size: 0.9rem;
    }

    .level-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .level-chip {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #020617;
      padding: 4px 9px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
    }

    .level-chip.active {
      background: var(--accent);
      color: #f9fafb;
      border-color: transparent;
      transform: translateY(-1px);
    }

    /* Items row (10 / 20 / 30 / 40 / 50) */
    .items-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .items-label {
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-size: 0.7rem;
      opacity: 0.8;
    }

    .items-chip {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #020617;
      padding: 3px 8px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
    }

    .items-chip.active {
      background: var(--accent);
      color: #f9fafb;
      border-color: transparent;
      transform: translateY(-1px);
    }

    .question-text {
      font-size: 1.02rem;
      margin-bottom: 10px;
    }

    .options-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option-button {
      width: 100%;
      text-align: left;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #020617;
      padding: 8px 12px;
      font-size: 0.95rem;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.08s;
    }

    .option-button:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .option-button.is-correct {
      border-color: rgba(34, 197, 94, 0.85);
      background: rgba(22, 163, 74, 0.12);
    }

    .option-button.is-incorrect {
      border-color: rgba(248, 113, 113, 0.85);
      background: rgba(248, 113, 113, 0.12);
    }

    .feedback {
      min-height: 24px;
      margin-top: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .feedback.feedback--correct {
      color: var(--success);
    }

    .feedback.feedback--incorrect {
      color: var(--danger);
    }

    .quiz-footer {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .primary-button {
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #f9fafb;
      padding: 7px 15px;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s, opacity 0.15s;
    }

    .primary-button.secondary {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }

    .primary-button:disabled {
      opacity: 0.5;
      cursor: default;
      transform: none;
    }

    .primary-button:not(:disabled):hover {
      transform: translateY(-1px);
      border-color: #60a5fa;
    }

    .progress-text {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* RESULT VIEW (Quiz Completed + Review Mistakes) */

    .hidden {
      display: none;
    }

    .quiz-result {
      margin-top: 16px;
      background: var(--card-alt);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 16px 18px;
    }

    .quiz-result-header {
      text-align: center;
      margin-bottom: 16px;
    }

    .quiz-result-header h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .result-score-main {
      font-size: 2rem;
      font-weight: 600;
      margin: 8px 0 2px;
    }

    .result-score-sub {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .quiz-result-actions {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .result-section-title {
      font-size: 0.95rem;
      margin: 0 0 8px;
      color: #e5e7eb;
    }

    .mistake-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .mistake-item {
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(127, 29, 29, 0.55);
      border: 1px solid rgba(248, 113, 113, 0.8);
    }

    .mistake-q-title {
      font-size: 0.9rem;
      margin: 0 0 4px;
      color: #f9fafb;
      font-weight: 600;
    }

    .mistake-q-text {
      font-size: 0.9rem;
      margin: 0 0 8px;
      color: var(--muted);
    }

    .mistake-answers {
      font-size: 0.86rem;
    }

    .mistake-answers p {
      margin: 0 0 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mistake-answers .wrong {
      color: var(--danger);
    }

    .mistake-answers .correct {
      color: var(--success);
    }

    .mistake-answers span.label {
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .layout {
        display: flex;
        flex-direction: column;
      }

      .app-shell {
        margin: 12px;
        padding: 14px;
      }

      .quiz-header {
        flex-direction: column;
        align-items: stretch;
      }

      .level-switcher {
        justify-content: flex-start;
      }

      .items-row {
        justify-content: flex-start;
      }
    }

    @media (max-width: 600px) {
      .app-title {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <h1 class="app-title">CSE Reviewer Hub</h1>
        <p class="app-subtitle">
          Numerical Ability ·
          <span id="subtitleTopic">Whole Numbers &amp; Operations</span>
        </p>
      </div>
      <span class="badge">Beta</span>
    </header>

    <a href="index.html" class="back-link">← Back to Home</a>

    <nav class="mode-tabs">
      <button class="mode-tab active" data-mode="study" type="button">Study Mode</button>
      <button class="mode-tab" data-mode="practice" type="button">Practice Quiz</button>
    </nav>

    <main class="layout">
      <aside class="topics-panel">
        <h2 class="panel-title">Numerical Topics</h2>
        <div id="topicList" class="topic-list">
          <!-- Filled by JS -->
        </div>
      </aside>

      <section class="content-panel">
        <!-- STUDY MODE -->
        <div id="studyView" class="view view--active">
          <div class="lesson-card">
            <h2 id="lessonTitle" class="lesson-title"></h2>
            <p id="lessonIntro" class="lesson-intro"></p>
            <div id="lessonBody" class="lesson-body"></div>
            <div id="tipCard" class="tip-card"></div>
          </div>
        </div>

        <!-- PRACTICE QUIZ -->
        <div id="practiceView" class="view">
          <div id="quizHeader" class="quiz-header">
            <div class="quiz-meta">
              <h2 id="quizTopicTitle" class="lesson-title"></h2>
              <p class="lesson-intro">
                Level:
                <span id="quizLevelLabel">Beginner</span>
              </p>
            </div>
            <div>
              <div class="level-switcher">
                <button class="level-chip active" data-level="beginner" type="button">Beginner</button>
                <button class="level-chip" data-level="intermediate" type="button">Intermediate</button>
                <button class="level-chip" data-level="advanced" type="button">Advanced</button>
                <button class="level-chip" data-level="expert" type="button">Expert</button>
              </div>
              <div class="items-row">
                <span class="items-label">Items:</span>
                <button type="button" class="items-chip active" data-count="10">10</button>
                <button type="button" class="items-chip" data-count="20">20</button>
                <button type="button" class="items-chip" data-count="30">30</button>
                <button type="button" class="items-chip" data-count="40">40</button>
                <button type="button" class="items-chip" data-count="50">50</button>
              </div>
            </div>
          </div>

          <div id="quizCard" class="quiz-card">
            <div id="questionText" class="question-text"></div>
            <ul id="optionsList" class="options-list"></ul>
            <div id="feedback" class="feedback"></div>
            <div class="quiz-footer">
              <div>
                <button id="prevBtn" class="primary-button secondary" type="button">Previous</button>
                <button id="nextBtn" class="primary-button" type="button">Next</button>
              </div>
              <span id="progressText" class="progress-text"></span>
            </div>
          </div>

          <!-- RESULT PANEL (Quiz Completed) -->
          <div id="resultPanel" class="quiz-result hidden">
            <div class="quiz-result-header">
              <h2>Quiz Completed!</h2>
              <div id="resultScoreMain" class="result-score-main">0 / 0</div>
              <div id="resultScoreText" class="result-score-sub">Score: 0%</div>
              <div class="quiz-result-actions">
                <button id="resultHomeBtn" type="button" class="primary-button secondary">Home</button>
                <button id="resultRetryBtn" type="button" class="primary-button">Retake Quiz</button>
              </div>
            </div>
            <div class="quiz-result-body">
              <h3 class="result-section-title">Review Mistakes</h3>
              <div id="mistakeList" class="mistake-list">
                <!-- Filled by JS -->
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- External numerical question files -->

  
<script src="questions/numerical_solving_math_expressions.js"></script>
<script src="questions/numerical_writing_math_expressions.js"></script>
<script src="questions/numerical_number_problems.js"></script>
<script src="questions/numerical_odd_even_consecutive.js"></script>
<script src="questions/numerical_age_problems.js"></script>
<script src="questions/numerical_work_problems.js"></script>
<script src="questions/numerical_speed_distance_time.js"></script>
<script src="questions/numerical_geometry_problems.js"></script>
<script src="questions/numerical_divisibility_rules.js"></script>
<script src="questions/numerical_multiples_factors.js"></script>
<script src="questions/numerical_simple_interest.js"></script>
<script src="questions/numerical_profit_loss_discount.js"></script>
<script src="questions/numerical_sequences_series.js"></script>


  <script>
    // ==========================================
    // 1. TOPIC + LESSON DATA (NUMERICAL)
    // ==========================================

    const NUMERICAL_TOPICS = [
      { id: "whole_numbers",            label: "Integers / Whole Numbers",                 tag: "Core" },
      { id: "pemdas",                   label: "PEMDAS (Order of Operations)",             tag: "Core" },
      { id: "decimals",                 label: "Decimals",                                 tag: "Core" },
      { id: "fractions", label: "Fractions & Operations on Fractions", tag: "Core" },
      { id: "percentages",              label: "Percent",                                  tag: "Core" },
      { id: "ratio_proportion",         label: "Ratio and Proportion",                     tag: "Core" },
      { id: "averages",                 label: "Averages",                                 tag: "Core" },
      { id: "data_interpretation",      label: "Tables, Charts, and Graphs",               tag: "Graphs" },
      { id: "algebra_linear",           label: "Linear Equations",                         tag: "Algebra" },
      { id: "solving_math_expressions", label: "Solving Mathematical Expressions",         tag: "Algebra" },
      { id: "writing_math_expressions", label: "Writing Mathematical Expressions",         tag: "Algebra" },
      { id: "number_problems",          label: "Number Problems",                          tag: "Word Problems" },
      { id: "odd_even_consecutive",     label: "Odd, Even and Consecutive Integers",       tag: "Word Problems" },
      { id: "age_problems",             label: "Age Problems",                             tag: "Word Problems" },
      { id: "work_problems",            label: "Work Problems",                            tag: "Word Problems" },
      { id: "speed_distance_time",      label: "Motion Problems (Speed, Distance & Time)", tag: "Word Problems" },
      { id: "geometry_problems",        label: "Geometry Problems",                        tag: "Word Problems" },
      { id: "divisibility_rules",       label: "Divisibility Rules",                       tag: "Numerical Ability" },
      { id: "multiples_factors",        label: "Multiples and Factors",                    tag: "Numerical Ability" },
      { id: "simple_interest",          label: "Simple Interest (Bonus Topic)",            tag: "Bonus" },
      { id: "profit_loss_discount",     label: "Profit, Loss & Discount (Bonus)",          tag: "Bonus" },
      { id: "sequences_series",         label: "Sequences & Series (Bonus)",               tag: "Bonus" }
    ];

    const LESSONS = {
      whole_numbers: {
        title: "Whole Numbers & Basic Operations",
        intro:
          "This topic reviews addition, subtraction, multiplication, and division of whole numbers, plus how to follow the order of operations correctly.",
        sections: [
          {
            heading: "Key ideas",
            bullets: [
              "Whole numbers are 0, 1, 2, 3, ... (no fractions or decimals). They are used for counting and basic calculations.",
              "Addition and subtraction are inverse operations. Multiplication is repeated addition, and division is repeated subtraction or sharing equally.",
              "Follow the order of operations (PEMDAS): Parentheses, Exponents, Multiplication and Division (from left to right), Addition and Subtraction (from left to right)."
            ]
          },
          {
            heading: "Worked example: 37 + 25",
            bullets: [
              "Step 1: Add the ones place → 7 + 5 = 12. Write 2 in the ones place and carry 1 to the tens place.",
              "Step 2: Add the tens place → 3 + 2 + carried 1 = 6.",
              "Final answer: 62. Quick estimate: 40 + 30 = 70, so an exact answer of 62 is reasonable (a bit less than the estimate)."
            ]
          },
          {
            heading: "Worked example: 120 − 45",
            bullets: [
              "Step 1: Line up the numbers by place value: 120 − 45.",
              "Step 2: Borrow from the tens if needed: 0 cannot subtract 5, so borrow 1 ten from 2 (becomes 1), making the ones 10.",
              "Step 3: 10 − 5 = 5 (ones), 1 − 4 cannot, so borrow 1 hundred from 1 (hundreds). Then 11 − 4 = 7 (tens), and remaining hundreds is 0.",
              "Answer: 120 − 45 = 75."
            ]
          }
        ],
        tips: [
          "Write multi-step operations vertically so digits line up in columns.",
          "Circle or underline the operation sign (+, −, ×, ÷) to avoid using the wrong operation.",
          "Do a quick mental estimate before and after solving to check if your answer is reasonable."
        ]
      },

      fractions_decimals: {
        title: "Fractions & Decimals",
        intro:
          "This topic covers how to compare, add, subtract, multiply, and divide fractions and decimals, and how to move between fraction and decimal forms.",
        sections: [
          {
            heading: "Key ideas",
            bullets: [
              "A fraction a/b represents a ÷ b. The denominator tells into how many equal parts the whole is divided.",
              "To compare fractions, use a common denominator or convert them to decimals.",
              "To convert a fraction to a decimal, divide the numerator by the denominator (for example, 3 ÷ 4 = 0.75).",
              "Decimals are another way of writing fractions with denominators 10, 100, 1000, and so on."
            ]
          },
          {
            heading: "Worked example: 3/4 + 2/3",
            bullets: [
              "Step 1: Find a common denominator. For 4 and 3, the least common multiple (LCM) is 12.",
              "Step 2: Convert: 3/4 = 9/12 and 2/3 = 8/12.",
              "Step 3: Add the numerators: 9/12 + 8/12 = 17/12.",
              "Step 4: Write as a mixed number: 17/12 = 1 5/12."
            ]
          },
          {
            heading: "Worked example: 0.6 + 0.35",
            bullets: [
              "Step 1: Align decimal points: 0.60 + 0.35.",
              "Step 2: Add the hundredths: 0.60 + 0.35 = 0.95.",
              "Check: 0.6 is a little more than one-half, 0.35 is about one-third; total near 1.0, so 0.95 makes sense."
            ]
          }

              "Step 3: Combine terms: 3x + 6 = 51.",
              "Step 4: Subtract 6: 3x = 45.",
              "Step 5: Divide by 3: x = 15.",
              "So the integers are 15, 17, and 19."
            ]
          }
        ],
        tips: [
          "Decide early whether the integers must be odd, even, or just any consecutive integers.",
          "Write them using x, x + 1, x + 2 or x, x + 2, x + 4 and form the equation from the word description.",
          "Verify the parity (odd/even) of your final answers to make sure they fit the problem."
        ]
      },

      age_problems: {
        title: "Age Problems",
        intro:
          "This topic covers word problems that compare ages now and in the past or future.",
        sections: [
          {
            heading: "Key ideas",
            bullets: [
              "Let a variable represent a person’s present age; express past or future ages by adding or subtracting years.",
              "Use phrases like 'twice as old', 'three years older', or 'five years younger' to build equations.",
              "Make a small table with 'Now', 'Past/Future' columns to organize information."
            ]
          },
          {
            heading: "Worked example: Ana is 4 years older than Ben. In 6 years, the sum of their ages will be 40. How old is Ben now?",
            bullets: [
              "Step 1: Let Ben’s present age be x. Then Ana’s present age is x + 4.",
              "Step 2: In 6 years, Ben will be x + 6 and Ana will be x + 4 + 6 = x + 10.",
              "Step 3: Their total ages in 6 years is 40 → (x + 6) + (x + 10) = 40.",
              "Step 4: Combine terms: 2x + 16 = 40.",
              "Step 5: Subtract 16: 2x = 24 → x = 12.",
              "So Ben is 12 years old now, and Ana is 16."
            ]
          },
          {
            heading: "Worked example: A father is now three times as old as his son. In 12 years, he will be twice as old as his son. Find their present ages.",
            bullets: [
              "Step 1: Let the son’s present age be x. Then the father’s present age is 3x.",
              "Step 2: In 12 years, the son will be x + 12 and the father will be 3x + 12.",
              "Step 3: In 12 years, father is twice the son’s age → 3x + 12 = 2(x + 12).",
              "Step 4: Expand the right side: 3x + 12 = 2x + 24.",
              "Step 5: Subtract 2x: x + 12 = 24 → x = 12.",
              "So the son is 12 years old now and the father is 36."
            ]
          }
        ],
        tips: [
          "Always base your variable on the present age unless the problem clearly uses a different time.",
          "Use a table (Person vs. Age now vs. Age later) to avoid mixing up ages.",
          "Check your solution by plugging the ages back into the story and seeing if all conditions are satisfied."
        ]
      },

      geometry_problems: {
        title: "Geometry Problems",
        intro:
          "This topic includes basic word problems involving perimeter, area, and sometimes simple volume.",
        sections: [
          {
            heading: "Key ideas",
            bullets: [
              "Perimeter is the distance around a figure; area is the amount of surface it covers.",
              "Common formulas: rectangle area = length × width; triangle area = 1/2 × base × height; circle area = πr² (if needed).",
              "Translate shape descriptions into algebra by labeling sides with variables and using formulas."
            ]
          },
          {
            heading: "Worked example: A rectangle has a length 5 m longer than its width. If the perimeter is 42 m, find its dimensions.",
            bullets: [
              "Step 1: Let width be x meters; length is x + 5 meters.",
              "Step 2: Perimeter of rectangle: P = 2(length + width) = 42.",
              "Step 3: Set up equation: 2[(x + 5) + x] = 42.",
              "Step 4: Simplify inside: (x + 5) + x = 2x + 5, so 2(2x + 5) = 42.",
              "Step 5: Multiply: 4x + 10 = 42.",
              "Step 6: Subtract 10: 4x = 32 → x = 8.",
              "So width = 8 m and length = 13 m."
            ]
          },
          {
            heading: "Worked example: A rectangular lot is 20 m long and 12 m wide. What is its area, and what is the cost to fence around it if fencing costs ₱150 per meter?",
            bullets: [
              "Step 1: Area: A = length × width = 20 × 12 = 240 m².",
              "Step 2: Perimeter: P = 2(length + width) = 2(20 + 12) = 2 × 32 = 64 m.",
              "Step 3: Cost of fencing: 64 m × ₱150 per meter = ₱9,600.",
              "So the area is 240 m² and the total fencing cost is ₱9,600."
            ]
          }
        ],
        tips: [
          "Draw a quick sketch and label given dimensions with variables or numbers.",
          "Write the relevant formula beside your sketch before substituting values.",
          "Watch the units (meters vs. centimeters, m² vs. m³) to avoid incorrect answers."
        ]
      },

      divisibility_rules: {
        title: "Divisibility Rules",
        intro:
          "This topic teaches quick tests to see whether a number is divisible by 2, 3, 5, 9, 10, and other common divisors without doing full division.",
        sections: [
          {
            heading: "Key ideas",
            bullets: [
              "A number is divisible by 2 if its last digit is 0, 2, 4, 6, or 8.",
              "A number is divisible by 5 if its last digit is 0 or 5.",
              "A number is divisible by 10 if its last digit is 0.",
              "A number is divisible by 3 if the sum of its digits is divisible by 3.",
              "A number is divisible by 9 if the sum of its digits is divisible by 9."
            ]
          },
          {
            heading: "Worked example: Check if 5,436 is divisible by 3 and by 9.",
            bullets: [
              "Step 1: Add its digits: 5 + 4 + 3 + 6 = 18.",
              "Step 2: Since 18 is divisible by 3, 5,436 is divisible by 3.",
              "Step 3: 18 is also divisible by 9 (18 ÷ 9 = 2), so 5,436 is divisible by 9 as well."
            ]
          },
          {
            heading: "Worked example: Which of the following numbers is divisible by both 2 and 5: 120, 135, 248, 375?",
            bullets: [
              "Step 1: A number divisible by both 2 and 5 must end in 0 (because it must be divisible by 10).",
              "Step 2: Among the choices, only 120 ends in 0.",
              "So 120 is divisible by both 2 and 5."
            ]
          }
        ],
        tips: [
          "Memorize the basic rules for 2, 3, 5, 9, and 10; they appear very often in tests.",
          "Use digit-sum rules (for 3 and 9) to quickly check large numbers.",
          "Divisibility rules are especially useful when simplifying fractions or checking factors."
        ]
      },

      multiples_factors: {
        title: "Multiples and Factors",
        intro:
          "This topic explains how to find factors and multiples of whole numbers, as well as common multiples and common factors.",
        sections: [
          {
            heading: "Key ideas",
            bullets: [
              "A factor of a number divides it exactly with no remainder.",
              "A multiple of a number is obtained by multiplying it by a whole number (e.g., multiples of 4 are 4, 8, 12, 16, …).",
              "The greatest common factor (GCF) is the largest factor that two numbers share.",
              "The least common multiple (LCM) is the smallest multiple that two numbers share."
            ]
          },
          {
            heading: "Worked example: List all factors of 18.",
            bullets: [
              "Step 1: Test small numbers: 1 × 18, 2 × 9, 3 × 6.",
              "Step 2: Collect the unique factors: 1, 2, 3, 6, 9, 18.",
              "So the factors of 18 are 1, 2, 3, 6, 9, and 18."
            ]
          },
          {
            heading: "Worked example: Find the LCM of 6 and 8.",
            bullets: [
              "Step 1: List multiples of 6: 6, 12, 18, 24, 30, 36, …",
              "Step 2: List multiples of 8: 8, 16, 24, 32, 40, …",
              "Step 3: The smallest common multiple appearing in both lists is 24.",
              "So LCM(6, 8) = 24."
            ]
          }
        ],
        tips: [
          "When listing factors, check pairs: if 2 is a factor of 18, then 18 ÷ 2 = 9 is also a factor.",
          "Use prime factorization for larger numbers to find GCF and LCM efficiently.",
          "GCF is useful for simplifying fractions; LCM is useful for adding and subtracting fractions with different denominators."
        ]
      }
    };



    // ==========================================
    // 2. QUESTION BANK – from external files
    // ==========================================
    window.NUMERICAL_QUESTION_BANK = window.NUMERICAL_QUESTION_BANK || {};
    const QUESTION_BANK = window.NUMERICAL_QUESTION_BANK;

    // ==========================================
    // 3. STATE + DOM REFERENCES
    // ==========================================

    let currentMode = "study";
    let currentTopicId = NUMERICAL_TOPICS[0].id;
    let currentLevel = "beginner";
    let currentIndex = 0;
    let currentItemCount = 10;

    let userAnswers = [];
    let quizFinished = false;

    const modeTabs        = document.querySelectorAll(".mode-tab");
    const topicListEl     = document.getElementById("topicList");
    const subtitleTopicEl = document.getElementById("subtitleTopic");

    const studyView    = document.getElementById("studyView");
    const practiceView = document.getElementById("practiceView");

    const lessonTitleEl = document.getElementById("lessonTitle");
    const lessonIntroEl = document.getElementById("lessonIntro");
    const lessonBodyEl  = document.getElementById("lessonBody");
    const tipCardEl     = document.getElementById("tipCard");

    const quizHeaderEl     = document.getElementById("quizHeader");
    const quizCardEl       = document.getElementById("quizCard");
    const quizTopicTitleEl = document.getElementById("quizTopicTitle");
    const quizLevelLabelEl = document.getElementById("quizLevelLabel");
    const questionTextEl   = document.getElementById("questionText");
    const optionsListEl    = document.getElementById("optionsList");
    const feedbackEl       = document.getElementById("feedback");
    const prevBtn          = document.getElementById("prevBtn");
    const nextBtn          = document.getElementById("nextBtn");
    const progressTextEl   = document.getElementById("progressText");
    const levelChips       = document.querySelectorAll(".level-chip");
    const itemChips        = document.querySelectorAll(".items-chip");

    const resultPanelEl    = document.getElementById("resultPanel");
    const resultScoreMain  = document.getElementById("resultScoreMain");
    const resultScoreText  = document.getElementById("resultScoreText");
    const mistakeListEl    = document.getElementById("mistakeList");
    const resultHomeBtn    = document.getElementById("resultHomeBtn");
    const resultRetryBtn   = document.getElementById("resultRetryBtn");

    // ==========================================
    // 4. HELPERS
    // ==========================================

    function capitalize(text) {
      if (!text) return "";
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function buildTopicsList() {
      topicListEl.innerHTML = "";
      NUMERICAL_TOPICS.forEach((topic) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "topic-pill";
        btn.dataset.topicId = topic.id;

        const labelSpan = document.createElement("span");
        labelSpan.className = "label";
        labelSpan.textContent = topic.label;

        const tagSpan = document.createElement("span");
        tagSpan.className = "tag";
        tagSpan.textContent = topic.tag || "Topic";

        btn.appendChild(labelSpan);
        btn.appendChild(tagSpan);

        btn.addEventListener("click", function () {
          selectTopic(topic.id);
        });

        topicListEl.appendChild(btn);
      });
    }

    function updateActiveTopicPill() {
      const pills = topicListEl.querySelectorAll(".topic-pill");
      pills.forEach((pill) => {
        const isActive = pill.dataset.topicId === currentTopicId;
        pill.classList.toggle("active", isActive);
      });

      const topic = NUMERICAL_TOPICS.find((t) => t.id === currentTopicId);
      if (topic && subtitleTopicEl) {
        subtitleTopicEl.textContent = topic.label;
      }
    }

    function renderTips(tips) {
      if (!tipCardEl) return;
      tipCardEl.innerHTML = "";

      const heading = document.createElement("h3");
      heading.textContent = "Quick exam tips";
      tipCardEl.appendChild(heading);

      const list = document.createElement("ul");
      (tips || []).forEach((tip) => {
        const li = document.createElement("li");
        li.textContent = tip;
        list.appendChild(li);
      });

      tipCardEl.appendChild(list);
    }

    function renderLesson() {
      const lesson = LESSONS[currentTopicId];

      const fallbackSection = {
        heading: "Overview",
        bullets: [
          "Review the basic definition and key properties of this topic.",
          "Study at least one fully worked example step by step.",
          "Practice moving from word problems to mathematical expressions."
        ]
      };

      const fallbackTips = [
        "Underline what the question is really asking before computing.",
        "Write your steps clearly so you can see and fix mistakes.",
        "Do a quick estimate to check if your final answer is reasonable."
      ];

      if (!lesson) {
        lessonTitleEl.textContent = "Lesson coming soon";
        lessonIntroEl.textContent =
          "We are still building the full lesson notes for this topic. For now, review your basic rules and try the Practice Quiz.";
        lessonBodyEl.innerHTML = "";

        const sectionEl = document.createElement("section");
        const h3 = document.createElement("h3");
        h3.textContent = fallbackSection.heading;
        sectionEl.appendChild(h3);

        const ul = document.createElement("ul");
        fallbackSection.bullets.forEach((b) => {
          const li = document.createElement("li");
          li.textContent = b;
          ul.appendChild(li);
        });
        sectionEl.appendChild(ul);

        lessonBodyEl.appendChild(sectionEl);
        renderTips(fallbackTips);
        return;
      }

      lessonTitleEl.textContent = lesson.title;
      lessonIntroEl.textContent = lesson.intro;
      lessonBodyEl.innerHTML = "";

      (lesson.sections || []).forEach((section) => {
        const sectionEl = document.createElement("section");
        const h3 = document.createElement("h3");
        h3.textContent = section.heading;
        sectionEl.appendChild(h3);

        const ul = document.createElement("ul");
        (section.bullets || []).forEach((b) => {
          const li = document.createElement("li");
          li.textContent = b;
          ul.appendChild(li);
        });

        sectionEl.appendChild(ul);
        lessonBodyEl.appendChild(sectionEl);
      });

      renderTips(lesson.tips || fallbackTips);
    }

    function getQuestionsForCurrent() {
      const topicQuestions = QUESTION_BANK[currentTopicId] || {};
      const levelQuestions = topicQuestions[currentLevel] || [];
      return levelQuestions.slice(0, currentItemCount);
    }

    function resetQuizState() {
      const questions = getQuestionsForCurrent();
      userAnswers = questions.map(() => null);
      currentIndex = 0;
      quizFinished = false;

      if (feedbackEl) {
        feedbackEl.textContent = "";
        feedbackEl.className = "feedback";
      }
      if (progressTextEl) {
        progressTextEl.textContent = "";
      }
      if (resultPanelEl) {
        resultPanelEl.classList.add("hidden");
      }
      if (quizHeaderEl) {
        quizHeaderEl.classList.remove("hidden");
      }
      if (quizCardEl) {
        quizCardEl.classList.remove("hidden");
      }
    }

    function renderQuiz() {
      const topic = NUMERICAL_TOPICS.find((t) => t.id === currentTopicId);
      quizTopicTitleEl.textContent = topic ? topic.label : "Numerical Ability";
      quizLevelLabelEl.textContent = capitalize(currentLevel);

      const questions = getQuestionsForCurrent();

      if (userAnswers.length !== questions.length) {
        userAnswers = questions.map(() => null);
      }

      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";

      if (!questions.length) {
        questionTextEl.textContent =
          "No practice questions are available yet for this topic and level. They will be added soon.";
        optionsListEl.innerHTML = "";
        progressTextEl.textContent = "0 / 0";
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        return;
      }

      if (currentIndex < 0) currentIndex = 0;
      if (currentIndex >= questions.length) currentIndex = questions.length - 1;

      const currentQ = questions[currentIndex];
      questionTextEl.textContent = currentQ.question;
      optionsListEl.innerHTML = "";

      currentQ.options.forEach((option) => {
        const li = document.createElement("li");
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "option-button";
        btn.textContent = option;

        btn.addEventListener("click", function () {
          handleAnswer(option);
        });

        li.appendChild(btn);
        optionsListEl.appendChild(li);
      });

      const stored = userAnswers[currentIndex];
      if (stored && stored.selected != null) {
        const buttons = optionsListEl.querySelectorAll(".option-button");
        buttons.forEach((btn) => {
          if (btn.textContent === currentQ.answer) {
            btn.classList.add("is-correct");
          }
          if (btn.textContent === stored.selected && !stored.correct) {
            btn.classList.add("is-incorrect");
          }
        });

        feedbackEl.textContent =
          (stored.correct ? "Correct! " : "Not quite. ") +
          (currentQ.explanation || "");
        feedbackEl.className =
          "feedback " + (stored.correct ? "feedback--correct" : "feedback--incorrect");
      }

      progressTextEl.textContent =
        "Question " + (currentIndex + 1) + " of " + questions.length;

      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = false;
      nextBtn.textContent =
        currentIndex === questions.length - 1 ? "Finish Quiz" : "Next";
    }

    function finishQuiz() {
      const questions = getQuestionsForCurrent();
      if (!questions.length) return;

      let correct = 0;
      let answered = 0;

      userAnswers.forEach((ans) => {
        if (ans && ans.selected != null) {
          answered++;
          if (ans.correct) correct++;
        }
      });

      const total = questions.length;
      const percent = total > 0 ? Math.round((correct / total) * 100) : 0;

      quizFinished = true;

      if (resultScoreMain) {
        resultScoreMain.textContent = correct + " / " + total;
      }
      if (resultScoreText) {
        resultScoreText.textContent = "Score: " + percent + "%";
      }

      if (mistakeListEl) {
        mistakeListEl.innerHTML = "";

        questions.forEach((q, index) => {
          const ans = userAnswers[index];
          const selected = ans ? ans.selected : null;
          const isCorrect = ans ? ans.correct : false;

          if (isCorrect) return; // only mistakes / blanks

          const item = document.createElement("div");
          item.className = "mistake-item";

          const title = document.createElement("p");
          title.className = "mistake-q-title";
          title.textContent = "Question " + (index + 1);
          item.appendChild(title);

          const qText = document.createElement("p");
          qText.className = "mistake-q-text";
          qText.textContent = q.question;
          item.appendChild(qText);

          const answersWrap = document.createElement("div");
          answersWrap.className = "mistake-answers";

          const userP = document.createElement("p");
          userP.classList.add("wrong");
          userP.innerHTML =
            "<span class='label'>✗ Your answer:</span> " +
            (selected !== null && selected !== undefined
              ? selected
              : "<em>Not answered</em>");
          answersWrap.appendChild(userP);

          const correctP = document.createElement("p");
          correctP.classList.add("correct");
          correctP.innerHTML =
            "<span class='label'>✓ Correct answer:</span> " + q.answer;
          answersWrap.appendChild(correctP);

          item.appendChild(answersWrap);
          mistakeListEl.appendChild(item);
        });

        if (!mistakeListEl.children.length) {
          const p = document.createElement("p");
          p.textContent = "Perfect score! No mistakes to review.";
          mistakeListEl.appendChild(p);
        }
      }

      if (quizHeaderEl) quizHeaderEl.classList.add("hidden");
      if (quizCardEl) quizCardEl.classList.add("hidden");
      if (resultPanelEl) resultPanelEl.classList.remove("hidden");
    }

    function handleAnswer(selectedOption) {
      const questions = getQuestionsForCurrent();
      if (!questions.length) return;
      if (quizFinished) return;

      const currentQ = questions[currentIndex];
      const isCorrect = selectedOption === currentQ.answer;

      userAnswers[currentIndex] = {
        selected: selectedOption,
        correct: isCorrect
      };

      const buttons = optionsListEl.querySelectorAll(".option-button");
      buttons.forEach((btn) => {
        btn.classList.remove("is-correct", "is-incorrect");
        if (btn.textContent === currentQ.answer) {
          btn.classList.add("is-correct");
        }
        if (btn.textContent === selectedOption && !isCorrect) {
          btn.classList.add("is-incorrect");
        }
      });

      if (isCorrect) {
        feedbackEl.textContent =
          "Correct! " + (currentQ.explanation || "");
        feedbackEl.className = "feedback feedback--correct";
      } else {
        feedbackEl.textContent =
          "Not quite. " + (currentQ.explanation || "");
        feedbackEl.className = "feedback feedback--incorrect";
      }
    }

    function switchMode(mode) {
      currentMode = mode;

      modeTabs.forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.mode === mode);
      });

      if (mode === "study") {
        studyView.classList.add("view--active");
        practiceView.classList.remove("view--active");
      } else {
        practiceView.classList.add("view--active");
        studyView.classList.remove("view--active");
      }
    }

    function selectTopic(topicId) {
      currentTopicId = topicId;
      resetQuizState();
      updateActiveTopicPill();
      renderLesson();
      renderQuiz();
    }

    function attachEvents() {
      modeTabs.forEach((tab) => {
        tab.addEventListener("click", function () {
          const mode = tab.dataset.mode;
          if (mode && mode !== currentMode) {
            switchMode(mode);
          }
        });
      });

      levelChips.forEach((chip) => {
        chip.addEventListener("click", function () {
          const level = chip.dataset.level;
          if (!level || level === currentLevel) return;
          currentLevel = level;
          resetQuizState();
          levelChips.forEach((c) => {
            c.classList.toggle("active", c.dataset.level === level);
          });
          renderQuiz();
        });
      });

      itemChips.forEach((chip) => {
        chip.addEventListener("click", function () {
          const count = parseInt(chip.dataset.count, 10);
          if (!count || count === currentItemCount) return;

          currentItemCount = count;
          resetQuizState();

          itemChips.forEach((c) => {
            c.classList.toggle("active", c === chip);
          });

          renderQuiz();
        });
      });

      prevBtn.addEventListener("click", function () {
        const questions = getQuestionsForCurrent();
        if (!questions.length) return;
        if (currentIndex > 0) {
          currentIndex -= 1;
          renderQuiz();
        }
      });

      nextBtn.addEventListener("click", function () {
        const questions = getQuestionsForCurrent();
        if (!questions.length) return;

        if (currentIndex < questions.length - 1) {
          currentIndex += 1;
          renderQuiz();
        } else {
          finishQuiz();
        }
      });

      if (resultRetryBtn) {
        resultRetryBtn.addEventListener("click", function () {
          resetQuizState();
          renderQuiz();
          switchMode("practice");
        });
      }

      if (resultHomeBtn) {
        resultHomeBtn.addEventListener("click", function () {
          window.location.href = "index.html";
        });
      }
    }

    function initNumericalPage() {
      buildTopicsList();
      attachEvents();
      selectTopic(currentTopicId);
      switchMode("study");
    }

    initNumericalPage();
  </script>
</body>
</html>
