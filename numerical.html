<script>
// ==========================================
// NUMERICAL PAGE LOGIC (STUDY + QUIZ)
// ==========================================

// 1. TOPIC + LESSON DATA (NUMERICAL)
const NUMERICAL_TOPICS = [
  { id: "whole_numbers",        label: "Whole Numbers & Operations",     tag: "Core" },
  { id: "fractions_decimals",   label: "Fractions & Decimals",           tag: "Core" },
  { id: "percentages",          label: "Percentages",                    tag: "Core" },
  { id: "ratio_proportion",     label: "Ratio & Proportion",             tag: "Core" },
  { id: "simple_interest",      label: "Simple Interest",                tag: "Word Problems" },
  { id: "profit_loss_discount", label: "Profit, Loss & Discount",        tag: "Word Problems" },
  { id: "speed_distance_time",  label: "Speed, Distance & Time",         tag: "Word Problems" },
  { id: "work_problems",        label: "Work Problems",                  tag: "Word Problems" },
  { id: "algebra_linear",       label: "Linear Equations",               tag: "Algebra" },
  { id: "sequences_series",     label: "Sequences & Series",             tag: "Algebra" },
  { id: "data_interpretation",  label: "Data Interpretation",            tag: "Graphs" }
];

const LESSONS = {
  whole_numbers: {
    title: "Whole Numbers & Basic Operations",
    intro:
      "This topic reviews addition, subtraction, multiplication, and division of whole numbers, plus how to follow the order of operations correctly.",
    sections: [
      {
        heading: "Key ideas",
        bullets: [
          "Whole numbers are 0, 1, 2, 3, ... (no fractions or decimals).",
          "Addition and subtraction are inverse operations. Multiplication and division are also inverse operations.",
          "Follow the order of operations (PEMDAS): Parentheses, Exponents, Multiplication and Division (left to right), Addition and Subtraction (left to right)."
        ]
      },
      {
        heading: "Worked example: 37 + 25",
        bullets: [
          "Step 1: Add the ones place → 7 + 5 = 12. Write 2, carry 1 to the tens place.",
          "Step 2: Add the tens place → 3 + 2 + carried 1 = 6.",
          "Final answer: 62. Always do a quick estimate to see if your answer is reasonable (about 40 + 30 = 70, so 62 is close and reasonable)."
        ]
      }
    ],
    tips: [
      "Write long operations vertically to avoid misalignment of digits.",
      "Underline operation signs (+, −, ×, ÷) so you will not accidentally perform the wrong operation.",
      "Estimate mentally before and after solving to check if your final answer makes sense."
    ]
  },
  fractions_decimals: {
    title: "Fractions & Decimals",
    intro:
      "This topic covers how to compare, add, subtract, multiply, and divide fractions and decimals, and how to move between fraction and decimal forms.",
    sections: [
      {
        heading: "Key ideas",
        bullets: [
          "A fraction a/b represents a ÷ b. The denominator tells how many equal parts the whole is divided into.",
          "To compare fractions, use a common denominator or convert to decimal form.",
          "To convert a fraction to a decimal, divide the numerator by the denominator."
        ]
      },
      {
        heading: "Worked example: 3/4 + 2/3",
        bullets: [
          "Find a common denominator. For 4 and 3, the LCM is 12.",
          "Convert: 3/4 = 9/12 and 2/3 = 8/12.",
          "Add: 9/12 + 8/12 = 17/12 = 1 5/12."
        ]
      }
    ],
    tips: [
      "When stuck, draw a simple diagram or number line to visualize the fraction.",
      "Always simplify your final fraction if possible.",
      "For decimals, align the decimal points vertically before adding or subtracting."
    ]
  }
  // Other topics: will use generic fallback
};

// 2. QUESTION BANK (NUMERICAL ONLY)
const QUESTION_BANK = {
  whole_numbers: {
    beginner: [
      {
        question: "What is 37 + 25?",
        options: ["52", "60", "62", "63"],
        answer: "62",
        explanation:
          "Add the ones first: 7 + 5 = 12 (write 2, carry 1). Then add tens: 3 + 2 + 1 = 6, so the sum is 62."
      },
      {
        question: "Which number is an even number?",
        options: ["39", "47", "52", "75"],
        answer: "52",
        explanation:
          "Even numbers end in 0, 2, 4, 6, or 8. Only 52 ends with 2."
      },
      {
        question: "Which symbol makes the statement true: 45 __ 39?",
        options: [">", "<", "=", "≤"],
        answer: ">",
        explanation:
          "45 is greater than 39, so we use the symbol >."
      }
    ],
    intermediate: [
      {
        question: "Evaluate: 15 × 4 + 8.",
        options: ["68", "72", "80", "92"],
        answer: "68",
        explanation:
          "Follow order of operations: multiply first → 15 × 4 = 60, then add 8 → 60 + 8 = 68."
      },
      {
        question: "What is 420 ÷ 7?",
        options: ["50", "55", "60", "65"],
        answer: "60",
        explanation:
          "You can use mental math: 42 ÷ 7 = 6, then add one zero → 60."
      }
    ],
    advanced: [
      {
        question: "Evaluate: 120 − 3 × 16.",
        options: ["72", "80", "120", "168"],
        answer: "72",
        explanation:
          "Multiply first: 3 × 16 = 48. Then subtract: 120 − 48 = 72."
      }
    ],
    expert: [
      {
        question: "A number is 9 more than twice 14. What is the number?",
        options: ["23", "28", "37", "41"],
        answer: "37",
        explanation:
          "Twice 14 is 28. Then add 9: 28 + 9 = 37."
      }
    ]
  },
  fractions_decimals: {
    beginner: [
      {
        question: "Which fraction is equal to 0.5?",
        options: ["1/2", "1/3", "2/3", "3/4"],
        answer: "1/2",
        explanation:
          "0.5 means half of 1, so it is equal to 1/2."
      },
      {
        question: "Which is greater: 3/4 or 2/3?",
        options: ["3/4", "2/3", "They are equal", "Cannot be compared"],
        answer: "3/4",
        explanation:
          "Convert to twelfths: 3/4 = 9/12 and 2/3 = 8/12, so 3/4 is greater."
      }
    ],
    intermediate: [
      {
        question: "What is 0.6 + 0.35?",
        options: ["0.95", "0.85", "0.75", "0.7"],
        answer: "0.95",
        explanation:
          "Align decimals: 0.60 + 0.35 = 0.95."
      }
    ],
    advanced: [
      {
        question: "Simplify: 18/24.",
        options: ["3/4", "2/3", "4/5", "5/6"],
        answer: "3/4",
        explanation:
          "Divide numerator and denominator by 6 → 18 ÷ 6 = 3 and 24 ÷ 6 = 4."
      }
    ],
    expert: [
      {
        question: "Convert 7/8 to a decimal.",
        options: ["0.7", "0.75", "0.8", "0.875"],
        answer: "0.875",
        explanation:
          "7 ÷ 8 = 0.875. This is a common fraction–decimal pair to memorize."
      }
    ]
  }
  // Other topics: if not defined, quiz will show 'No questions yet'.
};

// 3. STATE + DOM REFERENCES
let currentMode = "study";
let currentTopicId = NUMERICAL_TOPICS[0].id;
let currentLevel = "beginner";
let currentIndex = 0;

const modeTabs         = document.querySelectorAll(".mode-tab");
const topicListEl      = document.getElementById("topicList");
const subtitleTopicEl  = document.getElementById("subtitleTopic");

const studyView        = document.getElementById("studyView");
const practiceView     = document.getElementById("practiceView");

const lessonTitleEl    = document.getElementById("lessonTitle");
const lessonIntroEl    = document.getElementById("lessonIntro");
const lessonBodyEl     = document.getElementById("lessonBody");
const tipCardEl        = document.getElementById("tipCard");

const quizTopicTitleEl = document.getElementById("quizTopicTitle");
const quizLevelLabelEl = document.getElementById("quizLevelLabel");
const questionTextEl   = document.getElementById("questionText");
const optionsListEl    = document.getElementById("optionsList");
const feedbackEl       = document.getElementById("feedback");
const prevBtn          = document.getElementById("prevBtn");
const nextBtn          = document.getElementById("nextBtn");
const progressTextEl   = document.getElementById("progressText");
const levelChips       = document.querySelectorAll(".level-chip");

// 4. HELPERS
function capitalize(text) {
  if (!text) return "";
  return text.charAt(0).toUpperCase() + text.slice(1);
}

function buildTopicsList() {
  topicListEl.innerHTML = "";
  NUMERICAL_TOPICS.forEach((topic) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "topic-pill";
    btn.dataset.topicId = topic.id;

    const labelSpan = document.createElement("span");
    labelSpan.className = "label";
    labelSpan.textContent = topic.label;

    const tagSpan = document.createElement("span");
    tagSpan.className = "tag";
    tagSpan.textContent = topic.tag || "Topic";

    btn.appendChild(labelSpan);
    btn.appendChild(tagSpan);

    btn.addEventListener("click", function () {
      selectTopic(topic.id);
    });

    topicListEl.appendChild(btn);
  });
}

function updateActiveTopicPill() {
  const pills = topicListEl.querySelectorAll(".topic-pill");
  pills.forEach((pill) => {
    const isActive = pill.dataset.topicId === currentTopicId;
    pill.classList.toggle("active", isActive);
  });

  const topic = NUMERICAL_TOPICS.find((t) => t.id === currentTopicId);
  if (topic && subtitleTopicEl) {
    subtitleTopicEl.textContent = topic.label;
  }
}

function renderTips(tips) {
  if (!tipCardEl) return;
  tipCardEl.innerHTML = "";

  const heading = document.createElement("h3");
  heading.textContent = "Quick exam tips";
  tipCardEl.appendChild(heading);

  const list = document.createElement("ul");
  (tips || []).forEach((tip) => {
    const li = document.createElement("li");
    li.textContent = tip;
    list.appendChild(li);
  });

  tipCardEl.appendChild(list);
}

function renderLesson() {
  const lesson = LESSONS[currentTopicId];

  const fallbackSection = {
    heading: "Overview",
    bullets: [
      "Review the basic definition and key properties of this topic.",
      "Study at least one fully worked example step by step.",
      "Practice moving from word problems to mathematical expressions."
    ]
  };

  const fallbackTips = [
    "Underline what the question is really asking before computing.",
    "Write your steps clearly so you can see and fix mistakes.",
    "Do a quick estimate to check if your final answer is reasonable."
  ];

  if (!lesson) {
    lessonTitleEl.textContent = "Lesson coming soon";
    lessonIntroEl.textContent =
      "We are still building the full lesson notes for this topic. For now, review your basic rules and try the Practice Quiz.";
    lessonBodyEl.innerHTML = "";

    const sectionEl = document.createElement("section");
    const h3 = document.createElement("h3");
    h3.textContent = fallbackSection.heading;
    sectionEl.appendChild(h3);

    const ul = document.createElement("ul");
    fallbackSection.bullets.forEach((b) => {
      const li = document.createElement("li");
      li.textContent = b;
      ul.appendChild(li);
    });
    sectionEl.appendChild(ul);

    lessonBodyEl.appendChild(sectionEl);
    renderTips(fallbackTips);
    return;
  }

  lessonTitleEl.textContent = lesson.title;
  lessonIntroEl.textContent = lesson.intro;
  lessonBodyEl.innerHTML = "";

  (lesson.sections || []).forEach((section) => {
    const sectionEl = document.createElement("section");
    const h3 = document.createElement("h3");
    h3.textContent = section.heading;
    sectionEl.appendChild(h3);

    const ul = document.createElement("ul");
    (section.bullets || []).forEach((b) => {
      const li = document.createElement("li");
      li.textContent = b;
      ul.appendChild(li);
    });

    sectionEl.appendChild(ul);
    lessonBodyEl.appendChild(sectionEl);
  });

  renderTips(lesson.tips || fallbackTips);
}

function getQuestionsForCurrent() {
  const topicQuestions = QUESTION_BANK[currentTopicId] || {};
  const levelQuestions = topicQuestions[currentLevel] || [];
  return levelQuestions;
}

function renderQuiz() {
  const topic = NUMERICAL_TOPICS.find((t) => t.id === currentTopicId);
  quizTopicTitleEl.textContent = topic ? topic.label : "Numerical Ability";
  quizLevelLabelEl.textContent = capitalize(currentLevel);

  const questions = getQuestionsForCurrent();
  feedbackEl.textContent = "";
  feedbackEl.className = "feedback";

  if (!questions.length) {
    questionTextEl.textContent =
      "No practice questions are available yet for this topic and level. They will be added soon.";
    optionsListEl.innerHTML = "";
    progressTextEl.textContent = "0 / 0";
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  }

  if (currentIndex < 0) currentIndex = 0;
  if (currentIndex >= questions.length) currentIndex = questions.length - 1;

  const currentQ = questions[currentIndex];
  questionTextEl.textContent = currentQ.question;
  optionsListEl.innerHTML = "";

  currentQ.options.forEach((option) => {
    const li = document.createElement("li");
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "option-button";
    btn.textContent = option;

    btn.addEventListener("click", function () {
      handleAnswer(option);
    });

    li.appendChild(btn);
    optionsListEl.appendChild(li);
  });

  progressTextEl.textContent =
    "Question " + (currentIndex + 1) + " of " + questions.length;

  prevBtn.disabled = currentIndex === 0;
  nextBtn.disabled = currentIndex === questions.length - 1;
}

function handleAnswer(selectedOption) {
  const questions = getQuestionsForCurrent();
  if (!questions.length) return;
  const currentQ = questions[currentIndex];

  const isCorrect = selectedOption === currentQ.answer;

  const buttons = optionsListEl.querySelectorAll(".option-button");
  buttons.forEach((btn) => {
    btn.classList.remove("is-correct", "is-incorrect");
    if (btn.textContent === currentQ.answer) {
      btn.classList.add("is-correct");
    }
    if (btn.textContent === selectedOption && !isCorrect) {
      btn.classList.add("is-incorrect");
    }
  });

  if (isCorrect) {
    feedbackEl.textContent =
      "Correct! " + (currentQ.explanation || "");
    feedbackEl.className = "feedback feedback--correct";
  } else {
    feedbackEl.textContent =
      "Not quite. " + (currentQ.explanation || "");
    feedbackEl.className = "feedback feedback--incorrect";
  }
}

function switchMode(mode) {
  currentMode = mode;

  modeTabs.forEach((tab) => {
    tab.classList.toggle("active", tab.dataset.mode === mode);
  });

  if (mode === "study") {
    studyView.classList.add("view--active");
    practiceView.classList.remove("view--active");
  } else {
    practiceView.classList.add("view--active");
    studyView.classList.remove("view--active");
  }
}

function selectTopic(topicId) {
  currentTopicId = topicId;
  currentIndex = 0;
  updateActiveTopicPill();
  renderLesson();
  renderQuiz();
}

function attachEvents() {
  modeTabs.forEach((tab) => {
    tab.addEventListener("click", function () {
      const mode = tab.dataset.mode;
      if (mode && mode !== currentMode) {
        switchMode(mode);
      }
    });
  });

  levelChips.forEach((chip) => {
    chip.addEventListener("click", function () {
      const level = chip.dataset.level;
      if (!level || level === currentLevel) return;
      currentLevel = level;
      currentIndex = 0;
      levelChips.forEach((c) => {
        c.classList.toggle("active", c.dataset.level === level);
      });
      renderQuiz();
    });
  });

  prevBtn.addEventListener("click", function () {
    const questions = getQuestionsForCurrent();
    if (!questions.length) return;
    if (currentIndex > 0) {
      currentIndex -= 1;
      renderQuiz();
    }
  });

  nextBtn.addEventListener("click", function () {
    const questions = getQuestionsForCurrent();
    if (!questions.length) return;
    if (currentIndex < questions.length - 1) {
      currentIndex += 1;
      renderQuiz();
    }
  });
}

// 5. INIT (called once, after DOM is ready)
function initNumericalPage() {
  buildTopicsList();
  attachEvents();
  selectTopic(currentTopicId);  // sets lesson + quiz + titles
  switchMode("study");
}

initNumericalPage();
</script>
