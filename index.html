<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSE Reviewer Hub – Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #020617;       /* Dark Blue-Black */
      --card: #0f172a;     /* Slightly lighter dark */
      --border: #1e293b;   /* Border color */
      --accent: #6366f1;   /* Indigo Accent (Same as Verbal App) */
      --accent-hover: #4f46e5;
      --text: #f8fafc;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e1b4b 0%, #020617 60%, #000 100%);
      color: var(--text);
    }

    .shell {
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }

    .card {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      padding: 32px 24px;
      text-align: center;
    }

    .logo-area {
      margin-bottom: 20px;
    }

    .app-logo {
      font-size: 3rem;
      margin-bottom: 8px;
      display: block;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(to right, #818cf8, #c7d2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 32px;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .menu-grid {
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
    }

    .subject-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 16px 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .subject-btn:hover {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.1);
      transform: translateY(-2px);
    }

    .subject-btn .arrow {
      color: var(--muted);
      font-size: 1.2rem;
      transition: transform 0.2s;
    }

    .subject-btn:hover .arrow {
      transform: translateX(4px);
      color: var(--accent);
    }

    /* Optional: disabled style kung gusto mong gamitin sa future */
    .subject-btn.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(1);
    }

    .footer-note {
      margin-top: 24px;
      font-size: 0.8rem;
      color: #475569;
      border-top: 1px solid #1e293b;
      padding-top: 16px;
    }
  </style>
</head>
<body>

  <div class="shell">
    <div class="card">
      <div class="logo-area">
        <span class="app-logo">🦅</span>
        <h1>CSE Reviewer Hub</h1>
        <p class="subtitle">
          Welcome! Choose a subject below to start your review session.
        </p>
      </div>

      <div class="menu-grid">
        <a href="verbal.html" class="subject-btn">
          <span>📚 &nbsp; Verbal Ability</span>
          <span class="arrow">→</span>
        </a>

        <a href="numerical.html" class="subject-btn">
          <span>🧮 &nbsp; Numerical Reasoning</span>
          <span class="arrow">→</span>
        </a>

        <!-- ✅ New Analytical Ability Tab -->
        <a href="analytical.html" class="subject-btn">
          <span>🧠 &nbsp; Analytical Ability</span>
          <span class="arrow">→</span>
        </a>
      </div>

      <p class="footer-note">
        Tip: Review consistent grammar rules first before taking the practice quizzes.
      </p>
    </div>
  </div>

</body>
</html>
