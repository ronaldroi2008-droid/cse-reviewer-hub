<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSE Reviewer Hub – Verbal Ability</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --primary: #2563eb; --primary-dark: #1d4ed8;
      --accent: #3b82f6; --accent-soft: #dbeafe;
      --text: #1f2937; --text-light: #6b7280;
      --muted: #9ca3af; --background: #f9fafb;
      --card-bg: #ffffff; --border: #e5e7eb;
      --success: #10b981; --error: #ef4444; --warning: #f59e0b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: var(--text); background: var(--background); height: 100vh; overflow: hidden; }
    .app-shell { height: 100vh; display: flex; flex-direction: column; }
    .app-header { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .app-title { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .app-subtitle { color: var(--text-light); font-size: 0.9rem; }
    .badge { background: var(--warning); color: white; padding: 0.25rem 0.6rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
    .tabs-container { flex-shrink: 0; background: var(--card-bg); border-bottom: 1px solid var(--border); }
    .ability-tabs { display: flex; gap: 0.5rem; padding: 0.75rem 1.5rem; }
    .ability-tab { padding: 0.4rem 1rem; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 0.9rem; }
    .ability-tab.active { background: var(--accent-soft); color: var(--primary-dark); border-color: var(--accent); font-weight: 500; }
    .mode-tabs { display: flex; padding: 0 1.5rem; gap: 1.5rem; }
    .mode-tab { padding: 0.75rem 0; background: transparent; border: none; border-bottom: 3px solid transparent; color: var(--text-light); cursor: pointer; font-weight: 500; }
    .mode-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .app-main { flex: 1; padding: 1.5rem; overflow-y: hidden; }
    .mode-section { display: none; height: 100%; }
    .mode-section.active { display: block; }
    .layout { display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; height: 100%; max-width: 1200px; margin: 0 auto; }
    .sidebar { background: var(--card-bg); border: 1px solid var(--border); border-radius: 0.5rem; display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 1rem; border-bottom: 1px solid var(--border); font-weight: 600; background: #f8fafc; }
    .topic-list { list-style: none; overflow-y: auto; flex: 1; }
    .topic-item { padding: 0.75rem 1rem; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; font-size: 0.95rem; }
    .topic-item:hover { background: var(--accent-soft); }
    .topic-item.active { background: var(--accent-soft); color: var(--primary); border-left: 4px solid var(--primary); font-weight: 600; }
    .content-area { background: var(--card-bg); border: 1px solid var(--border); border-radius: 0.5rem; padding: 2rem; overflow-y: auto; }
    .field { margin-bottom: 1rem; display: flex; flex-direction: column; }
    .field label { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--text-light); }
    select, textarea { padding: 0.6rem; border: 1px solid var(--border); border-radius: 0.3rem; font-family: inherit; }
    .btn-primary { background: var(--primary); color: white; border: none; padding: 0.8rem; border-radius: 0.3rem; cursor: pointer; font-weight: 600; width: 100%; transition: 0.2s; }
    .btn-primary:hover { background: var(--primary-dark); }
    .quiz-header { display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 1rem; }
    .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 1.5rem; }
    .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.3s; }
    .quiz-question { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; white-space: pre-line; }
    .quiz-choices { display: flex; flex-direction: column; gap: 0.8rem; }
    .quiz-choice { padding: 1rem; border: 1px solid var(--border); border-radius: 0.5rem; cursor: pointer; text-align: left; background: white; transition: 0.2s; }
    .quiz-choice:hover { background: var(--accent-soft); border-color: var(--accent); }
    .quiz-choice.correct { background: #d1fae5; border-color: #10b981; color: #065f46; }
    .quiz-choice.incorrect { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
    .quiz-explanation { margin-top: 1.5rem; padding: 1rem; background: #eff6ff; border-left: 4px solid var(--primary); border-radius: 4px; font-size: 0.95rem; }
    .btn-next { margin-top: 1.5rem; background: white; border: 1px solid var(--primary); color: var(--primary); padding: 0.8rem 1.5rem; border-radius: 0.3rem; cursor: pointer; font-weight: 600; float: right; }
    .btn-next:hover { background: var(--accent-soft); }
    .hide { display: none; }
    @media(max-width: 768px) { .layout { grid-template-columns: 1fr; } .sidebar { height: 200px; } }
  </style>
</head>
<body>

  <div class="app-shell">
    <header class="app-header">
      <div>
        <h1 class="app-title">CSE Reviewer Hub</h1>
        <p class="app-subtitle">Verbal Ability Reviewer</p>
      </div>
      <span class="badge">Beta v1.0</span>
    </header>

    <div class="tabs-container">
      <nav class="ability-tabs">
        <button class="ability-tab active">Verbal Ability</button>
        <button class="ability-tab">Numerical Ability</button>
      </nav>
      <nav class="mode-tabs">
        <button class="mode-tab active" data-target="study">Review Topics</button>
        <button class="mode-tab" data-target="practice">Practice Quiz</button>
      </nav>
    </div>

    <main class="app-main">
      <section id="study" class="mode-section active">
        <div class="layout">
          <aside class="sidebar">
            <div class="sidebar-header">Topics</div>
            <ul class="topic-list" id="topicList"></ul>
          </aside>
          <div class="content-area" id="lessonContent">
            <h2>Select a Topic</h2>
            <p>Choose a topic from the sidebar to view review notes.</p>
          </div>
        </div>
      </section>

      <section id="practice" class="mode-section">
        <div class="layout">
          <aside class="sidebar" style="height: fit-content; padding: 1rem;">
            <div class="field">
              <label>Topic</label>
              <select id="quizTopic"></select>
            </div>
            <div class="field">
              <label>Level</label>
              <select id="quizLevel">
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
                <option value="super">Super / Expert</option>
                <option value="all">All Levels (Mix)</option>
              </select>
            </div>
            <div class="field">
              <label>Items</label>
              <select id="quizCount">
                <option value="10">10 Items</option>
                <option value="20">20 Items</option>
                <option value="30">30 Items</option>
                <option value="50">50 Items</option>
              </select>
            </div>
            <button class="btn-primary" id="startQuiz">Start Quiz</button>
          </aside>

          <div class="content-area">
            <div id="quizIntro">
              <h2>Ready to Practice?</h2>
              <p>Select your settings on the left and click "Start Quiz".</p>
              <div id="quizResults" class="hide"></div>
            </div>

            <div id="quizActive" class="hide">
              <div class="quiz-header">
                <span id="qProgress">Question 1/10</span>
                <span id="qScore">Score: 0</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" id="qBar"></div></div>
              
              <div class="quiz-question" id="qText"></div>
              <div class="quiz-choices" id="qChoices"></div>
              
              <div class="quiz-explanation hide" id="qExplain"></div>
              <button class="btn-next hide" id="nextBtn">Next Question</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="questions_nouns.js"></script>
  <script src="questions_gender.js"></script>
  <script src="grammatical_number_questions.js"></script>
  <script src="questions_verbs.js"></script>
  <script src="questions_adjectives.js"></script>
  <script src="questions_adverbs.js"></script>
  <script src="questions_pronouns.js"></script>
  <script src="questions_prepositions.js"></script>
  <script src="questions_conjunctions.js"></script>
  <script src="questions_interjections.js"></script>
  <script src="questions_articles.js"></script>
  <script src="subject_verb_agreement.js"></script>
  <script src="sentence_construction.js"></script>
  <script src="sentence_structure.js"></script>
  <script src="error_identification.js"></script>
  <script src="questions_affixes.js"></script>
  <script src="questions_punctuations.js"></script>
  <script src="questions_synonyms.js"></script>
  <script src="questions_antonyms.js"></script>
  <script src="questions_analogy.js"></script>
  <script src="words_often_confused.js"></script>
  <script src="paragraph_organization_questions.js"></script>
  <script src="reading_comprehension.js"></script>

  <script src="verbal.js"></script>
  <script src="app.js"></script>

</body>
</html>
