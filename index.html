<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSE Reviewer Hub – Verbal Ability</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --primary: #2563eb; --primary-dark: #1d4ed8;
      --accent: #3b82f6; --accent-soft: #dbeafe;
      --text: #1f2937; --text-light: #6b7280;
      --muted: #9ca3af; --background: #f9fafb;
      --card-bg: #ffffff; --border: #e5e7eb;
      --success: #10b981; --error: #ef4444; --warning: #f59e0b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: var(--text); background: var(--background); height: 100vh; overflow: hidden; }
    
    /* LAYOUT */
    .app-shell { height: 100vh; display: flex; flex-direction: column; }
    .app-header { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .app-title { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .app-subtitle { color: var(--text-light); font-size: 0.9rem; }
    .badge { background: var(--warning); color: white; padding: 0.25rem 0.6rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }

    /* TABS */
    .tabs-container { flex-shrink: 0; background: var(--card-bg); border-bottom: 1px solid var(--border); }
    .ability-tabs { display: flex; gap: 0.5rem; padding: 0.75rem 1.5rem; }
    .ability-tab { padding: 0.4rem 1rem; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 0.9rem; }
    .ability-tab.active { background: var(--accent-soft); color: var(--primary-dark); border-color: var(--accent); font-weight: 500; }
    
    .mode-tabs { display: flex; padding: 0 1.5rem; gap: 1.5rem; }
    .mode-tab { padding: 0.75rem 0; background: transparent; border: none; border-bottom: 3px solid transparent; color: var(--text-light); cursor: pointer; font-weight: 500; }
    .mode-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* MAIN CONTENT */
    .app-main { flex: 1; padding: 1.5rem; overflow-y: hidden; }
    .mode-section { display: none; height: 100%; }
    .mode-section.active { display: block; }
    
    .layout { display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; height: 100%; max-width: 1200px; margin: 0 auto; }
    
    /* SIDEBAR */
    .sidebar { background: var(--card-bg); border: 1px solid var(--border); border-radius: 0.5rem; display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 1rem; border-bottom: 1px solid var(--border); font-weight: 600; background: #f8fafc; }
    .topic-list { list-style: none; overflow-y: auto; flex: 1; }
    .topic-item { padding: 0.75rem 1rem; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; font-size: 0.95rem; }
    .topic-item:hover { background: var(--accent-soft); }
    .topic-item.active { background: var(--accent-soft); color: var(--primary); border-left: 4px solid var(--primary); font-weight: 600; }
    
    /* CONTENT AREA */
    .content-area { background: var(--card-bg); border: 1px solid var(--border); border-radius: 0.5rem; padding: 2rem; overflow-y: auto; }
    
    /* QUIZ STYLES */
    .field { margin-bottom: 1rem; display: flex; flex-direction: column; }
    .field label { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--text-light); }
    select, textarea { padding: 0.6rem; border: 1px solid var(--border); border-radius: 0.3rem; font-family: inherit; }
    .btn-primary { background: var(--primary); color: white; border: none; padding: 0.8rem; border-radius: 0.3rem; cursor: pointer; font-weight: 600; width: 100%; transition: 0.2s; }
    .btn-primary:hover { background: var(--primary-dark); }
    
    .quiz-header { display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 1rem; }
    .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 1.5rem; }
    .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.3s; }
    
    .quiz-question { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; white-space: pre-line; }
    .quiz-choices { display: flex; flex-direction: column; gap: 0.8rem; }
    .quiz-choice { padding: 1rem; border: 1px solid var(--border); border-radius: 0.5rem; cursor: pointer; text-align: left; background: white; transition: 0.2s; }
    .quiz-choice:hover { background: var(--accent-soft); border-color: var(--accent); }
    .quiz-choice.correct { background: #d1fae5; border-color: var(--success); color: #065f46; }
    .quiz-choice.incorrect { background: #fee2e2; border-color: var(--error); color: #991b1b; }
    
    .quiz-explanation { margin-top: 1.5rem; padding: 1rem; background: #eff6ff; border-left: 4px solid var(--primary); border-radius: 4px; font-size: 0.95rem; }
    .btn-next { margin-top: 1.5rem; background: white; border: 1px solid var(--primary); color: var(--primary); padding: 0.8rem 1.5rem; border-radius: 0.3rem; cursor: pointer; font-weight: 600; float: right; }
    .btn-next:hover { background: var(--accent-soft); }
    .hide { display: none; }

    @media(max-width: 768px) { .layout { grid-template-columns: 1fr; } .sidebar { height: 200px; } }
  </style>
</head>
<body>

  <div class="app-shell">
    <header class="app-header">
      <div>
        <h1 class="app-title">CSE Reviewer Hub</h1>
        <p class="app-subtitle">Verbal Ability Reviewer</p>
      </div>
      <span class="badge">Beta v1.0</span>
    </header>

    <div class="tabs-container">
      <nav class="ability-tabs">
        <button class="ability-tab active">Verbal Ability</button>
        <button class="ability-tab">Numerical Ability</button>
      </nav>
      <nav class="mode-tabs">
        <button class="mode-tab active" data-target="study">Review Topics</button>
        <button class="mode-tab" data-target="practice">Practice Quiz</button>
      </nav>
    </div>

    <main class="app-main">
      <section id="study" class="mode-section active">
        <div class="layout">
          <aside class="sidebar">
            <div class="sidebar-header">Topics</div>
            <ul class="topic-list" id="topicList"></ul>
          </aside>
          <div class="content-area" id="lessonContent">
            <h2>Select a Topic</h2>
            <p>Choose a topic from the sidebar to view review notes.</p>
          </div>
        </div>
      </section>

      <section id="practice" class="mode-section">
        <div class="layout">
          <aside class="sidebar" style="height: fit-content; padding: 1rem;">
            <div class="field">
              <label>Topic</label>
              <select id="quizTopic"></select>
            </div>
            <div class="field">
              <label>Level</label>
              <select id="quizLevel">
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
                <option value="super">Super / Expert</option>
                <option value="all">All Levels (Mix)</option>
              </select>
            </div>
            <div class="field">
              <label>Items</label>
              <select id="quizCount">
                <option value="10">10 Items</option>
                <option value="20">20 Items</option>
                <option value="30">30 Items</option>
                <option value="50">50 Items</option>
              </select>
            </div>
            <button class="btn-primary" id="startQuiz">Start Quiz</button>
          </aside>

          <div class="content-area">
            <div id="quizIntro">
              <h2>Ready to Practice?</h2>
              <p>Select your settings on the left and click "Start Quiz".</p>
              <div id="quizResults" class="hide"></div>
            </div>

            <div id="quizActive" class="hide">
              <div class="quiz-header">
                <span id="qProgress">Question 1/10</span>
                <span id="qTimer"></span>
              </div>
              <div class="progress-bar"><div class="progress-fill" id="qBar"></div></div>
              
              <div class="quiz-question" id="qText"></div>
              <div class="quiz-choices" id="qChoices"></div>
              
              <div class="quiz-explanation hide" id="qExplain"></div>
              <button class="btn-next hide" id="nextBtn">Next Question</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="questions_nouns.js"></script>
  <script src="questions_gender.js"></script>
  <script src="questions_verbs.js"></script>
  <script src="questions_adjectives.js"></script>
  <script src="questions_adverbs.js"></script>
  <script src="questions_pronouns.js"></script>
  <script src="questions_prepositions.js"></script>
  <script src="questions_conjunctions.js"></script>
  <script src="questions_interjections.js"></script>
  <script src="questions_articles.js"></script>
  <script src="questions_affixes.js"></script>
  <script src="questions_punctuations.js"></script>
  <script src="questions_synonyms.js"></script>
  <script src="questions_antonyms.js"></script>
  <script src="questions_analogy.js"></script>
  <script src="questions_tenses.js"></script> 
  
  <script src="grammatical_number_questions.js"></script>
  <script src="subject_verb_agreement.js"></script>
  <script src="sentence_construction.js"></script>
  <script src="sentence_structure.js"></script>
  <script src="error_identification.js"></script>
  <script src="words_often_confused.js"></script>
  <script src="paragraph_organization_questions.js"></script>
  <script src="reading_comprehension.js"></script>

  <script src="verbal.js"></script>

  <script>
    // FALLBACK: If verbal.js fails, define topics here
    const APP_TOPICS = typeof VERBAL_TOPICS !== 'undefined' ? VERBAL_TOPICS : [
        { id: 'nouns', label: 'Nouns' },
        { id: 'gender', label: 'Gender of Nouns' },
        { id: 'grammatical_number', label: 'Grammatical Number' },
        { id: 'pronouns', label: 'Pronouns' },
        { id: 'verbs', label: 'Verbs' },
        { id: 'tenses', label: 'Tenses' },
        { id: 'adjectives', label: 'Adjectives' },
        { id: 'adverbs', label: 'Adverbs' },
        { id: 'prepositions', label: 'Prepositions' },
        { id: 'conjunctions', label: 'Conjunctions' },
        { id: 'interjections', label: 'Interjections' },
        { id: 'articles', label: 'Articles' },
        { id: 'subject_verb_agreement', label: 'Subject-Verb Agreement' },
        { id: 'sentence_construction', label: 'Sentence Construction' },
        { id: 'sentence_structure', label: 'Sentence Structure' },
        { id: 'error_identification', label: 'Error Identification' },
        { id: 'affixes', label: 'Affixes' },
        { id: 'punctuations', label: 'Punctuations' },
        { id: 'synonyms', label: 'Synonyms' },
        { id: 'antonyms', label: 'Antonyms' },
        { id: 'analogy', label: 'Analogy' },
        { id: 'words_often_confused', label: 'Words Often Confused' },
        { id: 'paragraph_organization', label: 'Paragraph Organization' },
        { id: 'reading_comprehension', label: 'Reading Comprehension' }
    ];

    // --- HELPER: Get Variable from Window ---
    function getQuestionBank(id) {
        // Tries multiple naming conventions based on your files
        const attempts = [
            id.toUpperCase() + "_QUESTIONS", // NOUNS_QUESTIONS
            "QUESTIONS_" + id.toUpperCase(), // QUESTIONS_NOUNS
            id + "_QUESTIONS" // nouns_QUESTIONS (rare but possible)
        ];
        
        // Special mapping for files with unique names
        if(id === 'gender') return window.GENDER_NOUNS_QUESTIONS || window.GENDER_QUESTIONS;
        if(id === 'tenses') return window.TENSES_QUESTIONS || window.VERB_TENSES_QUESTIONS;
        
        for(let name of attempts) {
            if(window[name]) return window[name];
        }
        return null;
    }

    document.addEventListener("DOMContentLoaded", () => {
        const topicList = document.getElementById("topicList");
        const quizTopicSelect = document.getElementById("quizTopic");
        const lessonContent = document.getElementById("lessonContent");
        
        // Populate Sidebar & Dropdown
        APP_TOPICS.forEach((t, index) => {
            // Sidebar
            const li = document.createElement("li");
            li.className = "topic-item";
            li.textContent = t.label;
            li.onclick = () => loadLesson(t, li);
            topicList.appendChild(li);
            
            // Dropdown
            const opt = document.createElement("option");
            opt.value = t.id;
            opt.textContent = t.label;
            quizTopicSelect.appendChild(opt);
            
            // Default select first
            if(index === 0) loadLesson(t, li);
        });

        // Tab Switching
        document.querySelectorAll(".mode-tab").forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll(".mode-tab").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                document.querySelectorAll(".mode-section").forEach(s => s.classList.remove("active"));
                document.getElementById(btn.dataset.target).classList.add("active");
            }
        });
    });

    function loadLesson(topic, element) {
        document.querySelectorAll(".topic-item").forEach(i => i.classList.remove("active"));
        if(element) element.classList.add("active");
        
        // Use LESSONS data if available, otherwise generic
        const data = (typeof LESSONS !== 'undefined' && LESSONS[topic.id]) ? LESSONS[topic.id] : null;
        
        let html = `<h2>${topic.label}</h2>`;
        if(data) {
            html += `<p>${data.intro || ''}</p>`;
            if(data.keyPoints) {
                html += `<h3>Key Points</h3><ul>${data.keyPoints.map(k => `<li>${k}</li>`).join('')}</ul>`;
            }
        } else {
            html += `<p>Review content for this topic is loaded in the database. Please proceed to the Practice Quiz to test your knowledge.</p>`;
        }
        document.getElementById("lessonContent").innerHTML = html;
    }

    // --- QUIZ ENGINE ---
    let currentQuiz = { questions: [], index: 0, score: 0, answers: [] };

    document.getElementById("startQuiz").onclick = () => {
        const topicId = document.getElementById("quizTopic").value;
        const level = document.getElementById("quizLevel").value;
        const count = parseInt(document.getElementById("quizCount").value);
        
        const bank = getQuestionBank(topicId);
        
        if(!bank) {
            alert(`Error: Data for "${topicId}" not found. Check file links.`);
            return;
        }

        // Gather questions
        let pool = [];
        if (level === 'all') {
            // Combine all arrays found in the object
            Object.values(bank).forEach(arr => { if(Array.isArray(arr)) pool.push(...arr); });
        } else {
            // Handle "super" vs "expert" naming
            pool = bank[level] || (level === 'super' ? bank.expert : []) || [];
        }

        if (pool.length === 0) {
            alert("No questions found for this level.");
            return;
        }

        // Shuffle and Slice
        const questions = pool.sort(() => 0.5 - Math.random()).slice(0, count);
        
        // Setup Quiz State
        currentQuiz = { questions, index: 0, score: 0, answers: [] };
        
        document.getElementById("quizIntro").classList.add("hide");
        document.getElementById("quizActive").classList.remove("hide");
        renderQuestion();
    };

    function renderQuestion() {
        const qData = currentQuiz.questions[currentQuiz.index];
        const qNum = currentQuiz.index + 1;
        const total = currentQuiz.questions.length;
        
        // Normalize data (handle q vs question, options vs choices)
        const qText = qData.q || qData.question;
        const choices = qData.options || qData.choices;
        const correctVal = qData.a || qData.answer;
        const explain = qData.exp || qData.explanation;

        document.getElementById("qProgress").textContent = `Question ${qNum}/${total}`;
        document.getElementById("qBar").style.width = `${(qNum/total)*100}%`;
        document.getElementById("qText").textContent = qText;
        
        const choiceContainer = document.getElementById("qChoices");
        choiceContainer.innerHTML = "";
        document.getElementById("qExplain").classList.add("hide");
        document.getElementById("nextBtn").classList.add("hide");

        choices.forEach(choice => {
            const btn = document.createElement("div");
            btn.className = "quiz-choice";
            btn.textContent = choice;
            btn.onclick = () => submitAnswer(btn, choice, correctVal, explain, qText);
            choiceContainer.appendChild(btn);
        });
    }

    function submitAnswer(btn, selected, correct, explain, qText) {
        // Prevent multiple clicks
        if(document.getElementById("nextBtn").classList.contains("hide") === false) return;

        const isCorrect = selected === correct;
        if(isCorrect) {
            btn.classList.add("correct");
            currentQuiz.score++;
        } else {
            btn.classList.add("incorrect");
            // Highlight correct one
            Array.from(document.getElementById("qChoices").children).forEach(c => {
                if(c.textContent === correct) c.classList.add("correct");
            });
        }

        // Save result
        currentQuiz.answers.push({
            question: qText,
            user: selected,
            correct: correct,
            isCorrect: isCorrect,
            exp: explain
        });

        // Show explanation
        const expDiv = document.getElementById("qExplain");
        expDiv.textContent = explain || "No explanation provided.";
        expDiv.classList.remove("hide");
        document.getElementById("nextBtn").classList.remove("hide");
    }

    document.getElementById("nextBtn").onclick = () => {
        currentQuiz.index++;
        if(currentQuiz.index < currentQuiz.questions.length) {
            renderQuestion();
        } else {
            finishQuiz();
        }
    };

    function finishQuiz() {
        document.getElementById("quizActive").classList.add("hide");
        const intro = document.getElementById("quizIntro");
        const results = document.getElementById("quizResults");
        
        intro.classList.remove("hide");
        intro.querySelector("h2").textContent = "Quiz Complete!";
        intro.querySelector("p").textContent = `You scored ${currentQuiz.score} out of ${currentQuiz.questions.length}`;
        
        results.innerHTML = "<h3>Review</h3>";
        results.classList.remove("hide");
        
        currentQuiz.answers.forEach((ans, i) => {
            const div = document.createElement("div");
            div.className = "weakpoint-item";
            div.innerHTML = `
                <p><strong>${i+1}. ${ans.question}</strong></p>
                <p style="color: ${ans.isCorrect ? 'green' : 'red'}">You: ${ans.user}</p>
                ${!ans.isCorrect ? `<p style="color: green">Correct: ${ans.correct}</p>` : ''}
                <p><em>${ans.exp || ''}</em></p>
            `;
            results.appendChild(div);
        });
    }
  </script>
</body>
</html>
