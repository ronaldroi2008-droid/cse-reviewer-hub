<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSE Reviewer Hub – Numerical Ability</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* CSS code remains the same – reused layout/style from Verbal, pero naka-label na for Numerical */

    :root {
      --bg: #020617;
      --card: #020617;
      --card-alt: #0b1220;
      --border: #1f2937;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --text: #f9fafb;
      --muted: #9ca3af;
      --danger: #f97373;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app-shell {
      max-width: 1120px;
      margin: 24px auto 40px;
      padding: 20px;
      background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent),
                  radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.12), transparent),
                  #020617;
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.75);
    }

    .app-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .app-title {
      font-size: 1.7rem;
      margin: 0 0 4px;
      letter-spacing: 0.03em;
    }

    .app-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .badge {
      align-self: flex-start;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      border: 1px solid rgba(37, 99, 235, 0.4);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .mode-tabs {
      display: inline-flex;
      padding: 4px;
      border-radius: 999px;
      background: #020617;
      border: 1px solid var(--border);
      margin-bottom: 18px;
      gap: 4px;
    }

    .mode-tab {
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .mode-tab.active {
      background: linear-gradient(to right, #2563eb, #4f46e5);
      color: #f9fafb;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(220px, 260px) minmax(0, 1fr);
      gap: 18px;
      align-items: flex-start;
    }

    .topics-panel {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 14px 12px;
    }

    .panel-title {
      margin: 0 0 10px;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .topic-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 520px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .topic-pill {
      width: 100%;
      text-align: left;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #020617;
      padding: 7px 11px;
      font-size: 0.9rem;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    }

    .topic-pill span.label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topic-pill span.tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.8;
    }

    .topic-pill:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .topic-pill.active {
      background: linear-gradient(to right, #1d4ed8, #4f46e5);
      color: #f9fafb;
      border-color: transparent;
    }

    .content-panel {
      min-height: 420px;
    }

    .view {
      display: none;
    }

    .view--active {
      display: block;
    }

    .lesson-card,
    .quiz-card {
      background: var(--card-alt);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 16px 18px;
    }

    .lesson-title {
      margin: 0 0 6px;
      font-size: 1.2rem;
    }

    .lesson-intro {
      margin: 0 0 10px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .lesson-body section + section {
      margin-top: 10px;
    }

    .lesson-body h3 {
      margin: 0 0 4px;
      font-size: 0.95rem;
      color: #e5e7eb;
    }

    .lesson-body ul {
      margin: 0;
      padding-left: 18px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .lesson-body li + li {
      margin-top: 2px;
    }

    .tip-card {
      margin-top: 12px;
      border-radius: 13px;
      padding: 10px 12px;
      background: rgba(37, 99, 235, 0.08);
      border: 1px dashed rgba(37, 99, 235, 0.5);
      font-size: 0.88rem;
    }

    .tip-card h3 {
      margin: 0 0 4px;
      font-size: 0.9rem;
      color: #bfdbfe;
    }

    .tip-card ul {
      margin: 0;
      padding-left: 18px;
      color: #e5e7eb;
    }

    .tip-card li + li {
      margin-top: 2px;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      gap: 16px;
    }

    .quiz-meta {
      min-width: 0;
    }

    .quiz-meta .lesson-title {
      font-size: 1.05rem;
    }

    .quiz-meta .lesson-intro {
      font-size: 0.9rem;
    }

    .level-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .level-chip {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #020617;
      padding: 4px 9px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
    }

    .level-chip.active {
      background: var(--accent);
      color: #f9fafb;
      border-color: transparent;
      transform: translateY(-1px);
    }

    .question-text {
      font-size: 1.02rem;
      margin-bottom: 10px;
    }

    .options-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option-button {
      width: 100%;
      text-align: left;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #020617;
      padding: 8px 12px;
      font-size: 0.95rem;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.08s;
    }

    .option-button:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .option-button.is-correct {
      border-color: rgba(34, 197, 94, 0.85);
      background: rgba(22, 163, 74, 0.12);
    }

    .option-button.is-incorrect {
      border-color: rgba(248, 113, 113, 0.85);
      background: rgba(248, 113, 113, 0.12);
    }

    .feedback {
      min-height: 24px;
      margin-top: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .feedback.feedback--correct {
      color: var(--success);
    }

    .feedback.feedback--incorrect {
      color: var(--danger);
    }

    .quiz-footer {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .primary-button {
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #f9fafb;
      padding: 7px 15px;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s, opacity 0.15s;
    }

    .primary-button.secondary {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }

    .primary-button:disabled {
      opacity: 0.5;
      cursor: default;
      transform: none;
    }

    .primary-button:not(:disabled):hover {
      transform: translateY(-1px);
      border-color: #60a5fa;
    }

    .progress-text {
      font-size: 0.85rem;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .layout {
        display: flex;
        flex-direction: column;
      }

      .app-shell {
        margin: 12px;
        padding: 14px;
      }

      .quiz-header {
        flex-direction: column;
        align-items: stretch;
      }

      .level-switcher {
        justify-content: flex-start;
      }
    }

    @media (max-width: 600px) {
      .app-title {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <h1 class="app-title">CSE Reviewer Hub</h1>
        <p class="app-subtitle">
          Numerical Ability ·
          <span id="subtitleTopic">Whole Numbers &amp; Operations</span>
        </p>
      </div>
      <span class="badge">Beta</span>
    </header>

    <nav class="mode-tabs">
      <button class="mode-tab active" data-mode="study" type="button">Study Mode</button>
      <button class="mode-tab" data-mode="practice" type="button">Practice Quiz</button>
    </nav>

    <main class="layout">
      <aside class="topics-panel">
        <h2 class="panel-title">Numerical Topics</h2>
        <div id="topicList" class="topic-list">
          <!-- Filled by JS -->
        </div>
      </aside>

      <section class="content-panel">
        <!-- STUDY MODE -->
        <div id="studyView" class="view view--active">
          <div class="lesson-card">
            <h2 id="lessonTitle" class="lesson-title"></h2>
            <p id="lessonIntro" class="lesson-intro"></p>
            <div id="lessonBody" class="lesson-body"></div>
            <div id="tipCard" class="tip-card"></div>
          </div>
        </div>

        <!-- PRACTICE QUIZ -->
        <div id="practiceView" class="view">
          <div class="quiz-header">
            <div class="quiz-meta">
              <h2 id="quizTopicTitle" class="lesson-title"></h2>
              <p class="lesson-intro">
                Level:
                <span id="quizLevelLabel">Beginner</span>
              </p>
            </div>
            <div class="level-switcher">
              <button class="level-chip active" data-level="beginner" type="button">Beginner</button>
              <button class="level-chip" data-level="intermediate" type="button">Intermediate</button>
              <button class="level-chip" data-level="advanced" type="button">Advanced</button>
              <button class="level-chip" data-level="expert" type="button">Expert</button>
            </div>
          </div>

          <div class="quiz-card">
            <div id="questionText" class="question-text">
              <!-- Filled by JS -->
            </div>
            <ul id="optionsList" class="options-list">
              <!-- Filled by JS -->
            </ul>
            <div id="feedback" class="feedback"></div>
            <div class="quiz-footer">
              <div>
                <button id="prevBtn" class="primary-button secondary" type="button">Previous</button>
                <button id="nextBtn" class="primary-button" type="button">Next</button>
              </div>
              <span id="progressText" class="progress-text"></span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    // ==========================================
    // 1. TOPIC + LESSON DATA (NUMERICAL)
    // ==========================================

    const NUMERICAL_TOPICS = [
      { id: "whole_numbers", label: "Whole Numbers & Operations", tag: "Core" },
      { id: "fractions_decimals", label: "Fractions & Decimals", tag: "Core" },
      { id: "percentages", label: "Percentages", tag: "Core" },
      { id: "ratio_proportion", label: "Ratio & Proportion", tag: "Core" },
      { id: "simple_interest", label: "Simple Interest", tag: "Word Problems" },
      { id: "profit_loss_discount", label: "Profit, Loss & Discount", tag: "Word Problems" },
      { id: "speed_distance_time", label: "Speed, Distance & Time", tag: "Word Problems" },
      { id: "work_problems", label: "Work Problems", tag: "Word Problems" },
      { id: "algebra_linear", label: "Linear Equations", tag: "Algebra" },
      { id: "sequences_series", label: "Sequences & Series", tag: "Algebra" },
      { id: "data_interpretation", label: "Data Interpretation", tag: "Graphs" }
    ];

    const LESSONS = {
      whole_numbers: {
        title: "Whole Numbers & Basic Operations",
        intro:
          "This topic reviews addition, subtraction, multiplication, and division of whole numbers, plus how to follow the order of operations correctly.",
        sections: [
          {
            heading: "Key ideas",
            bullets: [
              "Whole numbers are 0, 1, 2, 3, ... (no fractions or decimals).",
              "Addition and subtraction are inverse operations. Multiplication and division are also inverse operations.",
              "Follow the order of operations (PEMDAS): Parentheses, Exponents, Multiplication and Division (left to right), Addition and Subtraction (left to right)."
            ]
          },
          {
            heading: "Worked example: 37 + 25",
            bullets: [
              "Step 1: Add the ones place → 7 + 5 = 12. Write 2, carry 1 to the tens place.",
              "Step 2: Add the tens place → 3 + 2 + carried 1 = 6.",
              "Final answer: 62. Always do a quick estimate to see if your answer is reasonable (about 40 + 30 = 70, so 62 is close and reasonable)."
            ]
          }
        ],
        tips: [
          "Write long operations vertically to avoid misalignment of digits.",
          "Underline operation signs (+, −, ×, ÷) so you will not accidentally perform the wrong operation.",
          "Estimate mentally before and after solving to check if your final answer makes sense."
        ]
      },
      fractions_decimals: {
        title: "Fractions & Decimals",
        intro:
          "This topic covers how to compare, add, subtract, multiply, and divide fractions and decimals, and how to move between fraction and decimal forms.",
        sections: [
          {
            heading: "Key ideas",
            bullets: [
              "A fraction a/b represents a ÷ b. The denominator tells how many equal parts the whole is divided into.",
              "To compare fractions, use a common denominator or convert to decimal form.",
              "To convert a fraction to a decimal, divide the numerator by the denominator."
            ]
          },
          {
            heading: "Worked example: 3/4 + 2/3",
            bullets: [
              "Find a common denominator. For 4 and 3, the LCM is 12.",
              "Convert: 3/4 = 9/12 and 2/3 = 8/12.",
              "Add: 9/12 + 8/12 = 17/12 = 1 5/12."
            ]
          }
        ],
        tips: [
          "When stuck, draw a simple diagram or number line to visualize the fraction.",
          "Always simplify your final fraction if possible.",
          "For decimals, align the decimal points vertically before adding or subtracting."
        ]
      }
      // Other topics will use the generic fallback lesson.
    };

    // ==========================================
    // 2. SAMPLE QUESTION BANK (CAN BE EXTENDED)
    //    Structure supports 4 levels per topic.
    // ==========================================

    const QUESTION_BANK = {
      whole_numbers: {
        beginner: [
          {
            question: "What is 37 + 25?",
            options: ["52", "60", "62", "63"],
            answer: "62",
            explanation:
              "Add the ones first: 7 + 5 = 12 (write 2, carry 1). Then add tens: 3 + 2 + 1 = 6, so the sum is 62."
          },
          {
            question: "Which number is an even number?",
            options: ["39", "47", "52", "75"],
            answer: "52",
            explanation:
              "Even numbers end in 0, 2, 4, 6, or 8. Only 52 ends with 2."
          },
          {
            question: "Which symbol makes the statement true: 45 __ 39?",
            options: [">", "<", "=", "≤"],
            answer: ">",
            explanation:
              "45 is greater than 39, so we use the symbol >."
          }
        ],
        intermediate: [
          {
            question: "Evaluate: 15 × 4 + 8.",
            options: ["68", "72", "80", "92"],
            answer: "68",
            explanation:
              "Follow order of operations: multiply first → 15 × 4 = 60, then add 8 → 60 + 8 = 68."
          },
          {
            question: "What is 420 ÷ 7?",
            options: ["50", "55", "60", "65"],
            answer: "60",
            explanation:
              "You can use mental math: 42 ÷ 7 = 6, then add one zero → 60."
          }
        ],
        advanced: [
          {
            question: "Evaluate: 120 − 3 × 16.",
            options: ["72", "80", "120", "168"],
            answer: "72",
            explanation:
              "Multiply first: 3 × 16 = 48. Then subtract: 120 − 48 = 72."
          }
        ],
        expert: [
          {
            question: "A number is 9 more than twice 14. What is the number?",
            options: ["23", "28", "37", "41"],
            answer: "37",
            explanation:
              "Twice 14 is 28. Then add 9: 28 + 9 = 37."
          }
        ]
      },
      fractions_decimals: {
        beginner: [
          {
            question: "Which fraction is equal to 0.5?",
            options: ["1/2", "1/3", "2/3", "3/4"],
            answer: "1/2",
            explanation:
              "0.5 means half of 1, so it is equal to 1/2."
          },
          {
            question: "Which is greater: 3/4 or 2/3?",
            options: ["3/4", "2/3", "They are equal", "Cannot be compared"],
            answer: "3/4",
            explanation:
              "Convert to twelfths: 3/4 = 9/12 and 2/3 = 8/12, so 3/4 is greater."
          }
        ],
        intermediate: [
          {
            question: "What is 0.6 + 0.35?",
            options: ["0.95", "0.85", "0.75", "0.7"],
            answer: "0.95",
            explanation:
              "Align decimals: 0.60 + 0.35 = 0.95."
          }
        ],
        advanced: [
          {
            question: "Simplify: 18/24.",
            options: ["3/4", "2/3", "4/5", "5/6"],
            answer: "3/4",
            explanation:
              "Divide numerator and denominator by 6 → 18 ÷ 6 = 3 and 24 ÷ 6 = 4."
          }
        ],
        expert: [
          {
            question: "Convert 7/8 to a decimal.",
            options: ["0.7", "0.75", "0.8", "0.875"],
            answer: "0.875",
            explanation:
              "7 ÷ 8 = 0.875. This is a common fraction–decimal pair to memorize."
          }
        ]
      }
      // Other topics fallback to “no questions yet” message per level.
    };

    // ==========================================
    // 3. STATE + DOM REFERENCES
    // ==========================================

    let currentMode = "study";
    let currentTopicId = NUMERICAL_TOPICS[0].id;
    let currentLevel = "beginner";
    let currentIndex = 0;

    const modeTabs = document.querySelectorAll(".mode-tab");
    const topicListEl = document.getElementById("topicList");
    const subtitleTopicEl = document.getElementById("subtitleTopic");

    const studyView = document.getElementById("studyView");
    const practiceView = document.getElementById("practiceView");

    const lessonTitleEl = document.getElementById("lessonTitle");
    const lessonIntroEl = document.getElementById("lessonIntro");
    const lessonBodyEl = document.getElementById("lessonBody");
    const tipCardEl = document.getElementById("tipCard");

    const quizTopicTitleEl = document.getElementById("quizTopicTitle");
    const quizLevelLabelEl = document.getElementById("quizLevelLabel");
    const questionTextEl = document.getElementById("questionText");
    const optionsListEl = document.getElementById("optionsList");
    const feedbackEl = document.getElementById("feedback");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const progressTextEl = document.getElementById("progressText");
    const levelChips = document.querySelectorAll(".level-chip");

    // ==========================================
    // 4. HELPER FUNCTIONS
    // ==========================================

    function capitalize(text) {
      if (!text) return "";
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function buildTopicsList() {
      topicListEl.innerHTML = "";
      NUMERICAL_TOPICS.forEach((topic) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "topic-pill";
        btn.dataset.topicId = topic.id;

        const labelSpan = document.createElement("span");
        labelSpan.className = "label";
        labelSpan.textContent = topic.label;

        const tagSpan = document.createElement("span");
        tagSpan.className = "tag";
        tagSpan.textContent = topic.tag || "Topic";

        btn.appendChild(labelSpan);
        btn.appendChild(tagSpan);

        btn.addEventListener("click", function () {
          selectTopic(topic.id);
        });

        topicListEl.appendChild(btn);
      });
    }

    function updateActiveTopicPill() {
      const pills = topicListEl.querySelectorAll(".topic-pill");
      pills.forEach((pill) => {
        const isActive = pill.dataset.topicId === currentTopicId;
        pill.classList.toggle("active", isActive);
      });

      const topic = NUMERICAL_TOPICS.find((t) => t.id === currentTopicId);
      if (topic && subtitleTopicEl) {
        subtitleTopicEl.textContent = topic.label;
      }
    }

    function renderTips(tips) {
      if (!tipCardEl) return;
      tipCardEl.innerHTML = "";

      const heading = document.createElement("h3");
      heading.textContent = "Quick exam tips";
      tipCardEl.appendChild(heading);

      const list = document.createElement("ul");
      (tips || []).forEach((tip) => {
        const li = document.createElement("li");
        li.textContent = tip;
        list.appendChild(li);
      });

      tipCardEl.appendChild(list);
    }

    function renderLesson() {
      const lesson = LESSONS[currentTopicId];

      const fallbackSection = {
        heading: "Overview",
        bullets: [
          "Review the basic definition and key properties of this topic.",
          "Study at least one fully worked example step by step.",
          "Practice moving from word problems to mathematical expressions."
        ]
      };

      const fallbackTips = [
        "Underline what the question is really asking before computing.",
        "Write your steps clearly so you can see and fix mistakes.",
        "Do a quick estimate to check if your final answer is reasonable."
      ];

      if (!lesson) {
        lessonTitleEl.textContent = "Lesson coming soon";
        lessonIntroEl.textContent =
          "We are still building the full lesson notes for this topic. For now, review your basic rules and try the Practice Quiz.";
        lessonBodyEl.innerHTML = "";

        const sectionEl = document.createElement("section");
        const h3 = document.createElement("h3");
        h3.textContent = fallbackSection.heading;
        sectionEl.appendChild(h3);

        const ul = document.createElement("ul");
        fallbackSection.bullets.forEach((b) => {
          const li = document.createElement("li");
          li.textContent = b;
          ul.appendChild(li);
        });
        sectionEl.appendChild(ul);

        lessonBodyEl.appendChild(sectionEl);
        renderTips(fallbackTips);
        return;
      }

      lessonTitleEl.textContent = lesson.title;
      lessonIntroEl.textContent = lesson.intro;
      lessonBodyEl.innerHTML = "";

      (lesson.sections || []).forEach((section) => {
        const sectionEl = document.createElement("section");
        const h3 = document.createElement("h3");
        h3.textContent = section.heading;
        sectionEl.appendChild(h3);

        const ul = document.createElement("ul");
        (section.bullets || []).forEach((b) => {
          const li = document.createElement("li");
          li.textContent = b;
          ul.appendChild(li);
        });

        sectionEl.appendChild(ul);
        lessonBodyEl.appendChild(sectionEl);
      });

      renderTips(lesson.tips || fallbackTips);
    }

    function getQuestionsForCurrent() {
      const topicQuestions = QUESTION_BANK[currentTopicId] || {};
      const levelQuestions = topicQuestions[currentLevel] || [];
      return levelQuestions;
    }

    function renderQuiz() {
      const topic = NUMERICAL_TOPICS.find((t) => t.id === currentTopicId);
      quizTopicTitleEl.textContent = topic ? topic.label : "Numerical Ability";
      quizLevelLabelEl.textContent = capitalize(currentLevel);

      const questions = getQuestionsForCurrent();
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";

      if (!questions.length) {
        questionTextEl.textContent =
          "No practice questions are available yet for this topic and level. They will be added soon.";
        optionsListEl.innerHTML = "";
        progressTextEl.textContent = "0 / 0";
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        return;
      }

      if (currentIndex < 0) currentIndex = 0;
      if (currentIndex >= questions.length) currentIndex = questions.length - 1;

      const currentQ = questions[currentIndex];
      questionTextEl.textContent = currentQ.question;
      optionsListEl.innerHTML = "";

      currentQ.options.forEach((option) => {
        const li = document.createElement("li");
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "option-button";
        btn.textContent = option;

        btn.addEventListener("click", function () {
          handleAnswer(option);
        });

        li.appendChild(btn);
        optionsListEl.appendChild(li);
      });

      progressTextEl.textContent =
        "Question " + (currentIndex + 1) + " of " + questions.length;

      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === questions.length - 1;
    }

    function handleAnswer(selectedOption) {
      const questions = getQuestionsForCurrent();
      if (!questions.length) return;
      const currentQ = questions[currentIndex];

      const isCorrect = selectedOption === currentQ.answer;

      const buttons = optionsListEl.querySelectorAll(".option-button");
      buttons.forEach((btn) => {
        btn.classList.remove("is-correct", "is-incorrect");
        if (btn.textContent === currentQ.answer) {
          btn.classList.add("is-correct");
        }
        if (btn.textContent === selectedOption && !isCorrect) {
          btn.classList.add("is-incorrect");
        }
      });

      if (isCorrect) {
        feedbackEl.textContent =
          "Correct! " + (currentQ.explanation || "");
        feedbackEl.className = "feedback feedback--correct";
      } else {
        feedbackEl.textContent =
          "Not quite. " + (currentQ.explanation || "");
        feedbackEl.className = "feedback feedback--incorrect";
      }
    }

    function switchMode(mode) {
      currentMode = mode;

      modeTabs.forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.mode === mode);
      });

      if (mode === "study") {
        studyView.classList.add("view--active");
        practiceView.classList.remove("view--active");
      } else {
        practiceView.classList.add("view--active");
        studyView.classList.remove("view--active");
      }
    }

    function selectTopic(topicId) {
      currentTopicId = topicId;
      currentIndex = 0;
      updateActiveTopicPill();
      renderLesson();
      renderQuiz();
    }

    function attachEvents() {
      modeTabs.forEach((tab) => {
        tab.addEventListener("click", function () {
          const mode = tab.dataset.mode;
          if (mode && mode !== currentMode) {
            switchMode(mode);
          }
        });
      });

      levelChips.forEach((chip) => {
        chip.addEventListener("click", function () {
          const level = chip.dataset.level;
          if (!level || level === currentLevel) return;
          currentLevel = level;
          currentIndex = 0;
          levelChips.forEach((c) => {
            c.classList.toggle("active", c.dataset.level === level);
          });
          renderQuiz();
        });
      });

      prevBtn.addEventListener("click", function () {
        const questions = getQuestionsForCurrent();
        if (!questions.length) return;
        if (currentIndex > 0) {
          currentIndex -= 1;
          renderQuiz();
        }
      });

      nextBtn.addEventListener("click", function () {
        const questions = getQuestionsForCurrent();
        if (!questions.length) return;
        if (currentIndex < questions.length - 1) {
          currentIndex += 1;
          renderQuiz();
        }
      });
    }

    function init() {
      buildTopicsList();
      attachEvents();
      selectTopic(currentTopicId);
      switchMode("study");
    }
    
  <script src="questions_analogy.js"></script>
  
    // Initialize app
    init();
  </script>
</body>
</html>
