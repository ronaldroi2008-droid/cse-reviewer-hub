<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSE Reviewer Hub – Verbal Ability</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #020617;
      --card: #020617;
      --card-alt: #0b1220;
      --border: #1f2937;
      --accent: #6366f1;
      --accent-soft: rgba(99, 102, 241, 0.12);
      --text: #f9fafb;
      --muted: #9ca3af;
      --danger: #f97373;
      --success: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app-shell {
      max-width: 1120px;
      margin: 24px auto 40px;
      padding: 20px;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.16), transparent),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.14), transparent),
        #020617;
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.75);
    }

    .app-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .header-main {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-button {
      border: 1px solid var(--border);
      background: #020617;
      color: var(--muted);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.08s;
    }

    .back-button:hover {
      background: var(--accent-soft);
      color: #f9fafb;
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .app-title {
      font-size: 1.7rem;
      margin: 0 0 4px;
      letter-spacing: 0.03em;
    }

    .app-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .badge {
      align-self: flex-start;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      border: 1px solid rgba(99, 102, 241, 0.4);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .mode-tabs {
      display: inline-flex;
      padding: 4px;
      border-radius: 999px;
      background: #020617;
      border: 1px solid var(--border);
      margin-bottom: 18px;
      gap: 4px;
    }

    .mode-tab {
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .mode-tab.active {
      background: linear-gradient(to right, #6366f1, #4f46e5);
      color: #f9fafb;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(220px, 260px) minmax(0, 1fr);
      gap: 18px;
      align-items: flex-start;
    }

    .topics-panel {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 14px 12px;
    }

    .panel-title {
      margin: 0 0 10px;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .topic-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 520px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .topic-pill {
      width: 100%;
      text-align: left;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #020617;
      padding: 7px 11px;
      font-size: 0.9rem;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    }

    .topic-pill span.label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topic-pill span.tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.8;
    }

    .topic-pill:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .topic-pill.active {
      background: linear-gradient(to right, #4f46e5, #6366f1);
      color: #f9fafb;
      border-color: transparent;
    }

    .content-panel {
      min-height: 420px;
    }

    .view {
      display: none;
    }

    .view--active {
      display: block;
    }

    .lesson-card,
    .quiz-card {
      background: var(--card-alt);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 16px 18px;
    }

    .lesson-title {
      margin: 0 0 6px;
      font-size: 1.2rem;
    }

    .lesson-intro {
      margin: 0 0 10px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .lesson-body section + section {
      margin-top: 10px;
    }

    /* Extra styling for rich lesson HTML */
    .lesson-section + .lesson-section {
      margin-top: 16px;
      padding-top: 8px;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
    }

    .lesson-section h2 {
      margin: 0 0 6px;
      font-size: 1.05rem;
      color: #e5e7eb;
    }

    .lesson-section h3 {
      margin: 6px 0 4px;
      font-size: 0.95rem;
      color: #e5e7eb;
    }

    .lesson-section p {
      margin: 4px 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .lesson-section ul {
      margin: 4px 0 0;
      padding-left: 18px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .lesson-section li + li {
      margin-top: 2px;
    }

    .highlight-box {
      border-radius: 12px;
      border: 1px solid rgba(129, 140, 248, 0.6);
      background: rgba(79, 70, 229, 0.15);
      padding: 8px 10px;
      margin: 8px 0;
      font-size: 0.9rem;
    }

    .lesson-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 0.86rem;
    }

    .lesson-table th,
    .lesson-table td {
      border: 1px solid rgba(148, 163, 184, 0.4);
      padding: 6px 8px;
      text-align: left;
    }

    .lesson-table th {
      background: rgba(30, 64, 175, 0.7);
      color: #e5e7eb;
      font-weight: 600;
    }

    .lesson-table tr:nth-child(even) td {
      background: rgba(15, 23, 42, 0.8);
    }

    .check-list {
      list-style: disc;
      padding-left: 18px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .tip-card {
      margin-top: 12px;
      border-radius: 13px;
      padding: 10px 12px;
      background: rgba(99, 102, 241, 0.12);
      border: 1px dashed rgba(129, 140, 248, 0.8);
      font-size: 0.88rem;
    }

    .tip-card h3 {
      margin: 0 0 4px;
      font-size: 0.9rem;
      color: #c7d2fe;
    }

    .tip-card ul {
      margin: 0;
      padding-left: 18px;
      color: #e5e7eb;
    }

    .tip-card li + li {
      margin-top: 2px;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      gap: 16px;
    }

    .quiz-meta {
      min-width: 0;
    }

    .quiz-meta .lesson-title {
      font-size: 1.05rem;
    }

    .quiz-meta .lesson-intro {
      font-size: 0.9rem;
    }

    .level-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .level-chip {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #020617;
      padding: 4px 9px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
    }

    .level-chip.active {
      background: var(--accent);
      color: #f9fafb;
      border-color: transparent;
      transform: translateY(-1px);
    }

    /* Items count switcher */
    .count-switcher {
      margin-top: 6px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: flex-end;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .count-label {
      margin-right: 2px;
    }

    .count-chip {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #020617;
      padding: 3px 8px;
      font-size: 0.75rem;
      cursor: pointer;
      color: var(--muted);
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.08s;
    }

    .count-chip.active {
      background: var(--accent);
      color: #f9fafb;
      border-color: transparent;
      transform: translateY(-1px);
    }

    .question-text {
      font-size: 1.02rem;
      margin-bottom: 10px;
    }

    .options-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option-button {
      width: 100%;
      text-align: left;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #020617;
      padding: 8px 12px;
      font-size: 0.95rem;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.08s;
    }

    .option-button:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .option-button.is-correct {
      border-color: rgba(34, 197, 94, 0.85);
      background: rgba(22, 163, 74, 0.12);
    }

    .option-button.is-incorrect {
      border-color: rgba(248, 113, 113, 0.85);
      background: rgba(248, 113, 113, 0.12);
    }

    .feedback {
      min-height: 24px;
      margin-top: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .feedback.feedback--correct {
      color: var(--success);
    }

    .feedback.feedback--incorrect {
      color: var(--danger);
    }

    .quiz-footer {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .primary-button {
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #f9fafb;
      padding: 7px 15px;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s, opacity 0.15s;
    }

    .primary-button.secondary {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }

    .primary-button:disabled {
      opacity: 0.5;
      cursor: default;
      transform: none;
    }

    .primary-button:not(:disabled):hover {
      transform: translateY(-1px);
      border-color: #a5b4fc;
    }

    .progress-text {
      font-size: 0.85rem;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .layout {
        display: flex;
        flex-direction: column;
      }

      .app-shell {
        margin: 12px;
        padding: 14px;
      }

      .quiz-header {
        flex-direction: column;
        align-items: stretch;
      }

      .level-switcher {
        justify-content: flex-start;
      }

      .count-switcher {
        justify-content: flex-start;
      }
    }

    @media (max-width: 600px) {
      .app-title {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="header-main">
        <button class="back-button" type="button" onclick="window.location.href='index.html'">
          ← Back to Home
        </button>
        <div>
          <h1 class="app-title">CSE Reviewer Hub</h1>
          <p class="app-subtitle">
            Verbal Ability ·
            <span id="subtitleTopic">Analogy</span>
          </p>
        </div>
      </div>
      <span class="badge">Beta</span>
    </header>

    <nav class="mode-tabs">
      <button class="mode-tab active" data-mode="study" type="button">Study Mode</button>
      <button class="mode-tab" data-mode="practice" type="button">Practice Quiz</button>
    </nav>

    <main class="layout">
      <aside class="topics-panel">
        <h2 class="panel-title">Verbal Topics</h2>
        <div id="topicList" class="topic-list">
          <!-- Filled by JS -->
        </div>
      </aside>

      <section class="content-panel">
        <!-- STUDY MODE -->
        <div id="studyView" class="view view--active">
          <div class="lesson-card">
            <h2 id="lessonTitle" class="lesson-title"></h2>
            <p id="lessonIntro" class="lesson-intro"></p>
            <div id="lessonBody" class="lesson-body"></div>
            <div id="tipCard" class="tip-card"></div>
          </div>
        </div>

        <!-- PRACTICE QUIZ -->
        <div id="practiceView" class="view">
          <div class="quiz-header">
            <div class="quiz-meta">
              <h2 id="quizTopicTitle" class="lesson-title"></h2>
              <p class="lesson-intro">
                Level:
                <span id="quizLevelLabel">Beginner</span>
              </p>
            </div>
            <div>
              <div class="level-switcher">
                <button class="level-chip active" data-level="beginner" type="button">Beginner</button>
                <button class="level-chip" data-level="intermediate" type="button">Intermediate</button>
                <button class="level-chip" data-level="advanced" type="button">Advanced</button>
                <button class="level-chip" data-level="expert" type="button">Expert</button>
              </div>

              <div class="count-switcher">
                <span class="count-label">Items:</span>
                <button class="count-chip active" data-count="10" type="button">10</button>
                <button class="count-chip" data-count="20" type="button">20</button>
                <button class="count-chip" data-count="30" type="button">30</button>
                <button class="count-chip" data-count="40" type="button">40</button>
                <button class="count-chip" data-count="50" type="button">50</button>
              </div>
            </div>
          </div>

          <div class="quiz-card">
            <div id="questionText" class="question-text"></div>
            <ul id="optionsList" class="options-list"></ul>
            <div id="feedback" class="feedback"></div>
            <div class="quiz-footer">
              <div>
                <button id="prevBtn" class="primary-button secondary" type="button">Previous</button>
                <button id="nextBtn" class="primary-button" type="button">Next</button>
              </div>
              <span id="progressText" class="progress-text"></span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- VERBAL QUESTIONS FILES (lagay mo lahat ng .js mo dito) -->
  <script src="questions_analogy.js"></script>

  <script src="questions_synonyms.js"></script>
  <script src="questions_prepositions.js"></script>
  -->

  <script>
    // Make sure global question bank exists
    window.VERBAL_QUESTION_BANK = window.VERBAL_QUESTION_BANK || {};

    // ==========================================
    // 1. TOPICS + LESSON DATA
    // ==========================================

    const VERBAL_TOPICS = [
  { id: "nouns",                  label: "Nouns",                  tag: "Grammar" },
  { id: "gender",                 label: "Gender",                 tag: "Grammar" },
  { id: "grammatical_number",     label: "Grammatical Number",     tag: "Grammar" },
  { id: "verbs",                  label: "Verbs",                  tag: "Grammar" },
  { id: "tenses",                 label: "Tenses",                 tag: "Grammar" },
  { id: "pronouns",               label: "Pronouns",               tag: "Grammar" },
  { id: "adjectives",             label: "Adjectives",             tag: "Grammar" },
  { id: "adverbs",                label: "Adverbs",                tag: "Grammar" },
  { id: "prepositions",           label: "Prepositions",           tag: "Grammar" },
  { id: "conjunctions",           label: "Conjunctions",           tag: "Grammar" },
  { id: "interjections",          label: "Interjections",          tag: "Grammar" },
  { id: "articles",               label: "Articles",               tag: "Grammar" },
  { id: "subject_verb_agreement", label: "Subject–Verb Agreement", tag: "Grammar" },
  { id: "sentence_construction",  label: "Sentence Construction",  tag: "Writing" },
  { id: "sentence_structure",     label: "Sentence Structure",     tag: "Writing" },
  { id: "affixes",                label: "Affixes",                tag: "Vocabulary" },
  { id: "punctuation",            label: "Punctuation",            tag: "Writing" },
  { id: "words_often_confused",   label: "Words Often Confused",   tag: "Vocabulary" },
  { id: "error_identification",   label: "Error Identification",   tag: "Grammar" },
  { id: "synonyms",               label: "Synonyms",               tag: "Vocabulary" },
  { id: "antonyms",               label: "Antonyms",               tag: "Vocabulary" },
  { id: "analogy",                label: "Analogy",                tag: "Logic" },
  { id: "paragraph_organization", label: "Paragraph Organization", tag: "Comprehension" },
  { id: "reading_comprehension",  label: "Reading Comprehension",  tag: "Comprehension" }
];


    const LESSONS = {
      analogy: {
        title: "Analogy – Word Relationships and Logic",
        intro:
          "This lesson shows you how to spot the relationship between word pairs and use that logic to answer analogy questions correctly.",
        fullHtml: `
          <section class="lesson-section">
            <h2>1. What is an Analogy?</h2>
            <p>
              An analogy tests your ability to identify the <strong>relationship</strong> between two words
              and apply that same logic to another pair.
            </p>
            <div class="highlight-box">
              <p><strong>The Format:</strong></p>
              <p style="font-size: 1.2em; text-align: center;"><strong>A : B :: C : D</strong></p>
              <p>This is read as: <em>"A is to B as C is to D."</em></p>
            </div>
            <p><strong>Example:</strong></p>
            <p><em>Finger : Hand :: Leaf : Tree</em></p>
            <p>
              <strong>Logic:</strong> A finger is a <strong>part of</strong> a hand, just as a leaf is a
              <strong>part of</strong> a tree.
            </p>
          </section>

          <section class="lesson-section">
            <h2>2. The "Bridge Sentence" Technique</h2>
            <p>
              The best way to solve analogies is to create a specific sentence that connects the first two
              words. This sentence is your <strong>"bridge."</strong>
            </p>
            <p><strong>Step 1:</strong> Create a sentence for the first pair.</p>
            <ul>
              <li><strong>Pair:</strong> <em>Carpenter : Saw</em></li>
              <li><strong>Bridge Sentence:</strong> "A carpenter <strong>uses a</strong> saw to do his job."</li>
            </ul>
            <p><strong>Step 2:</strong> Test the choices with the SAME sentence.</p>
            <ul>
              <li>
                <strong>Choice A (Painter : Brush):</strong>
                "A painter <strong>uses a</strong> brush to do his job." (✅ Correct)
              </li>
              <li>
                <strong>Choice B (Lawyer : Briefcase):</strong>
                "A lawyer <strong>uses a</strong> briefcase to do his job?" (❌ Weak connection)
              </li>
            </ul>
          </section>

          <section class="lesson-section">
            <h2>3. Common Types of Relationships</h2>
            <p>In the Civil Service Exam, these are the most frequent patterns you will encounter:</p>

            <table class="lesson-table">
              <thead>
                <tr>
                  <th>Relationship</th>
                  <th>Example A : B</th>
                  <th>Bridge / Logic</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td><strong>Synonyms</strong></td>
                  <td><em>Big : Huge</em></td>
                  <td>Means the same thing (intensity usually increases).</td>
                </tr>
                <tr>
                  <td><strong>Antonyms</strong></td>
                  <td><em>Hot : Cold</em></td>
                  <td>Opposite meanings.</td>
                </tr>
                <tr>
                  <td><strong>Part to Whole</strong></td>
                  <td><em>Wheel : Car</em></td>
                  <td>A wheel is a <strong>part of</strong> a car.</td>
                </tr>
                <tr>
                  <td><strong>Worker & Tool</strong></td>
                  <td><em>Chef : Knife</em></td>
                  <td>A chef <strong>uses a</strong> knife.</td>
                </tr>
                <tr>
                  <td><strong>Worker & Product</strong></td>
                  <td><em>Baker : Bread</em></td>
                  <td>A baker <strong>makes</strong> bread.</td>
                </tr>
                <tr>
                  <td><strong>Animal & Young</strong></td>
                  <td><em>Cat : Kitten</em></td>
                  <td>A kitten is a <strong>baby</strong> cat.</td>
                </tr>
                <tr>
                  <td><strong>Animal & Sound</strong></td>
                  <td><em>Dog : Bark</em></td>
                  <td>A dog <strong>makes the sound</strong> bark.</td>
                </tr>
                <tr>
                  <td><strong>Cause & Effect</strong></td>
                  <td><em>Virus : Illness</em></td>
                  <td>A virus <strong>causes</strong> illness.</td>
                </tr>
                <tr>
                  <td><strong>Degree (Intensity)</strong></td>
                  <td><em>Warm : Hot</em></td>
                  <td>Hot is an <strong>extreme version</strong> of warm.</td>
                </tr>
                <tr>
                  <td><strong>Function</strong></td>
                  <td><em>Pen : Write</em></td>
                  <td>A pen is used <strong>to</strong> write.</td>
                </tr>
                <tr>
                  <td><strong>Geography</strong></td>
                  <td><em>Manila : Philippines</em></td>
                  <td>Manila is the <strong>capital of</strong> the Philippines.</td>
                </tr>
              </tbody>
            </table>
          </section>

          <section class="lesson-section">
            <h2>4. Advanced Tips & Traps</h2>

            <h3>4.1 Watch the Order!</h3>
            <p>The order of the words must be exactly the same in both pairs.</p>
            <p><strong>Question:</strong> <em>Shoe : Foot :: ________ : ________</em></p>
            <p><strong>Bridge:</strong> A shoe is worn on the foot. (Item → Body part)</p>
            <ul>
              <li>❌ <em>Hand : Glove</em> (Body part → Item. <strong>Wrong order!</strong>)</li>
              <li>✅ <em>Glove : Hand</em> (Item → Body part. <strong>Correct!</strong>)</li>
            </ul>

            <h3>4.2 Parts of Speech Must Match</h3>
            <p>
              If the first pair is <strong>Noun : Adjective</strong>, the answer must also be
              <strong>Noun : Adjective</strong>.
            </p>
            <ul>
              <li><strong>Example:</strong> <em>Fox : Sly</em> (Noun : Adjective)</li>
              <li>✅ <em>Ant : Industrious</em> (Noun : Adjective describing a characteristic)</li>
            </ul>

            <h3>4.3 "Nuance" or Degree</h3>
            <p>
              Sometimes two answers look correct. Choose the one with the closest "degree" or intensity.
            </p>
            <p><strong>Question:</strong> <em>Good : Excellent :: Bad : ________</em></p>
            <ul>
              <li>Choice A: <em>Naughty</em> (Too weak)</li>
              <li>Choice B: <em>Terrible</em> (Correct strength)</li>
            </ul>
          </section>

          <section class="lesson-section">
            <h2>5. Quick Practice Patterns</h2>
            <ul class="check-list">
              <li><strong>Odometer : Mileage</strong> :: Compass : Direction (Instrument : Measures)</li>
              <li><strong>Scissors : Cut</strong> :: Broom : Sweep (Tool : Action)</li>
              <li><strong>Lion : Pride</strong> :: Wolf : Pack (Animal : Group / Collective noun)</li>
              <li><strong>Fire : Smoke</strong> :: Rain : Flood (Cause : Effect)</li>
            </ul>
          </section>
        `,
        tips: [
          "Always build a short bridge sentence between the first pair before checking the options.",
          "Check if the direction/order of the words is the same in both pairs.",
          "If two answers both look okay, choose the one with the closest degree or intensity."
        ]
      },

      synonyms: {
        title: "Synonyms – Words with Similar Meanings",
        intro:
          "Synonym questions check your vocabulary and your ability to choose the closest meaning.",
        sections: [
          {
            heading: "Key reminders",
            bullets: [
              "A synonym is not always 100% the same, but it should be the closest in meaning.",
              "Look for the general attitude of the word: positive, negative, formal, casual.",
              "If two words are too strong or too weak compared to the original, eliminate them."
            ]
          }
        ],
        tips: [
          "Use context: imagine a sentence where the word is used.",
          "Eliminate answers that are opposite or totally different in tone.",
          "Read English daily (articles, stories) to see words in real use."
        ]
      }
    };

    // ==========================================
    // 2. STATE + DOM REFERENCES
    // ==========================================

    let currentMode = "study";
    let currentTopicId = VERBAL_TOPICS[0]?.id || "analogy";
    let currentLevel = "beginner";
    let currentIndex = 0;
    let currentQuestionLimit = 10; // default 10 items per quiz

    const modeTabs = document.querySelectorAll(".mode-tab");
    const topicListEl = document.getElementById("topicList");
    const subtitleTopicEl = document.getElementById("subtitleTopic");

    const studyView = document.getElementById("studyView");
    const practiceView = document.getElementById("practiceView");

    const lessonTitleEl = document.getElementById("lessonTitle");
    const lessonIntroEl = document.getElementById("lessonIntro");
    const lessonBodyEl = document.getElementById("lessonBody");
    const tipCardEl = document.getElementById("tipCard");

    const quizTopicTitleEl = document.getElementById("quizTopicTitle");
    const quizLevelLabelEl = document.getElementById("quizLevelLabel");
    const questionTextEl = document.getElementById("questionText");
    const optionsListEl = document.getElementById("optionsList");
    const feedbackEl = document.getElementById("feedback");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const progressTextEl = document.getElementById("progressText");
    const levelChips = document.querySelectorAll(".level-chip");
    const countChips = document.querySelectorAll(".count-chip");

    // ==========================================
    // 3. HELPERS
    // ==========================================

    function capitalize(text) {
      if (!text) return "";
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function buildTopicsList() {
      topicListEl.innerHTML = "";
      VERBAL_TOPICS.forEach((topic) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "topic-pill";
        btn.dataset.topicId = topic.id;

        const labelSpan = document.createElement("span");
        labelSpan.className = "label";
        labelSpan.textContent = topic.label;

        const tagSpan = document.createElement("span");
        tagSpan.className = "tag";
        tagSpan.textContent = topic.tag || "Topic";

        btn.appendChild(labelSpan);
        btn.appendChild(tagSpan);

        btn.addEventListener("click", function () {
          selectTopic(topic.id);
        });

        topicListEl.appendChild(btn);
      });
    }

    function updateActiveTopicPill() {
      const pills = topicListEl.querySelectorAll(".topic-pill");
      pills.forEach((pill) => {
        const isActive = pill.dataset.topicId === currentTopicId;
        pill.classList.toggle("active", isActive);
      });

      const topic = VERBAL_TOPICS.find((t) => t.id === currentTopicId);
      if (topic && subtitleTopicEl) {
        subtitleTopicEl.textContent = topic.label;
      }
    }

    function renderTips(tips) {
      if (!tipCardEl) return;
      tipCardEl.innerHTML = "";

      const heading = document.createElement("h3");
      heading.textContent = "Quick exam tips";
      tipCardEl.appendChild(heading);

      const list = document.createElement("ul");
      (tips || []).forEach((tip) => {
        const li = document.createElement("li");
        li.textContent = tip;
        list.appendChild(li);
      });

      tipCardEl.appendChild(list);
    }

    function renderLesson() {
      const fallbackSection = {
        heading: "Overview",
        bullets: [
          "Review the basic definition and key rules for this topic.",
          "Study one or two fully worked examples step by step.",
          "Practice converting questions into simpler sentences you can analyze."
        ]
      };

      const fallbackTips = [
        "Underline keywords in every question.",
        "Eliminate obviously wrong options before choosing.",
        "If unsure, choose the option that best matches the core idea."
      ];

      const lesson = LESSONS[currentTopicId];

      if (!lesson) {
        lessonTitleEl.textContent = "Lesson coming soon";
        lessonIntroEl.textContent =
          "We are still building the full lesson notes for this topic. For now, focus on practice questions and your own notes.";
        lessonBodyEl.innerHTML = "";

        const sectionEl = document.createElement("section");
        const h3 = document.createElement("h3");
        h3.textContent = fallbackSection.heading;
        sectionEl.appendChild(h3);

        const ul = document.createElement("ul");
        fallbackSection.bullets.forEach((b) => {
          const li = document.createElement("li");
          li.textContent = b;
          ul.appendChild(li);
        });
        sectionEl.appendChild(ul);

        lessonBodyEl.appendChild(sectionEl);
        renderTips(fallbackTips);
        return;
      }

      lessonTitleEl.textContent = lesson.title || "Lesson";
      lessonIntroEl.textContent = lesson.intro || "";
      lessonBodyEl.innerHTML = "";

      // 1) Full rich HTML (Analogy)
      if (lesson.fullHtml) {
        lessonBodyEl.innerHTML = lesson.fullHtml;
      }
      // 2) Sections + bullets (Synonyms etc.)
      else if (lesson.sections && lesson.sections.length) {
        lesson.sections.forEach((section) => {
          const sectionEl = document.createElement("section");
          const h3 = document.createElement("h3");
          h3.textContent = section.heading;
          sectionEl.appendChild(h3);

          const ul = document.createElement("ul");
          (section.bullets || []).forEach((b) => {
            const li = document.createElement("li");
            li.textContent = b;
            ul.appendChild(li);
          });

          sectionEl.appendChild(ul);
          lessonBodyEl.appendChild(sectionEl);
        });
      }
      // 3) Fallback
      else {
        const sectionEl = document.createElement("section");
        const h3 = document.createElement("h3");
        h3.textContent = fallbackSection.heading;
        sectionEl.appendChild(h3);

        const ul = document.createElement("ul");
        fallbackSection.bullets.forEach((b) => {
          const li = document.createElement("li");
          li.textContent = b;
          ul.appendChild(li);
        });
        sectionEl.appendChild(ul);

        lessonBodyEl.appendChild(sectionEl);
      }

      renderTips(lesson.tips || fallbackTips);
    }

    function getQuestionsForCurrent() {
      const bank = window.VERBAL_QUESTION_BANK || {};
      const topicSet = bank[currentTopicId] || {};
      const levelQuestions = topicSet[currentLevel] || [];
      const limit = Math.min(currentQuestionLimit, levelQuestions.length);
      return levelQuestions.slice(0, limit);
    }

    function renderQuiz() {
      const topic = VERBAL_TOPICS.find((t) => t.id === currentTopicId);
      quizTopicTitleEl.textContent = topic
        ? "Verbal · " + topic.label
        : "Verbal Ability";
      quizLevelLabelEl.textContent = capitalize(currentLevel);

      const questions = getQuestionsForCurrent();
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";

      if (!questions.length) {
        questionTextEl.textContent =
          "No practice questions are available yet for this topic and level. They will be added soon.";
        optionsListEl.innerHTML = "";
        progressTextEl.textContent = "0 / 0";
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        return;
      }

      if (currentIndex < 0) currentIndex = 0;
      if (currentIndex >= questions.length) currentIndex = questions.length - 1;

      const currentQ = questions[currentIndex];
      questionTextEl.textContent = currentQ.question;
      optionsListEl.innerHTML = "";

      (currentQ.options || []).forEach((option) => {
        const li = document.createElement("li");
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "option-button";
        btn.textContent = option;

        btn.addEventListener("click", function () {
          handleAnswer(option);
        });

        li.appendChild(btn);
        optionsListEl.appendChild(li);
      });

      progressTextEl.textContent =
        "Question " + (currentIndex + 1) + " of " + questions.length;

      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === questions.length - 1;
    }

    function handleAnswer(selectedOption) {
      const questions = getQuestionsForCurrent();
      if (!questions.length) return;
      const currentQ = questions[currentIndex];

      const isCorrect = selectedOption === currentQ.answer;

      const buttons = optionsListEl.querySelectorAll(".option-button");
      buttons.forEach((btn) => {
        btn.classList.remove("is-correct", "is-incorrect");
        if (btn.textContent === currentQ.answer) {
          btn.classList.add("is-correct");
        }
        if (btn.textContent === selectedOption && !isCorrect) {
          btn.classList.add("is-incorrect");
        }
      });

      if (isCorrect) {
        feedbackEl.textContent = "Correct! " + (currentQ.explanation || "");
        feedbackEl.className = "feedback feedback--correct";
      } else {
        feedbackEl.textContent = "Not quite. " + (currentQ.explanation || "");
        feedbackEl.className = "feedback feedback--incorrect";
      }
    }

    function switchMode(mode) {
      currentMode = mode;

      modeTabs.forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.mode === mode);
      });

      if (mode === "study") {
        studyView.classList.add("view--active");
        practiceView.classList.remove("view--active");
      } else {
        practiceView.classList.add("view--active");
        studyView.classList.remove("view--active");
      }
    }

    function selectTopic(topicId) {
      currentTopicId = topicId;
      currentIndex = 0;
      updateActiveTopicPill();
      renderLesson();
      renderQuiz();
    }

    function attachEvents() {
      modeTabs.forEach((tab) => {
        tab.addEventListener("click", function () {
          const mode = tab.dataset.mode;
          if (mode && mode !== currentMode) {
            switchMode(mode);
          }
        });
      });

      levelChips.forEach((chip) => {
        chip.addEventListener("click", function () {
          const level = chip.dataset.level;
          if (!level || level === currentLevel) return;
          currentLevel = level;
          currentIndex = 0;
          levelChips.forEach((c) => {
            c.classList.toggle("active", c.dataset.level === level);
          });
          renderQuiz();
        });
      });

      countChips.forEach((chip) => {
        chip.addEventListener("click", function () {
          const count = parseInt(chip.dataset.count, 10);
          if (!count || count === currentQuestionLimit) return;

          currentQuestionLimit = count;
          currentIndex = 0;

          countChips.forEach((c) => {
            c.classList.toggle("active", c === chip);
          });

          renderQuiz();
        });
      });

      prevBtn.addEventListener("click", function () {
        const questions = getQuestionsForCurrent();
        if (!questions.length) return;
        if (currentIndex > 0) {
          currentIndex -= 1;
          renderQuiz();
        }
      });

      nextBtn.addEventListener("click", function () {
        const questions = getQuestionsForCurrent();
        if (!questions.length) return;
        if (currentIndex < questions.length - 1) {
          currentIndex += 1;
          renderQuiz();
        }
      });
    }

    function init() {
      buildTopicsList();
      attachEvents();
      selectTopic(currentTopicId);
      switchMode("study");
    }

    init();
  </script>
</body>
</html>
