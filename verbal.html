<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSE Reviewer Hub – Verbal Ability</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #020617;
      --card: #020617;
      --card-alt: #0b1220;
      --border: #1f2937;
      --accent: #6366f1;
      --accent-soft: rgba(99, 102, 241, 0.12);
      --text: #f9fafb;
      --muted: #9ca3af;
      --danger: #f97373;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app-shell {
      max-width: 1120px;
      margin: 24px auto 40px;
      padding: 20px;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.12), transparent),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.12), transparent),
        #020617;
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.75);
    }

    .app-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 8px;
    }

    .app-title {
      font-size: 1.7rem;
      margin: 0 0 4px;
      letter-spacing: 0.03em;
    }

    .app-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .badge {
      align-self: flex-start;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      border: 1px solid rgba(99, 102, 241, 0.4);
      background: var(--accent-soft);
      color: #a5b4fc;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 14px;
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      border-radius: 999px;
      padding: 4px 10px;
      border: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s, background 0.15s, transform 0.1s;
    }

    .back-link:hover {
      color: #c7d2fe;
      border-color: var(--border);
      background: rgba(15, 23, 42, 0.7);
      transform: translateY(-1px);
    }

    .mode-tabs {
      display: inline-flex;
      padding: 4px;
      border-radius: 999px;
      background: #020617;
      border: 1px solid var(--border);
      margin-bottom: 18px;
      gap: 4px;
    }

    .mode-tab {
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .mode-tab.active {
      background: linear-gradient(to right, #6366f1, #4f46e5);
      color: #f9fafb;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(220px, 260px) minmax(0, 1fr);
      gap: 18px;
      align-items: flex-start;
    }

    .topics-panel {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 14px 12px;
    }

    .panel-title {
      margin: 0 0 10px;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .topic-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 520px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .topic-pill {
      width: 100%;
      text-align: left;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #020617;
      padding: 7px 11px;
      font-size: 0.9rem;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    }

    .topic-pill span.label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topic-pill span.tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.8;
    }

    .topic-pill:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .topic-pill.active {
      background: linear-gradient(to right, #6366f1, #4f46e5);
      color: #f9fafb;
      border-color: transparent;
    }

    .content-panel {
      min-height: 420px;
    }

    .view {
      display: none;
    }

    .view--active {
      display: block;
    }

    .lesson-card,
    .quiz-card {
      background: var(--card-alt);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 16px 18px;
    }

    .lesson-title {
      margin: 0 0 6px;
      font-size: 1.2rem;
    }

    .lesson-intro {
      margin: 0 0 10px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .lesson-body section + section {
      margin-top: 10px;
    }

    .lesson-body h3 {
      margin: 0 0 4px;
      font-size: 0.95rem;
      color: #e5e7eb;
    }

    .lesson-body ul {
      margin: 0;
      padding-left: 18px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .lesson-body li + li {
      margin-top: 2px;
    }

    .tip-card {
      margin-top: 12px;
      border-radius: 13px;
      padding: 10px 12px;
      background: rgba(99, 102, 241, 0.08);
      border: 1px dashed rgba(99, 102, 241, 0.5);
      font-size: 0.88rem;
    }

    .tip-card h3 {
      margin: 0 0 4px;
      font-size: 0.9rem;
      color: #a5b4fc;
    }

    .tip-card ul {
      margin: 0;
      padding-left: 18px;
      color: #e5e7eb;
    }

    .tip-card li + li {
      margin-top: 2px;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      gap: 16px;
    }

    .quiz-meta {
      min-width: 0;
    }

    .quiz-meta .lesson-title {
      font-size: 1.05rem;
    }

    .quiz-meta .lesson-intro {
      font-size: 0.9rem;
    }

    .level-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .level-chip {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #020617;
      padding: 4px 9px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
    }

    .level-chip.active {
      background: var(--accent);
      color: #f9fafb;
      border-color: transparent;
      transform: translateY(-1px);
    }

    /* Items row (10 / 20 / 30 / 40 / 50) */
    .items-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .items-label {
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-size: 0.7rem;
      opacity: 0.8;
    }

    .items-chip {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #020617;
      padding: 3px 8px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
    }

    .items-chip.active {
      background: var(--accent);
      color: #f9fafb;
      border-color: transparent;
      transform: translateY(-1px);
    }

    .question-text {
      font-size: 1.02rem;
      margin-bottom: 10px;
    }

    .options-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option-button {
      width: 100%;
      text-align: left;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #020617;
      padding: 8px 12px;
      font-size: 0.95rem;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.08s;
    }

    .option-button:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .option-button.is-correct {
      border-color: rgba(34, 197, 94, 0.85);
      background: rgba(22, 163, 74, 0.12);
    }

    .option-button.is-incorrect {
      border-color: rgba(248, 113, 113, 0.85);
      background: rgba(248, 113, 113, 0.12);
    }

    .feedback {
      min-height: 24px;
      margin-top: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .feedback.feedback--correct {
      color: var(--success);
    }

    .feedback.feedback--incorrect {
      color: var(--danger);
    }

    .quiz-footer {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .primary-button {
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #f9fafb;
      padding: 7px 15px;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s, opacity 0.15s;
    }

    .primary-button.secondary {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }

    .primary-button:disabled {
      opacity: 0.5;
      cursor: default;
      transform: none;
    }

    .primary-button:not(:disabled):hover {
      transform: translateY(-1px);
      border-color: #818cf8;
    }

    .progress-text {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* RESULT VIEW (Quiz Completed + Review Mistakes) */
    .hidden {
      display: none;
    }

    .quiz-result {
      margin-top: 16px;
      background: var(--card-alt);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 16px 18px;
    }

    .quiz-result-header {
      text-align: center;
      margin-bottom: 16px;
    }

    .quiz-result-header h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .result-score-main {
      font-size: 2rem;
      font-weight: 600;
      margin: 8px 0 2px;
    }

    .result-score-sub {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .quiz-result-actions {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .result-section-title {
      font-size: 0.95rem;
      margin: 0 0 8px;
      color: #e5e7eb;
    }

    .mistake-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .mistake-item {
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(127, 29, 29, 0.55);
      border: 1px solid rgba(248, 113, 113, 0.8);
    }

    .mistake-q-title {
      font-size: 0.9rem;
      margin: 0 0 4px;
      color: #f9fafb;
      font-weight: 600;
    }

    .mistake-q-text {
      font-size: 0.9rem;
      margin: 0 0 8px;
      color: var(--muted);
    }

    .mistake-answers {
      font-size: 0.86rem;
    }

    .mistake-answers p {
      margin: 0 0 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mistake-answers .wrong {
      color: var(--danger);
    }

    .mistake-answers .correct {
      color: var(--success);
    }

    .mistake-answers .explanation {
      color: var(--muted);
    }

    .mistake-answers span.label {
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .layout {
        display: flex;
        flex-direction: column;
      }

      .app-shell {
        margin: 12px;
        padding: 14px;
      }

      .quiz-header {
        flex-direction: column;
        align-items: stretch;
      }

      .level-switcher {
        justify-content: flex-start;
      }

      .items-row {
        justify-content: flex-start;
      }
    }

    @media (max-width: 600px) {
      .app-title {
        font-size: 1.4rem;
      }
    }
  </style>
</head>

        <h1 class="app-title">CSE Reviewer Hub</h1>

    <main class="layout">

        </div>
      </aside>

      <section class="content-panel">
        <!-- STUDY MODE -->
        <div id="studyView" class="view view--active">
          <div class="lesson-card">
            <h2 id="lessonTitle" class="lesson-title"></h2>

            <div id="lessonBody" class="lesson-body"></div>
            <div id="tipCard" class="tip-card"></div>
          </div>
        </div>

        <!-- PRACTICE QUIZ -->
        <div id="practiceView" class="view">
          <div id="quizHeader" class="quiz-header">
            <div class="quiz-meta">
              <h2 id="quizTopicTitle" class="lesson-title"></h2>
              <p class="lesson-intro">
                Level:
                <span id="quizLevelLabel">Beginner</span>
              </p>
            </div>
            <div>
              <div class="level-switcher">
                <button class="level-chip active" data-level="beginner" type="button">Beginner</button>
                <button class="level-chip" data-level="intermediate" type="button">Intermediate</button>
                <button class="level-chip" data-level="advanced" type="button">Advanced</button>
                <button class="level-chip" data-level="expert" type="button">Expert</button>
              </div>
              <div class="items-row">
                <span class="items-label">Items:</span>
                <button type="button" class="items-chip active" data-count="10">10</button>
                <button type="button" class="items-chip" data-count="20">20</button>
                <button type="button" class="items-chip" data-count="30">30</button>
                <button type="button" class="items-chip" data-count="40">40</button>
                <button type="button" class="items-chip" data-count="50">50</button>
              </div>
            </div>
          </div>

          <div id="quizCard" class="quiz-card">
            <div id="questionText" class="question-text"></div>
            <ul id="optionsList" class="options-list"></ul>
            <div id="feedback" class="feedback"></div>
            <div class="quiz-footer">
              <div>
                <button id="prevBtn" class="primary-button secondary" type="button">Previous</button>
                <button id="nextBtn" class="primary-button" type="button">Next</button>
              </div>
              <span id="progressText" class="progress-text"></span>
            </div>
          </div>

          <!-- RESULT PANEL (Quiz Completed) -->
          <div id="resultPanel" class="quiz-result hidden">
            <div class="quiz-result-header">
              <h2>Quiz Completed!</h2>
              <div id="resultScoreMain" class="result-score-main">0 / 0</div>
              <div id="resultScoreText" class="result-score-sub">Score: 0%</div>
              <div class="quiz-result-actions">
                <button id="resultHomeBtn" type="button" class="primary-button secondary">Home</button>
                <button id="resultRetryBtn" type="button" class="primary-button">Retake Quiz</button>
              </div>
            </div>
            <div class="quiz-result-body">
              <h3 class="result-section-title">Review Mistakes</h3>
              <div id="mistakeList" class="mistake-list">
                <!-- Filled by JS -->
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

const LESSONS = {
  nouns: {
    title: "Nouns – Names of People, Places, Things, and Ideas",
    
    fullHtml: `
  <section class="lesson-section">
    <h2>1. The Anatomy of a Noun</h2>
    <p>A noun names a person, place, thing, idea, or event. But deeper than that, nouns have <strong>Properties</strong> that determine how they fit in a sentence.</p>
    <div class="highlight-box">
      <p><strong>The 4 Properties of Nouns:</strong></p>
      <ul>
        <li><strong>Gender:</strong> Masculine, Feminine, Common (teacher), Neuter (table).</li>
        <li><strong>Number:</strong> Singular vs. Plural.</li>
        <li><strong>Case:</strong> Subjective, Objective, Possessive.</li>
        <li><strong>Person:</strong> First, Second, or Third person.</li>
      </ul>
    </div>
  </section>

  <section class="lesson-section">
    <h2>2. Deep Dive: Count vs. Mass Nouns (The Shifters)</h2>
    <p>Some nouns change meaning depending on whether they are countable or uncountable.</p>
    <table class="lesson-table">
      <thead>
        <tr>
          <th>Word</th>
          <th>As Mass Noun (Uncountable)</th>
          <th>As Count Noun (Pluralizable)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>Paper</strong></td>
          <td>Material to write on.<br><em>"I need some paper."</em></td>
          <td>Documents or newspapers.<br><em>"I lost my important papers."</em></td>
        </tr>
        <tr>
          <td><strong>Hair</strong></td>
          <td>All hair on the head.<br><em>"Her hair is black."</em></td>
          <td>Individual strands.<br><em>"There are two gray hairs in my soup."</em></td>
        </tr>
        <tr>
          <td><strong>Glass</strong></td>
          <td>The material.<br><em>"Windows are made of glass."</em></td>
          <td>Drinking vessels or eyewear.<br><em>"I drank three glasses of water."</em></td>
        </tr>
        <tr>
          <td><strong>Iron</strong></td>

          <td>Device for clothes.<br><em>"We have two flat irons."</em></td>
        </tr>
        <tr>
          <td><strong>Room</strong></td>
          <td>Space.<br><em>"Is there enough room for me?"</em></td>
          <td>Partitioned areas.<br><em>"The house has five rooms."</em></td>
        </tr>
      </tbody>
    </table>
  </section>

  <section class="lesson-section">
    <h2>3. Advanced Pluralization Rules</h2>
    
    <h3>3.1 The Tricky "-O" Endings</h3>
    <p>Not all nouns ending in "o" take "-es". This is a memorization game.</p>
    <ul>
      <li><strong>Add -ES (Usually heroes/potatoes):</strong> <em>Heroes, Tomatoes, Potatoes, Echoes, Torpedoes, Vetos, Mosquitoes.</em></li>
      <li><strong>Add -S (Usually musical/tech terms):</strong> <em>Pianos, Solos, Photos, Radios, Studios, Videos, Logos, Memos.</em></li>
      <li><strong>Both are accepted:</strong> <em>Volcanoes/Volcanos, Mangoes/Mangos, Tornadoes/Tornados.</em></li>
    </ul>

    <h3>3.2 Compound Nouns (The "Head Word" Rule)</h3>
    <p>Find the main word/person being described.</p>
    <ul>
      <li><em>Attorney-at-law</em> → <strong>Attorneys</strong>-at-law</li>
      <li><em>Passer-by</em> → <strong>Passers</strong>-by</li>
      <li><em>Major General</em> → Major <strong>Generals</strong> (General is the noun, Major is the adjective)</li>
      <li><em>Poet Laureate</em> → <strong>Poets</strong> Laureate</li>
    </ul>
    <p><strong>BUT: No clear noun? Add 's' at the end.</strong></p>
    <ul>
      <li><em>Merry-go-round</em> → Merry-go-rounds</li>
      <li><em>Grown-up</em> → Grown-ups</li>
    </ul>

    <h3>3.3 The "Same Form" Nouns (Zero Plural)</h3>
    <p>Singular and Plural are identical.</p>
    <ul>
      <li><em>Sheep, Deer, Moose, Swine, Aircraft, Spacecraft, Series, Species, Corps (pronounced 'kors').</em></li>
      <li>Note: <em>Fish</em> is plural for same species. <em>Fishes</em> refers to different species types.</li>
    </ul>
  </section>

  <section class="lesson-section">
    <h2>4. Subject-Verb Agreement: The "Killer" Questions</h2>
    <p>This is where most examinees fail. Pay close attention.</p>

    <h3>4.1 Intervening Phrases (Ignore them!)</h3>
    <p>Do not be distracted by words between the subject and the verb.</p>
    <ul>
      <li><em>The <strong>box</strong> [of chocolates] <strong>is</strong> missing.</em> (Subject is Box, not chocolates).</li>
      <li><em>The <strong>politician</strong>, [together with his wife and kids], <strong>has</strong> arrived.</em></li>
      <li>Phrases starting with <em>along with, as well as, together with, accompanied by, in addition to</em> DO NOT make the subject plural.</li>
    </ul>

    <h3>4.2 "And" vs. "One Idea"</h3>
    <p>Usually, "and" makes the subject plural. BUT, if the two nouns form <strong>one single idea/dish</strong>, use Singular.</p>
    <ul>
      <li><em>Bread and butter <strong>is</strong> my favorite breakfast.</em> (One meal).</li>
      <li><em>Fish and chips <strong>is</strong> popular in the UK.</em></li>
      <li><em><strong>BUT:</strong> Bread and butter <strong>were</strong> bought separately.</em> (Two distinct items).</li>
    </ul>

    <h3>4.3 Fractions and Percentages</h3>
    <p>The verb depends on the <strong>Object of the Preposition</strong> (what comes after "of").</p>
    <ul>
      <li><em>Fifty percent of the <strong>pie is</strong> eaten.</em> (Pie = Singular).</li>
      <li><em>Fifty percent of the <strong>pies are</strong> eaten.</em> (Pies = Plural).</li>
      <li><em>One-third of the <strong>students are</strong> absent.</em></li>
      <li><em>All of the <strong>water is</strong> gone.</em></li>
    </ul>

    <h3>4.4 "Here" and "There" (Inverted Sentences)</h3>
    <p>In sentences starting with Here/There, the subject comes <strong>after</strong> the verb.</p>
    <ul>
      <li><em>There <strong>is</strong> a <strong>problem</strong>.</em></li>
      <li><em>There <strong>are</strong> many <strong>reasons</strong>.</em></li>
      <li><em>Here <strong>comes</strong> the <strong>bus</strong>.</em></li>
    </ul>
  </section>

  <section class="lesson-section">
    <h2>5. Noun Cases (Nominative, Objective, Possessive)</h2>
    <p>Understanding cases helps you choose between I/Me, He/Him, Who/Whom.</p>

    <h3>5.1 Nominative Case (Subject)</h3>
    <p>The noun is doing the action or is the subject complement.</p>
    <ul>
      <li><em><strong>Maria</strong> sings.</em> (Subject)</li>
      <li><em>The winner is <strong>Maria</strong>.</em> (Predicate Nominative - follows "is/was/are").</li>
    </ul>

    <h3>5.2 Objective Case (Receiver)</h3>
    <p>The noun receives action or follows a preposition.</p>
    <ul>
      <li><em>I saw <strong>Maria</strong>.</em> (Direct Object)</li>
      <li><em>I gave <strong>Maria</strong> a gift.</em> (Indirect Object)</li>
      <li><em>I sat next to <strong>Maria</strong>.</em> (Object of Preposition)</li>
    </ul>

    <h3>5.3 Possessive Case (Ownership)</h3>
    <p><strong>The "Joint Ownership" Rule:</strong></p>
    <ul>
      <li><em>Ben and Benjie's car.</em> (They share ONE car).</li>
      <li><em>Ben's and Benjie's cars.</em> (They have TWO separate cars).</li>
    </ul>
  </section>

  <section class="lesson-section">
    <h2>6. Specialized Collective Nouns</h2>
    <p>Exams sometimes test vocabulary by asking for the specific collective noun.</p>
    <ul class="two-column-list">
      <li>A <strong>pride</strong> of lions</li>
      <li>A <strong>murder</strong> of crows</li>
      <li>A <strong>school/shoal</strong> of fish</li>
      <li>A <strong>pack</strong> of wolves</li>
      <li>A <strong>gaggle</strong> of geese</li>
      <li>A <strong>parliament</strong> of owls</li>
      <li>A <strong>convocation</strong> of eagles</li>
      <li>A <strong>troop</strong> of monkeys</li>
    </ul>
  </section>

  <section class="lesson-section">
    <h2>7. Final "Look-Alike" Warnings</h2>
    <p>Don't confuse these:</p>
    <ul>
      <li><strong>Advice</strong> (Noun) vs. <strong>Advise</strong> (Verb).</li>
      <li><strong>Prophecy</strong> (Noun) vs. <strong>Prophesy</strong> (Verb).</li>
      <li><strong>Effect</strong> (Noun/Result) vs. <strong>Affect</strong> (Verb/Influence).</li>
      <li><strong>Stationary</strong> (Not moving) vs. <strong>Stationery</strong> (Paper/Envelopes).</li>
    </ul>
  </section>

          <li>the book <strong>on the table</strong></li>
          <li>the students <strong>in this class</strong></li>
        </ul>

        <h3>4.5 Geography and “The”</h3>
        <p><strong>Use “the” with:</strong></p>
        <ul class="two-column-list">
          <li>rivers: the Nile, the Amazon</li>
          <li>seas & oceans: the Pacific, the Mediterranean Sea</li>
          <li>mountain ranges: the Alps, the Himalayas</li>
          <li>groups of islands: the Philippines, the Maldives</li>
          <li>some countries: the Netherlands, the United States</li>
          <li>organizations: the United Nations, the Department of Education</li>
        </ul>
        <p><strong>No “the” with:</strong> most single countries (Japan, France), cities (Cebu, Manila), and most streets (Ayala Avenue).</p>
      </section>

      <section class="lesson-section">
        <h2>5. Zero Article (No Article)</h2>
        <p>Sometimes we use <strong>no article</strong> at all. This is very common and often tested in exams.</p>

        <h3>5.1 General Plural Nouns</h3>
        <p>No article when talking about plural nouns in general.</p>
        <ul>
          <li><em>Dogs</em> are loyal animals.</li>
          <li><em>Teachers</em> work hard.</li>
          <li><em>Cars</em> are expensive.</li>
        </ul>
        <p>Compare:</p>
        <ul>
          <li>I like <strong>dogs</strong>. (dogs in general)</li>
          <li>I like <strong>the dogs</strong> in this picture. (specific dogs)</li>
        </ul>

        <h3>5.2 Uncountable Nouns (General)</h3>
        <p>No article when an uncountable noun is used in a general sense.</p>
        <ul>
          <li><em>Water</em> is essential.</li>
          <li><em>Information</em> is power.</li>
          <li><em>Education</em> is expensive.</li>
        </ul>
        <p><strong>But:</strong></p>
        <ul>
          <li>The water in this glass is dirty.</li>
          <li>The information you gave me is correct.</li>
        </ul>

        <h3>5.3 Meals, Languages, Subjects, Sports</h3>
        <ul>
          <li>We have <strong>breakfast</strong> at 7:00.</li>
          <li>She cooked <strong>dinner</strong>.</li>
          <li>She speaks <strong>English</strong> and <strong>Tagalog</strong>.</li>
          <li>I like <strong>math</strong> and <strong>science</strong>.</li>
          <li>He plays <strong>basketball</strong>.</li>
        </ul>
        <p>But we can use <strong>the</strong> when we mean something specific:</p>
        <ul>
          <li>The dinner we had last night was delicious.</li>
          <li>The English in this document is wrong.</li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>6. Special Cases & Common Confusions</h2>

        <h3>6.1 A/An vs The (First vs Second Mention)</h3>
        <p>First mention (new information) → <strong>a/an</strong><br>
        Second mention (already known) → <strong>the</strong></p>
        <ul>
          <li>I saw <strong>a dog</strong> in the street. <strong>The dog</strong> was barking loudly.</li>
          <li>She bought <strong>a laptop</strong>. <strong>The laptop</strong> is on the table.</li>
        </ul>

        <h3>6.2 Article + Adjective + Noun</h3>
        <p>The article goes before the whole adjective + noun phrase.</p>
        <ul>
          <li>a beautiful house</li>
          <li>an interesting book</li>
          <li>a good idea</li>
          <li>an old umbrella</li>
        </ul>
        <p>Choose <strong>a/an</strong> based on the sound that follows, not just the first letter of the noun:</p>
        <ul>
          <li>an honest man (h is silent)</li>
          <li>a useful tool (/juː/ → consonant sound)</li>
        </ul>

        <h3>6.3 “The + Adjective” = Group of People</h3>
        <p>Sometimes <strong>the + adjective</strong> refers to a whole group:</p>
        <ul>
          <li>the poor = poor people</li>
          <li>the rich = rich people</li>
          <li>the elderly = old people</li>
          <li>the unemployed = people without jobs</li>
        </ul>
        <p><em>Example: The rich should help the poor.</em></p>

        <h3>6.4 No “The” with Possessive Adjectives</h3>
        <p>Do not use <strong>the</strong> before <strong>my, your, his, her, our, their</strong>.</p>
        <ul>
          <li>✅ my car (not <del>the my car</del>)</li>
          <li>✅ his house (not <del>the his house</del>)</li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>7. Typical Exam Patterns with Articles</h2>

        <h3>Pattern 1 – Fill in the Blank</h3>
        <p><strong>Question:</strong><br>
          She is ____ engineer working in ____ company in Cebu.
        </p>
        <p><strong>Correct:</strong><br>
          She is <strong>an</strong> engineer working in <strong>a</strong> company in Cebu.
        </p>
        <ul>
          <li><strong>an engineer</strong> → vowel sound /e/</li>
          <li><strong>a company</strong> → first mention, not specific</li>
        </ul>

        <h3>Pattern 2 – Specific vs General</h3>
        <ul>
          <li><em>Children</em> need love. (general, no article)</li>
          <li><em>The children</em> in this class need more practice. (specific group)</li>
        </ul>

        <h3>Pattern 3 – Unique Things</h3>
        <p><strong>Question:</strong> ____ sun rises in the east.</p>
        <p><strong>Correct:</strong> <strong>The</strong> sun rises in the east.</p>

        <h3>Pattern 4 – Professions</h3>
        <p><strong>Question:</strong> She is ____ accountant and he is ____ engineer.</p>
        <p><strong>Correct:</strong> She is <strong>an</strong> accountant and he is <strong>an</strong> engineer.</p>
      </section>

      <section class="lesson-section">
        <h2>8. Quick Checklist for Articles (Exam Strategy)</h2>
        <ul class="check-list">
          <li>Is the noun <strong>specific</strong>? → Use <strong>the</strong>.</li>
          <li>Is it a <strong>singular count noun</strong> mentioned for the first time? → Use <strong>a/an</strong>.</li>
          <li>Is the next sound a <strong>vowel</strong>? → Use <strong>an</strong>. Otherwise, use <strong>a</strong>.</li>
          <li>Is it a <strong>plural</strong> or <strong>uncountable</strong> noun used in general? → Often <strong>no article</strong>.</li>
          <li>Is it a <strong>unique</strong> thing (the sun, the president, the Pacific Ocean)? → Use <strong>the</strong>.</li>
          <li>Is it a <strong>proper noun</strong> (Maria, Cebu, Japan)? → Usually <strong>no article</strong>, with a few exceptions (the Philippines, the United States).</li>
          <li>Check if you are comparing two or more things: articles often appear with <strong>comparatives</strong> and <strong>superlatives</strong>.</li>
        </ul>
      </section>

 sentence_construction: {

      <h2>Sentence Construction</h2>
    <p>
      In English, a <strong>sentence</strong> must express a complete thought and follow correct grammar.
      At minimum, it needs a <strong>subject</strong> and a <strong>predicate</strong>.
    </p>

    <hr />

    <h3>1. What is a sentence?</h3>
    <p>
      A sentence is a group of words that:
    </p>
    <ul>
      <li>Has a <strong>subject</strong> (who or what the sentence is about), and</li>
      <li>Has a <strong>predicate</strong> (what the subject does, what happens, or what the subject is), and</li>
      <li>Expresses a <strong>complete thought</strong>.</li>
    </ul>

    <p><strong>Example of a correct sentence:</strong></p>
    <p>
      <em>She is studying for the exam.</em><br />
      Subject: <strong>She</strong><br />
      Predicate: <strong>is studying for the exam</strong><br />
      → The idea is complete.
    </p>

    <p><strong>Sentence fragment (incorrect):</strong></p>
    <p>
      <em>Because she is studying.</em><br />
      This is <strong>not</strong> a complete sentence. The word <em>because</em> makes it a dependent clause.
      It needs a main clause to complete the idea.
    </p>

    <p><strong>Run-on sentence (incorrect):</strong></p>
    <p>
      <em>She is studying she wants to pass.</em><br />
      Two complete ideas are pushed together without proper punctuation or connector.
    </p>

    <p><strong>Corrected versions:</strong></p>
    <ul>
      <li><em>She is studying because she wants to pass.</em></li>
      <li><em>She is studying. She wants to pass.</em></li>
    </ul>

    <hr />

    <h3>2. Main Parts of a Sentence</h3>

    <h4>a. Subject</h4>
    <p>
      The <strong>subject</strong> tells who or what the sentence is about.
    </p>
    <ul>
      <li>Noun: <em>The teacher, my friends, the exam</em></li>
      <li>Pronoun: <em>I, you, he, she, they, it</em></li>
      <li>Phrase or clause: <em>Reading books</em> helps me relax.</li>
    </ul>
    <p>
      <em>The students are tired.</em><br />
      Subject: <strong>The students</strong>
    </p>

    <h4>b. Predicate</h4>
    <p>
      The <strong>predicate</strong> tells what the subject does, what happens, or what the subject is.
      It always contains a verb.
    </p>
    <p>
      <em>The students are tired after the long exam.</em><br />
      Predicate: <strong>are tired after the long exam</strong>
    </p>

    <h4>c. Object</h4>
    <ul>
      <li>
        <strong>Direct object</strong> – receives the action of the verb.<br />
        <em>She wrote a letter.</em><br />
        Direct object: <strong>a letter</strong>
      </li>
      <li>
        <strong>Indirect object</strong> – the person who receives the direct object.<br />
        <em>She wrote her friend a letter.</em><br />
        Indirect object: <strong>her friend</strong><br />
        Direct object: <strong>a letter</strong>
      </li>
    </ul>

    <h4>d. Complement</h4>
    <p>
      A <strong>complement</strong> gives extra information about the subject or the object.
    </p>
    <ul>
      <li><em>She is happy.</em> → <strong>happy</strong> (subject complement)</li>
      <li><em>They elected him president.</em> → <strong>president</strong> (object complement)</li>
    </ul>

    <h4>e. Modifiers</h4>
    <p>
      <strong>Modifiers</strong> are words, phrases, or clauses that describe other words.
      They are often adjectives or adverbs.
    </p>
    <p>
      <em>The very tired student walked slowly to the room.</em><br />
      <strong>very</strong> modifies <strong>tired</strong><br />
      <strong>slowly</strong> modifies <strong>walked</strong>
    </p>

    <p><strong>Key idea:</strong> Clear subject + correct verb + complete thought = good sentence construction.</p>

    <hr />

    <h3>3. Basic Sentence Patterns</h3>
    <p>
      Common sentence patterns that are very useful in tests like the CSE:
    </p>
    <ul>
      <li>
        <strong>S – V</strong><br />
        <em>The children laughed.</em>
      </li>
      <li>
        <strong>S – V – O</strong><br />
        <em>She answered the question.</em>
      </li>
      <li>
        <strong>S – LV – C</strong> (Linking verb + complement)<br />
        <em>The exam was difficult.</em>
      </li>
      <li>
        <strong>S – V – IO – DO</strong><br />
        <em>The teacher gave the students homework.</em>
      </li>
      <li>
        <strong>S – V – O – C</strong><br />
        <em>They elected him president.</em>
      </li>
    </ul>
    <p>
      In sentence-construction questions, choose the option that follows a clear pattern and has no missing part.
    </p>

    <hr />

    <h3>4. Types of Sentences by Purpose</h3>
    <ul>
      <li>
        <strong>Declarative</strong> – makes a statement.<br />
        <em>The test is on Sunday.</em>
      </li>
      <li>
        <strong>Interrogative</strong> – asks a question.<br />
        <em>When is the test?</em>
      </li>
      <li>
        <strong>Imperative</strong> – gives a command or request.<br />
        <em>Please answer all the items carefully.</em>
      </li>
      <li>
        <strong>Exclamatory</strong> – shows strong feeling.<br />
        <em>What a difficult exam that was!</em>
      </li>
    </ul>
    <p>
      In many exams, most sentences are declarative and interrogative.
    </p>

    <hr />

    <h3>5. Simple, Compound, Complex, and Compound-Complex Sentences</h3>

    <h4>a. Simple sentence</h4>
    <p>
      A <strong>simple sentence</strong> has one independent clause.
    </p>
    <p>
      <em>The exam is difficult.</em><br />
      <em>Many students are nervous.</em>
    </p>

    <h4>b. Compound sentence</h4>
    <p>
      A <strong>compound sentence</strong> has two or more independent clauses.
      They are joined by:
    </p>
    <ul>
      <li>A coordinating conjunction (FANBOYS: <strong>for, and, nor, but, or, yet, so</strong>), or</li>
      <li>A semicolon (<strong>;</strong>).</li>
    </ul>
    <p>
      <em>The exam is difficult, but many students are prepared.</em><br />
      <em>The exam is difficult; many students are prepared.</em>
    </p>

    <h4>c. Complex sentence</h4>
    <p>
      A <strong>complex sentence</strong> has one independent clause and at least one dependent (subordinate) clause.
      It uses subordinating conjunctions such as:
      <strong>because, although, if, when, while, since, unless</strong>, etc.
    </p>
    <p>
      <em>Because the exam is difficult, many students are studying hard.</em><br />
      <em>Many students are studying hard because the exam is difficult.</em>
    </p>

    <h4>d. Compound-complex sentence</h4>
    <p>
      A <strong>compound-complex sentence</strong> has two or more independent clauses and at least one dependent clause.
    </p>
    <p>
      <em>Many students are studying hard because the exam is difficult, and they hope they will pass.</em>
    </p>
    <p>
      In sentence-construction items, you are often asked: <strong>"Which sentence is best constructed?"</strong>
      You must look for correct use of connectors and correct combination of clauses.
    </p>

    <hr />

    <h3>6. Word Order in English</h3>
    <p>
      The usual word order in English is:
    </p>
    <p>
      <strong>Subject – Verb – Object – (Place) – (Time)</strong>
    </p>
    <p>
      <em>She wrote a letter at home yesterday.</em><br />
      S: <strong>She</strong><br />
      V: <strong>wrote</strong><br />
      O: <strong>a letter</strong><br />
      Place: <strong>at home</strong><br />
      Time: <strong>yesterday</strong>
    </p>

    <p><strong>Common problem:</strong> Adverbs or phrases in the wrong position make the sentence sound awkward or confusing.</p>

    <p><strong>Good:</strong> <em>He carefully explained the lesson to the class yesterday.</em></p>
    <p><strong>Awkward:</strong> <em>He explained to the class yesterday carefully the lesson.</em></p>

    <hr />

    <h3>7. Agreement and Consistency</h3>
    <p>
      In sentence construction, you must check not only the word order but also:
    </p>
    <ul>
      <li><strong>Subject–verb agreement</strong></li>
      <li><strong>Verb tense consistency</strong></li>
      <li><strong>Pronoun consistency</strong></li>
    </ul>

    <h4>a. Subject–Verb Agreement (SVA)</h4>
    <p>
      <strong>Singular subject → singular verb</strong><br />
      <strong>Plural subject → plural verb</strong>
    </p>
    <p>
      <em>The teacher explains the lesson.</em> (singular)<br />
      <em>The teachers explain the lesson.</em> (plural)
    </p>

    <h4>b. Tense consistency</h4>
    <p>
      Inside one sentence, keep the tense consistent unless there is a clear reason to change the time.
    </p>
    <p><strong>Inconsistent (unclear):</strong><br />
      <em>She studies every day and watched a movie last night.</em>
    </p>
    <p><strong>Better options:</strong></p>
    <ul>
      <li><em>She studies every day and watches movies on weekends.</em> (present)</li>
      <li><em>She studied all day and watched a movie at night.</em> (past)</li>
    </ul>

    <h4>c. Pronoun consistency</h4>
    <p>
      Do not mix <em>he, she, they, you</em> without a reason.
    </p>
    <p><strong>Incorrect:</strong> <em>A student must bring their pencil if you want to pass.</em></p>
    <p><strong>Better:</strong></p>
    <ul>
      <li><em>A student must bring his or her pencil if he or she wants to pass.</em></li>
      <li><em>Students must bring their pencils if they want to pass.</em></li>
    </ul>

    <hr />

    <h3>8. Parallelism (Parallel Structure)</h3>
    <p>
      <strong>Parallel structure</strong> means using the same grammatical form for items in a list or for ideas joined by
      <em>and, or, not only... but also</em>, etc.
    </p>

    <p><strong>Not parallel:</strong> <em>She likes reading, to swim, and jogging.</em></p>
    <p><strong>Parallel:</strong></p>
    <ul>
      <li><em>She likes reading, swimming, and jogging.</em></li>
      <li><em>She likes to read, to swim, and to jog.</em></li>
    </ul>

    <p><strong>Not parallel:</strong> <em>He wants to succeed and having a good life.</em></p>
    <p><strong>Parallel:</strong> <em>He wants to succeed and to have a good life.</em></p>

    <p>
      In many tests, at least one option is wrong because of faulty parallelism.
    </p>

    <hr />

    <h3>9. Connectors: Are They Used Correctly?</h3>
    <p>
      Sentence-construction questions often test the correct use of <strong>connectors</strong>.
    </p>

    <h4>a. Coordinating conjunctions (FANBOYS)</h4>
    <p>
      These join ideas of equal importance (two independent clauses):
      <strong>for, and, nor, but, or, yet, so</strong>.
    </p>
    <p>
      <em>The exam was difficult, but she passed.</em>
    </p>

    <h4>b. Subordinating conjunctions</h4>
    <p>
      These introduce a dependent clause: <strong>because, although, while, if, when, since, unless</strong>, etc.
    </p>
    <p>
      <em>She passed because she studied hard.</em><br />
      <em>Although the exam was difficult, she passed.</em>
    </p>

    <h4>c. Conjunctive adverbs</h4>
    <p>
      These usually appear with a semicolon and a comma:
      <strong>however, therefore, moreover, consequently, meanwhile</strong>, etc.
    </p>
    <p>
      <em>The exam was difficult; however, she passed.</em>
    </p>

    <p>
      Misused connectors are a very common reason for wrong answers.
    </p>

    <hr />

    <h3>10. Common Sentence Construction Errors</h3>
    <p>
      These are the errors that exam questions often target:
    </p>

    <h4>1) Sentence fragments</h4>
    <p>
      A fragment is missing a main clause or complete thought.
    </p>
    <p><strong>Fragment:</strong> <em>Because she studied very hard.</em></p>
    <p><strong>Complete:</strong> <em>She passed the exam because she studied very hard.</em></p>

    <h4>2) Run-on sentences and comma splices</h4>
    <p>
      A <strong>run-on sentence</strong> joins two sentences without proper punctuation or connector.<br />
      A <strong>comma splice</strong> joins two sentences using only a comma.
    </p>
    <p>
      <strong>Run-on:</strong> <em>She studied hard she passed the exam.</em><br />
      <strong>Comma splice:</strong> <em>She studied hard, she passed the exam.</em>
    </p>
    <p><strong>Correct ways to fix:</strong></p>
    <ul>
      <li>Use a period: <em>She studied hard. She passed the exam.</em></li>
      <li>Use a conjunction: <em>She studied hard, so she passed the exam.</em></li>
      <li>Use a semicolon: <em>She studied hard; she passed the exam.</em></li>
    </ul>

    <h4>3) Misplaced modifiers</h4>
    <p>
      A <strong>misplaced modifier</strong> is too far from the word it describes, making the sentence confusing or funny.
    </p>
    <p>
      <strong>Incorrect:</strong> <em>She almost failed every subject she took.</em><br />
      (This suggests she nearly failed all subjects, but the intended meaning may be different.)
    </p>
    <p>
      <strong>Better:</strong> <em>She failed almost every subject she took.</em>
    </p>
    <p>
      <strong>Incorrect:</strong> <em>Walking down the street, the house looked old.</em><br />
      (It sounds like the house is walking.)
    </p>
    <p>
      <strong>Better:</strong> <em>Walking down the street, I saw an old house.</em>
    </p>

    <h4>4) Vague or ambiguous pronoun reference</h4>
    <p>
      A pronoun must clearly refer to one specific noun.
    </p>
    <p>
      <strong>Vague:</strong> <em>When Maria met Ana, she was nervous.</em><br />
      (Who was nervous?)
    </p>
    <p><strong>Clear versions:</strong></p>
    <ul>
      <li><em>When Maria met Ana, Maria was nervous.</em></li>
      <li><em>When Maria met Ana, both of them were nervous.</em></li>
    </ul>

    <h4>5) Faulty parallelism</h4>
    <p>
      When ideas in a list do not follow the same grammatical form, the structure is not parallel.
    </p>
    <p>
      <strong>Not parallel:</strong> <em>The job requires patience, honesty, and working hard.</em><br />
      <strong>Parallel:</strong> <em>The job requires patience, honesty, and hard work.</em>
    </p>

    <hr />

    <p><strong>Exam tip:</strong> In sentence-construction questions, always check:</p>
    <ul>
      <li>Does it express a complete thought?</li>
      <li>Is the subject–verb agreement correct?</li>
      <li>Is the tense consistent?</li>
      <li>Are the connectors and modifiers in the right place?</li>
      <li>Is the structure parallel and clear?</li>
    </ul>

    <section class="lesson-block">
      <h2>1. What is Sentence Structure?</h2>
      <p>
        <strong>Sentence structure</strong> is the way words, phrases, and clauses are arranged
        to express a complete thought.
      </p>
      <p>A good sentence:</p>
      <ul>
        <li>has a <strong>subject</strong> (who or what the sentence is about),</li>
        <li>has a <strong>predicate</strong> (what the subject does or is),</li>
        <li>expresses a <strong>complete idea</strong>, and</li>
        <li>uses <strong>correct grammar and punctuation</strong>.</li>
      </ul>
      <p><strong>Example (correct):</strong> The teacher explained the lesson clearly.</p>
      <p><strong>Example (fragment / incomplete):</strong> Because the teacher explained the lesson.</p>
    </section>

    <section class="lesson-block">
      <h2>2. Basic Parts of a Sentence</h2>

      <h3>2.1 Subject and Predicate</h3>
      <p>
        The <strong>subject</strong> is the person, thing, or idea that does the action or is described.
        The <strong>predicate</strong> tells what the subject does or is.
      </p>
      <p><strong>Example:</strong> The students <em>are reviewing for the exam</em>.</p>
      <ul>
        <li>Subject: <strong>The students</strong></li>
        <li>Predicate: <strong>are reviewing for the exam</strong></li>
      </ul>

      <h3>2.2 Objects and Complements</h3>
      <p>
        An <strong>object</strong> receives the action of the verb. A <strong>complement</strong>
        completes the meaning of the subject or object.
      </p>
      <ul>
        <li>
          <strong>Direct object</strong> – answers <em>what?</em> or <em>whom?</em> after the verb.<br>
          <em>She wrote a letter.</em> → "a letter" is the direct object.
        </li>
        <li>
          <strong>Indirect object</strong> – tells <em>to whom</em> or <em>for whom</em> the action is done.<br>
          <em>The teacher gave the students homework.</em>
        </li>
        <li>
          <strong>Subject complement</strong> – comes after a linking verb and describes the subject.<br>
          <em>The weather is pleasant.</em>
        </li>
      </ul>
    </section>

    <section class="lesson-block">
      <h2>3. Common Sentence Patterns</h2>
      <p>Here are useful patterns to recognize:</p>
      <ul>
        <li>
          <strong>SV</strong> – Subject + Verb<br>
          <em>Birds fly.</em>
        </li>
        <li>
          <strong>SVC</strong> – Subject + Linking Verb + Complement<br>
          <em>She is tired.</em>
        </li>
        <li>
          <strong>SVO</strong> – Subject + Verb + Object<br>
          <em>They built a house.</em>
        </li>
        <li>
          <strong>SVOO</strong> – Subject + Verb + Indirect Object + Direct Object<br>
          <em>The teacher gave the students homework.</em>
        </li>
        <li>
          <strong>SVOC</strong> – Subject + Verb + Object + Complement<br>
          <em>They elected him president.</em>
        </li>
      </ul>
    </section>

    <section class="lesson-block">
      <h2>4. Types of Sentences by Structure</h2>

      <h3>4.1 Simple Sentence</h3>
      <p>
        A <strong>simple sentence</strong> has one independent clause (one complete thought).
      </p>
      <p><em>The exam is difficult.</em></p>

      <h3>4.2 Compound Sentence</h3>
      <p>
        A <strong>compound sentence</strong> has two or more independent clauses joined by a
        coordinating conjunction (<strong>for, and, nor, but, or, yet, so</strong>) or a semicolon.
      </p>
      <p><em>The exam is difficult, but many students are prepared.</em></p>

      <h3>4.3 Complex Sentence</h3>
      <p>
        A <strong>complex sentence</strong> has one independent clause and at least one dependent
        (subordinate) clause introduced by words like <em>because, although, while, when, if, since</em>.
      </p>
      <p><em>Because the exam is difficult, many students are studying hard.</em></p>

      <h3>4.4 Compound-Complex Sentence</h3>
      <p>
        A <strong>compound-complex sentence</strong> has at least two independent clauses and at least
        one dependent clause.
      </p>
      <p><em>Although it was late, we continued our meeting, and we finished the report.</em></p>
    </section>

    <section class="lesson-block">
      <h2>5. Common Sentence Structure Errors</h2>

      <h3>5.1 Sentence Fragments</h3>
      <p>
        A <strong>fragment</strong> looks like a sentence but is incomplete (missing a main clause).
      </p>
      <p><strong>Fragment:</strong> <em>When the meeting ended.</em></p>
      <p><strong>Correct:</strong> <em>When the meeting ended, everyone went home.</em></p>

      <h3>5.2 Run-on Sentences & Comma Splices</h3>
      <p>
        A <strong>run-on</strong> joins two independent clauses without proper punctuation
        or conjunction. A <strong>comma splice</strong> joins them with only a comma.
      </p>
      <p><strong>Run-on:</strong> <em>The exam is tomorrow I have not prepared.</em></p>
      <p><strong>Comma splice:</strong> <em>The roads were flooded, we decided to stay home.</em></p>
      <p><strong>Correct:</strong></p>
      <ul>
        <li><em>The roads were flooded, so we decided to stay home.</em></li>
        <li><em>The roads were flooded; we decided to stay home.</em></li>
        <li><em>The roads were flooded. We decided to stay home.</em></li>
      </ul>

      <h3>5.3 Misplaced & Dangling Modifiers</h3>
      <p>
        A <strong>misplaced modifier</strong> is too far from the word it describes.
        A <strong>dangling modifier</strong> has no clear word to modify.
      </p>
      <p><strong>Wrong:</strong> <em>Walking down the street, the house looked old.</em></p>
      <p><strong>Correct:</strong> <em>Walking down the street, I saw an old house.</em></p>

      <h3>5.4 Faulty Parallelism</h3>
      <p>
        <strong>Parallelism</strong> means using the same grammatical form for items in a list or comparison.
      </p>
      <p><strong>Not parallel:</strong> <em>She likes reading, to swim, and jogging.</em></p>
      <p><strong>Parallel:</strong> <em>She likes reading, swimming, and jogging.</em></p>
    </section>

    <section class="lesson-block">
      <h2>6. Quick Exam Checklist</h2>
      <ul>
        <li>Is there a clear <strong>subject</strong> and <strong>verb</strong>?</li>
        <li>Does the sentence express a <strong>complete idea</strong> (not a fragment)?</li>
        <li>Are independent clauses joined correctly (no run-ons or comma splices)?</li>
        <li>Are modifiers placed near the words they describe?</li>
        <li>Are lists and comparisons in <strong>parallel form</strong>?</li>
        <li>Does the sentence sound <strong>clear and logical</strong> when read aloud?</li>
      </ul>
    </section>
  `

    <h2>Affixes</h2>
    <p>
      An <strong>affix</strong> is a group of letters added to a <strong>root word</strong> to change its
      meaning or its grammatical function. Affixes are like attachments you add
      before or after a word:
    </p>
    <ul>
      <li><code>happy</code> → <code>unhappy</code></li>
      <li><code>kind</code> → <code>kindness</code></li>
      <li><code>play</code> → <code>replay</code>, <code>player</code>, <code>playful</code></li>
    </ul>
    <p>
      Affixes help you change:
    </p>
    <ul>
      <li><strong>Meaning</strong> (happy → <em>un</em>happy)</li>
      <li><strong>Part of speech</strong> (kind → kindness; act → action → active)</li>
      <li><strong>Grammar form</strong> (walk → walked; big → bigger)</li>
    </ul>

    <h3>1. Types of Affixes</h3>

    <h4>1.1 Prefixes</h4>
    <p>
      A <strong>prefix</strong> is added <strong>before</strong> the root word.
    </p>
    <p><strong>Pattern:</strong> prefix + root</p>
    <ul>
      <li><code>un</code> + <code>happy</code> → <strong>unhappy</strong></li>
      <li><code>re</code> + <code>write</code> → <strong>rewrite</strong></li>
    </ul>
    <p>
      Prefixes usually change the <strong>meaning</strong>, but keep the same
      <strong>part of speech</strong>.
    </p>
    <ul>
      <li><code>happy</code> (adjective) → <code>unhappy</code> (adjective)</li>
      <li><code>do</code> (verb) → <code>redo</code> (verb)</li>
    </ul>

    <h4>1.2 Suffixes</h4>
    <p>
      A <strong>suffix</strong> is added <strong>after</strong> the root word.
    </p>
    <p><strong>Pattern:</strong> root + suffix</p>
    <ul>
      <li><code>kind</code> + <code>ness</code> → <strong>kindness</strong></li>
      <li><code>beauty</code> + <code>ful</code> → <strong>beautiful</strong></li>
    </ul>
    <p>
      Suffixes often change the <strong>part of speech</strong> and sometimes the
      <strong>grammar form</strong> (tense, plural, comparison).
    </p>

    <h4>1.3 Other Affixes (for awareness)</h4>
    <p>
      English also has <strong>infixes</strong> (inside the word, rare in formal English)
      and <strong>circumfixes</strong> (at the beginning and end, not really common in modern English).
      For exams, focus on <strong>prefixes</strong> and <strong>suffixes</strong>.
    </p>

    <h3>2. Derivational vs. Inflectional Affixes</h3>

    <h4>2.1 Derivational Affixes</h4>
    <p>
      <strong>Derivational affixes</strong> create a <strong>new word</strong> with a new meaning and often
      a different part of speech.
    </p>
    <ul>
      <li><code>happy</code> → <code>unhappy</code> (meaning changes)</li>
      <li><code>happy</code> (adj) → <code>happiness</code> (noun)</li>
      <li><code>create</code> (verb) → <code>creation</code> (noun)</li>
      <li><code>beauty</code> (noun) → <code>beautiful</code> (adjective)</li>
    </ul>
    <p><strong>Key idea:</strong> Derivational = <em>derives a new word</em>.</p>

    <h4>2.2 Inflectional Affixes</h4>
    <p>
      <strong>Inflectional affixes</strong> do <em>not</em> create a new dictionary word. They keep the same
      basic meaning but change the <strong>form</strong> for grammar:
      tense, plural, comparison, etc.
    </p>
    <p>Common inflectional suffixes:</p>
    <ul>
      <li><strong>-s / -es</strong> (plural or 3rd person singular): cat → cats; she walks</li>
      <li><strong>-ed</strong> (past tense): walk → walked</li>
      <li><strong>-ing</strong> (continuous/gerund): read → reading</li>
      <li><strong>-er / -est</strong> (comparison): tall → taller → tallest</li>
    </ul>
    <p><strong>Key idea:</strong> Inflectional = <em>same word, new form</em>.</p>

    <h3>3. Common Prefixes</h3>
    <p>Below are some very common prefixes and their meanings:</p>
    <ul>
      <li><strong>un-</strong> = not, opposite of (unhappy, unfair)</li>
      <li><strong>in- / im- / il- / ir-</strong> = not (incorrect, impossible, illegal, irregular)</li>
      <li><strong>dis-</strong> = not, opposite, reverse (disagree, disconnect)</li>
      <li><strong>re-</strong> = again, back (redo, rewrite, return)</li>
      <li><strong>pre-</strong> = before (preview, pretest)</li>
      <li><strong>mis-</strong> = wrongly, badly (misunderstand, misbehave)</li>
      <li><strong>over-</strong> = too much (overeat, overconfident)</li>
      <li><strong>under-</strong> = too little, below (underpaid, underestimate)</li>
      <li><strong>sub-</strong> = under, below (subway, submarine)</li>
      <li><strong>super-</strong> = above, beyond (superstar, superhuman)</li>
      <li><strong>inter-</strong> = between, among (international, interact)</li>
      <li><strong>trans-</strong> = across, through (transport, transmit)</li>
      <li><strong>bi-</strong> = two (bicycle, bilingual)</li>
      <li><strong>tri-</strong> = three (triangle, tripod)</li>
      <li><strong>co- / com- / con-</strong> = with, together (cooperate, connect)</li>
    </ul>
    <p>
      <strong>Exam tip:</strong> Many antonyms (opposites) are formed with prefixes like
      <em>un-, in-, im-, il-, ir-, dis-, mis-</em>.
    </p>

    <h3>4. Common Suffixes</h3>

    <h4>4.1 Noun-forming Suffixes</h4>
    <ul>
      <li><strong>-er / -or</strong> = person who does something (teach → teacher, act → actor)</li>
      <li><strong>-ist</strong> = person who does or believes in (art → artist, science → scientist)</li>
      <li><strong>-ness</strong> = state or quality (kind → kindness, happy → happiness)</li>
      <li><strong>-ment</strong> = result or action (move → movement, develop → development)</li>
      <li><strong>-tion / -sion / -ion</strong> = action or process (create → creation, decide → decision)</li>
      <li><strong>-ity / -ty</strong> = state or condition (safe → safety, active → activity)</li>
      <li><strong>-ance / -ence</strong> = state or quality (perform → performance, exist → existence)</li>
    </ul>

    <h4>4.2 Adjective-forming Suffixes</h4>
    <ul>
      <li><strong>-ful</strong> = full of (beauty → beautiful, joy → joyful)</li>
      <li><strong>-less</strong> = without (hope → hopeless, care → careless)</li>
      <li><strong>-ous / -ious</strong> = full of (danger → dangerous, mystery → mysterious)</li>
      <li><strong>-ive</strong> = having a quality (act → active, create → creative)</li>
      <li><strong>-al</strong> = relating to (nation → national, logic → logical)</li>
      <li><strong>-y</strong> = having, characterized by (noise → noisy, rain → rainy)</li>
      <li><strong>-ic</strong> = relating to (poet → poetic, history → historic)</li>
    </ul>

    <h4>4.3 Verb-forming Suffixes</h4>
    <ul>
      <li><strong>-ize / -ise</strong> (modern → modernize, real → realize)</li>
      <li><strong>-en</strong> (dark → darken, strength → strengthen)</li>
      <li><strong>-ify</strong> (simple → simplify, beauty → beautify)</li>
    </ul>

    <h4>4.4 Adverb-forming Suffixes</h4>
    <ul>
      <li><strong>-ly</strong> (quick → quickly, slow → slowly, happy → happily)</li>
    </ul>

    <h3>5. Using Affixes to Guess Meaning (Exam Strategy)</h3>
    <p>When you see a difficult word in a test:</p>
    <ol>
      <li>
        <strong>Break the word</strong> into prefix + root + suffix.  
        Example: <code>unhappiness</code> = un- (not) + happy + -ness (state) → state of not being happy.
      </li>
      <li>
        <strong>Use what you know</strong>. If you know the root and the affix, you can often guess the meaning.
      </li>
      <li>
        <strong>Watch negative prefixes</strong>: un-, in-, im-, il-, ir-, dis-, mis-, non-.
      </li>
      <li>
        <strong>Check part of speech</strong>:
        <ul>
          <li>-ness, -tion, -ment, -ity → usually nouns</li>
          <li>-ful, -less, -ous, -ive, -al → usually adjectives</li>
          <li>-ly → usually adverbs (from adjectives)</li>
        </ul>
      </li>
    </ol>

    <h3>6. Spelling Notes with Suffixes</h3>
    <ul>
      <li><strong>Drop silent -e</strong>: love → loving; use → usable</li>
      <li><strong>Double the final consonant</strong> (CVC words): run → running; big → bigger</li>
      <li><strong>-y → -i</strong> (after a consonant): happy → happiness; easy → easier</li>
    </ul>

    <p>
      Mastering affixes will help you understand new words, guess meanings in context,
      and choose the correct word forms in sentence completion questions.
    </p>
  `
},

  adverbs: {

    intro:

    fullHtml: `
  <section class="lesson-section">
    <h2>1. What is an Adverb?</h2>
    <p>
      An <strong>adverb</strong> is a "modifier." It adds detail to a sentence by answering specific questions about how, when, where, or to what degree something happens.
    </p>
    <div class="highlight-box">
      <p><strong>The 3 Jobs of an Adverb:</strong></p>
      <ol>
        <li><strong>Modifies a Verb:</strong> <em>He runs <strong>fast</strong>.</em> (How does he run?)</li>
        <li><strong>Modifies an Adjective:</strong> <em>She is <strong>extremely</strong> smart.</em> (How smart?)</li>
        <li><strong>Modifies another Adverb:</strong> <em>The project is moving <strong>quite</strong> slowly.</em> (How slowly?)</li>
      </ol>
    </div>
  </section>

  <section class="lesson-section">
    <h2>2. The 7 Types of Adverbs</h2>
    <p>To master adverbs, you must recognize the different categories. Each answers a specific question.</p>

    <h3>2.1 Adverbs of Manner (How?)</h3>
    <p>Describes the behavior or way an action is performed. Usually follows the verb or object.</p>
    <ul>
      <li><em>The soldiers fought <strong>bravely</strong>.</em></li>
      <li><em>Please handle the glass <strong>carefully</strong>.</em></li>
    </ul>

    <h3>2.2 Adverbs of Place (Where?)</h3>
    <p>Describes location or direction.</p>
    <ul>
      <li><em>Please come <strong>here</strong>.</em></li>
      <li><em>The children are playing <strong>upstairs</strong>.</em></li>
      <li><em>He walked <strong>away</strong>.</em></li>
    </ul>

    <h3>2.3 Adverbs of Time (When?)</h3>
    <p>Describes when an action happened or for how long.</p>
    <ul>
      <li><em>I will call you <strong>later</strong>.</em></li>
      <li><em>We have <strong>already</strong> eaten.</em></li>
      <li><em>I haven't seen him <strong>lately</strong>.</em></li>
    </ul>

    <h3>2.4 Adverbs of Frequency (How often?)</h3>
    <p><strong>Definite Frequency:</strong> Exact timing (daily, weekly, yearly).</p>
    <ul>
      <li><em>We get paid <strong>monthly</strong>.</em></li>
    </ul>
    <p><strong>Indefinite Frequency:</strong> Vague timing (always, seldom, often, never).</p>
    <ul>
      <li><em>She <strong>rarely</strong> complains.</em></li>
    </ul>

    <h3>2.5 Adverbs of Degree (To what extent?)</h3>
    <p>Increases or decreases the intensity of the word it modifies.</p>
    <ul>
      <li><em>It is <strong>too</strong> cold outside.</em> (Negative intensity)</li>
      <li><em>She is <strong>very</strong> talented.</em> (High intensity)</li>
      <li><em>I <strong>barely</strong> know him.</em> (Low intensity)</li>
    </ul>

    <h3>2.6 Adverbs of Certainty (Probability)</h3>
    <p>Expresses how sure the speaker is.</p>
    <ul>
      <li><em><strong>Surely</strong>, you are joking.</em></li>
      <li><em>He is <strong>probably</strong> sleeping.</em></li>
      <li><em>I will <strong>definitely</strong> be there.</em></li>
    </ul>

    <h3>2.7 Conjunctive Adverbs (Connectors)</h3>
    <p>These connect two independent clauses or sentences. They show relationship, logic, or transition.</p>
    <p><strong>Common examples:</strong> <em>however, therefore, moreover, consequently, meanwhile, otherwise.</em></p>
    <div class="alert-box">
      <strong>Punctuation Rule:</strong> Use a semicolon (;) before and a comma (,) after.
    </div>
    <ul>
      <li><em>I studied hard; <strong>however</strong>, I failed the test.</em></li>
      <li><em>It was raining; <strong>therefore</strong>, the game was canceled.</em></li>
    </ul>
  </section>

  <section class="lesson-section">
    <h2>3. The Order of Adverbs (Syntax)</h2>
    <p>When you have multiple adverbs in one sentence, you cannot just place them anywhere. You must follow the <strong>Royal Order of Adverbs</strong>.</p>

    <h3>3.1 The Standard Order: M - P - T</h3>
    <p><strong>Manner</strong> → <strong>Place</strong> → <strong>Time</strong></p>
    <table class="lesson-table">
      <thead>
        <tr>
          <th>Subject + Verb</th>
          <th>Manner (How)</th>
          <th>Place (Where)</th>
          <th>Time (When)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>She sang</td>
          <td>beautifully</td>
          <td>at the concert</td>
          <td>last night.</td>
        </tr>
        <tr>
          <td>He swam</td>
          <td>enthusiastically</td>
          <td>in the pool</td>
          <td>this morning.</td>
        </tr>
      </tbody>
    </table>
    <p><em>Incorrect: She sang last night at the concert beautifully.</em> ✖</p>

    <h3>3.2 Movement Verbs (P - M - T)</h3>
    <p>If the verb indicates <strong>movement</strong> (go, run, drive, fly), Place often comes before Manner.</p>
    <ul>
      <li><em>He went <strong>to the hospital</strong> (Place) <strong>hurriedly</strong> (Manner).</em></li>
    </ul>
  </section>

  <section class="lesson-section">
    <h2>4. Tricky Rules & Common Exam Traps</h2>

    <h3>4.1 The "-ly" Adjective Trap</h3>
    <p>Not all words ending in <strong>-ly</strong> are adverbs. Some are adjectives.</p>
    <p><strong>Examples of Adjectives ending in -ly:</strong> <em>friendly, lovely, lonely, ugly, silly, deadly, costly.</em></p>
    <ul>
      <li>✖ <em>He spoke <strong>friendlily</strong>.</em> (This word does not exist!)</li>
      <li>✔ <em>He spoke <strong>in a friendly manner/way</strong>.</em></li>
      <li>✖ <em>She looks <strong>lovelily</strong>.</em> (Wrong)</li>
      <li>✔ <em>She looks <strong>lovely</strong>.</em> (Correct - 'looks' is a linking verb taking an adjective).</li>
    </ul>

    <h3>4.2 Flat Adverbs (Adjectives and Adverbs look the same)</h3>
    <p>Some words act as both adjectives and adverbs without adding -ly.</p>
    <table class="lesson-table">
      <thead>
        <tr>
          <th>Word</th>
          <th>As Adjective (Modifies Noun)</th>
          <th>As Adverb (Modifies Verb)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>Fast</strong></td>
          <td>He is a <strong>fast</strong> runner.</td>
          <td>He runs <strong>fast</strong>.</td>
        </tr>
        <tr>
          <td><strong>Hard</strong></td>
          <td>This is a <strong>hard</strong> rock.</td>
          <td>He hit the ball <strong>hard</strong>.</td>
        </tr>
        <tr>
          <td><strong>Late</strong></td>
          <td>The bus is <strong>late</strong>.</td>
          <td>He arrived <strong>late</strong>.</td>
        </tr>
        <tr>
          <td><strong>Straight</strong></td>
          <td>Draw a <strong>straight</strong> line.</td>
          <td>Go <strong>straight</strong> home.</td>
        </tr>
      </tbody>
    </table>

    <h3>4.3 Placement of "Only" (Focus Adverbs)</h3>
    <p>The position of the word <strong>only</strong> changes the meaning of the sentence completely.</p>
    <ul>
      <li><em><strong>Only</strong> I hit him in the eye.</em> (No one else did it).</li>
      <li><em>I <strong>only</strong> hit him in the eye.</em> (I didn't kick or scratch him, just hit).</li>
      <li><em>I hit <strong>only</strong> him in the eye.</em> (I didn't hit anyone else).</li>
      <li><em>I hit him <strong>only</strong> in the eye.</em> (I didn't hit his nose or mouth).</li>
    </ul>
  </section>

  <section class="lesson-section">
    <h2>5. Comparison of Adverbs</h2>
    <p>Like adjectives, adverbs have three degrees: Positive, Comparative, and Superlative.</p>

    <h3>5.1 Regular Adverbs (-ly)</h3>
    <p>Use <strong>more</strong> and <strong>most</strong>.</p>
    <ul>
      <li>Carefully → More carefully → Most carefully</li>
      <li>Slowly → More slowly → Most slowly</li>
    </ul>

    <h3>5.2 Short Adverbs (No -ly)</h3>
    <p>Add <strong>-er</strong> and <strong>-est</strong>.</p>
    <ul>
      <li>Fast → Faster → Fastest</li>
      <li>Hard → Harder → Hardest</li>
      <li>Soon → Sooner → Soonest</li>
    </ul>

    <h3>5.3 Irregular Adverbs</h3>
    <table class="lesson-table">
      <thead>
        <tr>
          <th>Positive</th>
          <th>Comparative</th>
          <th>Superlative</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Well</td>
          <td>Better</td>
          <td>Best</td>
        </tr>
        <tr>
          <td>Badly</td>
          <td>Worse</td>
          <td>Worst</td>
        </tr>
        <tr>
          <td>Little</td>
          <td>Less</td>
          <td>Least</td>
        </tr>
        <tr>
          <td>Far</td>
          <td>Farther (distance) / Further (degree)</td>
          <td>Farthest / Furthest</td>
        </tr>
      </tbody>
    </table>
  </section>

  <section class="lesson-section">
    <h2>6. Advanced: Negative Inversion</h2>
    <p>In formal English and exams, if a sentence starts with a <strong>negative adverb</strong>, the subject and auxiliary verb are inverted (switched).</p>
    <p><strong>Negative Adverbs:</strong> <em>Never, Rarely, Seldom, Scarcely, Barely, No sooner.</em></p>
    <ul>
      <li><strong>Normal:</strong> <em>I have <strong>never</strong> seen such a mess.</em></li>
      <li><strong>Inverted:</strong> <em><strong>Never</strong> have I seen such a mess.</em></li>
    </ul>
    <ul>
      <li><strong>Normal:</strong> <em>He <strong>rarely</strong> goes to church.</em></li>
      <li><strong>Inverted:</strong> <em><strong>Rarely</strong> does he go to church.</em></li>
    </ul>
  </section>

  <section class="lesson-section">
    <h2>7. Summary Checklist</h2>
    <ul class="check-list">
      <li>Does it answer How, When, Where, or How often? It's an adverb.</li>
      <li>Does it modify a Noun? It's an <strong>Adjective</strong>.</li>
      <li>Does it modify a Verb/Adj/Adv? It's an <strong>Adverb</strong>.</li>
      <li>"Good" is an adjective. "Well" is an adverb (unless talking about health).</li>
      <li>"Hardly" means "almost not," not "with effort."</li>
      <li>"Fastly" is not a word. Use "Fast."</li>
    </ul>
  </section>
