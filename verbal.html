  <section class="lesson-section">
    <h2>1. What is a Conjunction?</h2>
    <p>
      A <strong>conjunction</strong> is a word that joins:
    </p>
    <ul>
      <li>word + word</li>
      <li>phrase + phrase</li>
      <li>clause + clause</li>
    </ul>
    <p>Think of it as a <strong>connector</strong> or <strong>bridge</strong> inside a sentence.</p>

    <div class="highlight-box">
      <p><strong>Examples:</strong></p>
      <ul>
        <li>
          <strong>word + word:</strong><br />
          <em>John and Mary are studying.</em>
        </li>
        <li>
          <strong>phrase + phrase:</strong><br />
          <em>We went to the market and to the park.</em>
        </li>
        <li>
          <strong>clause + clause:</strong><br />
          <em>She studied hard, so she passed the exam.</em>
        </li>
      </ul>
    </div>

    <p>Without conjunctions, your sentences would be short and choppy.</p>
    <p><strong>Conjunction = joins ideas to make your sentence smoother and clearer.</strong></p>
  </section>

  <section class="lesson-section">
    <h2>2. Three Main Types of Conjunctions</h2>
    <ul>
      <li><strong>Coordinating conjunctions</strong> – join equal parts (word + word, clause + clause)</li>
      <li><strong>Subordinating conjunctions</strong> – join a main clause and a dependent clause</li>
      <li><strong>Correlative conjunctions</strong> – pairs of conjunctions that work together</li>
    </ul>
    <p>These three are all over the Civil Service Exam, especially in sentence construction and error identification.</p>
  </section>

  <section class="lesson-section">
    <h2>3. Coordinating Conjunctions (FANBOYS)</h2>
    <p>These join <strong>similar or equal</strong> parts of a sentence.</p>

    <div class="highlight-box">
      <p><strong>Shortcut to remember them: FANBOYS</strong></p>
      <ul>
        <li><strong>F</strong> – for (reason)</li>
        <li><strong>A</strong> – and (addition)</li>
        <li><strong>N</strong> – nor (negative addition)</li>
        <li><strong>B</strong> – but (contrast)</li>
        <li><strong>O</strong> – or (choice)</li>
        <li><strong>Y</strong> – yet (contrast, similar to "but")</li>
        <li><strong>S</strong> – so (result)</li>
      </ul>
    </div>

    <h3>3.1 Uses and Examples</h3>

    <h4>a) AND – to add information</h4>
    <ul>
      <li><em>She is smart and hardworking.</em></li>
      <li><em>We visited Manila and Cebu.</em></li>
    </ul>

    <h4>b) BUT / YET – to show contrast</h4>
    <ul>
      <li><em>He is rich, but he is not happy.</em></li>
      <li><em>She studied hard, yet she still failed the test.</em></li>
    </ul>

    <h4>c) OR – to show a choice</h4>
    <ul>
      <li><em>Do you want coffee or tea?</em></li>
      <li><em>We can study now or we can rest first.</em></li>
    </ul>

    <h4>d) NOR – negative choice (usually after "neither" or a negative)</h4>
    <ul>
      <li><em>She doesn't like coffee, nor does she like tea.</em></li>
      <li><em>He is neither smart nor hardworking.</em></li>
    </ul>

    <h4>e) FOR – gives a reason (similar to "because")</h4>
    <ul>
      <li><em>She stayed at home, for she was feeling sick.</em></li>
    </ul>
    <p>More formal; in everyday speech we usually use <strong>because</strong>, but <strong>for</strong> can appear in exams.</p>

    <h4>f) SO – shows result or consequence</h4>
    <ul>
      <li><em>It was raining, so we stayed inside.</em></li>
      <li><em>She was late, so she missed the bus.</em></li>
    </ul>

    <h3>3.2 Punctuation Rule for FANBOYS</h3>
    <p>
      When a coordinating conjunction joins <strong>two full clauses</strong> (each with its own subject and verb),
      use a <strong>comma</strong> before the conjunction.
    </p>
    <p>
      <em>She was tired, so she went to bed early.</em><br />
      Clause 1: <em>She was tired</em><br />
      Clause 2: <em>she went to bed early</em>
    </p>

    <div class="highlight-box">
      <p><strong>✅ Correct:</strong> <em>He wanted to pass the exam, so he studied every night.</em></p>
      <p><strong>❌ Comma splice / error:</strong> <em>He wanted to pass the exam, he studied every night.</em></p>
      <p><strong>Fix:</strong> add <strong>and/so</strong>, or use a semicolon or period.</p>
    </div>
  </section>

  <section class="lesson-section">
    <h2>4. Subordinating Conjunctions</h2>
    <p>
      These join a <strong>main clause</strong> and a <strong>subordinate (dependent) clause</strong>.
      The subordinate clause <strong>cannot stand alone</strong>.
    </p>

    <div class="highlight-box">
      <p><strong>Common subordinating conjunctions:</strong></p>
      <ul>
        <li><strong>Time:</strong> when, while, after, before, since, until</li>
        <li><strong>Cause/Reason:</strong> because, since, as</li>
        <li><strong>Contrast:</strong> although, though, even though, whereas, while</li>
        <li><strong>Condition:</strong> if, unless, provided that, as long as</li>
        <li><strong>Result/Purpose:</strong> so that, in order that</li>
        <li><strong>Comparison:</strong> than, as … as</li>
      </ul>
    </div>

    <h3>4.1 Examples by Function</h3>

    <h4>a) Time</h4>
    <ul>
      <li><em>When the bell rings, we will start the test.</em></li>
      <li><em>We stayed at home until the rain stopped.</em></li>
      <li><em>After he finished his work, he went home.</em></li>
    </ul>

    <h4>b) Cause / Reason</h4>
    <ul>
      <li><em>She stayed home because she was sick.</em></li>
      <li><em>Since it was raining, we canceled the picnic.</em></li>
      <li><em>As he had no money, he could not buy the book.</em></li>
    </ul>

    <h4>c) Contrast</h4>
    <ul>
      <li><em>Although he is young, he is very responsible.</em></li>
      <li><em>She went to work even though she was sick.</em></li>
      <li><em>While she likes coffee, he prefers tea.</em></li>
    </ul>

    <h4>d) Condition</h4>
    <ul>
      <li><em>If you study hard, you will pass the exam.</em></li>
      <li><em>You will fail the test unless you study.</em></li>
      <li><em>As long as you follow the rules, you will be safe.</em></li>
    </ul>

    <h3>4.2 Position in the Sentence</h3>
    <p>A subordinating conjunction can come at the <strong>beginning</strong> or in the <strong>middle</strong> of a sentence.</p>

    <p><strong>Subordinate clause first (use a comma):</strong></p>
    <ul>
      <li><em>Although it was raining, we played basketball.</em></li>
      <li><em>Because she was tired, she went to bed early.</em></li>
    </ul>

    <p><strong>Main clause first (usually no comma):</strong></p>
    <ul>
      <li><em>We played basketball although it was raining.</em></li>
      <li><em>She went to bed early because she was tired.</em></li>
    </ul>

    <p>
      <strong>Rule:</strong> If the sentence <strong>starts</strong> with the subordinate clause → add a <strong>comma</strong> after it.
      If the main clause comes first → usually <strong>no comma</strong>.
    </p>

    <h3>4.3 Common Mistake: Double Conjunctions</h3>
    <p><strong>❌ Wrong:</strong> <em>Because he was sick, so he stayed home.</em></p>
    <p><strong>✅ Correct (choose only one connector):</strong></p>
    <ul>
      <li><em>Because he was sick, he stayed home.</em></li>
      <li><em>He was sick, so he stayed home.</em></li>
    </ul>
  </section>

  <section class="lesson-section">
    <h2>5. Correlative Conjunctions</h2>
    <p>These are <strong>pairs of conjunctions</strong> that work together.</p>

    <div class="highlight-box">
      <p><strong>Common pairs:</strong></p>
      <ul>
        <li><strong>both … and</strong></li>
        <li><strong>either … or</strong></li>
        <li><strong>neither … nor</strong></li>
        <li><strong>not only … but also</strong></li>
        <li><strong>whether … or</strong></li>
      </ul>
    </div>

    <h3>5.1 Examples</h3>
    <ul>
      <li>
        <strong>Both … and</strong> – two positive things<br />
        <em>She is both intelligent and hardworking.</em>
      </li>
      <li>
        <strong>Either … or</strong> – choice between two<br />
        <em>You can either take the bus or walk.</em>
      </li>
      <li>
        <strong>Neither … nor</strong> – two negative options<br />
        <em>He is neither happy nor satisfied.</em>
      </li>
      <li>
        <strong>Not only … but also</strong> – emphasizes two positives<br />
        <em>She is not only a good teacher but also a great mentor.</em>
      </li>
      <li>
        <strong>Whether … or</strong> – two possibilities<br />
        <em>Whether you pass or fail, you must learn from the experience.</em>
      </li>
    </ul>

    <h3>5.2 Parallel Structure (Very Important for Exams)</h3>
    <p>
      With correlative conjunctions, the words after each part should be
      <strong>similar in form (parallel)</strong>.
    </p>

    <div class="highlight-box">
      <p><strong>Check for parallelism:</strong></p>
      <ul>
        <li>
          ❌ <em>She is not only <strong>smart</strong> but also <strong>works hard</strong>.</em><br />
          ✔ <em>She is not only <strong>smart</strong> but also <strong>hardworking</strong>.</em><br />
          ✔ <em>She not only <strong>studies hard</strong> but also <strong>works part-time</strong>.</em>
        </li>
        <li>
          ❌ <em>He likes either <strong>to read</strong> or <strong>watching movies</strong>.</em><br />
          ✔ <em>He likes either <strong>to read</strong> or <strong>to watch movies</strong>.</em><br />
          ✔ <em>He likes either <strong>reading</strong> or <strong>watching movies</strong>.</em>
        </li>
        <li>
          ❌ <em>They are both <strong>honest</strong> and <strong>with talent</strong>.</em><br />
          ✔ <em>They are both <strong>honest</strong> and <strong>talented</strong>.</em>
        </li>
      </ul>
    </div>
  </section>

  <section class="lesson-section">
    <h2>6. Common Exam Patterns & Quick Checklist</h2>

    <h3>6.1 Typical Question Types</h3>
    <ul>
      <li><strong>Sentence improvement:</strong> choose the best connector (although vs but vs because vs so).</li>
      <li><strong>Error identification:</strong> double conjunctions (<em>because … so</em>), wrong pair (<em>either … nor</em>), faulty parallelism.</li>
      <li><strong>Sentence completion:</strong> pick the conjunction that shows correct logic (cause, contrast, condition, result).</li>
    </ul>

    <h3>6.2 Quick Checklist Before Choosing an Answer</h3>
    <ul class="check-list">
      <li>Is the relationship <strong>addition, contrast, cause, result, time, or condition</strong>? Choose a conjunction that matches the logic.</li>
      <li>For FANBOYS, check: Are there <strong>two full clauses</strong>? If yes, a comma is usually needed before the conjunction.</li>
      <li>For subordinating conjunctions, avoid <strong>double connectors</strong> like "Because … so".</li>
      <li>For correlative conjunctions, check if the structure after each part is <strong>parallel</strong>.</li>
      <li>Read the sentence with and without the conjunction. Does the meaning stay clear and logical?</li>
    </ul>

    <p><strong>Exam tip:</strong> When confused between two conjunctions, ask yourself: <em>"Am I showing a reason (because), a result (so), or a contrast (but/although)?"</em> That usually reveals the correct answer.</p>
  </section>

      <section class="lesson-section">
        <h2>1. What is a preposition?</h2>
        <p>A preposition is a small word that shows the relationship between another word in the sentence and its object. It almost always has an <strong>object</strong> (usually a noun, pronoun, or gerund).</p>
        <p>It often shows relationships of:</p>
        <ul>
          <li><strong>Time</strong> (when?)</li>
          <li><strong>Place</strong> (where?)</li>
          <li><strong>Direction</strong> (where to?)</li>
          <li><strong>Reason</strong> (why?)</li>
          <li><strong>Manner</strong> (how?)</li>
        </ul>
        <div class="highlight-box">
          <p><strong>Structure:</strong><br>
          Preposition + Object = <em>Prepositional Phrase</em></p>
        </div>
        <p><strong>Example:</strong> "The book is <em>on</em> (prep) <em>the table</em> (object)." → <em>on the table</em> (phrase)</p>
      </section>

      <section class="lesson-section">
        <h2>2. Prepositions Cheat Sheet</h2>
        <h3>A. Place (Where?)</h3>
        <p><em>in, on, at, under, above, behind, between, among, inside, near, beside, across, opposite.</em></p>
        
        <h3>B. Time (When?)</h3>
        <p><em>at, on, in, by, before, after, during, until, since, for.</em></p>
        
        <h3>C. Direction (Where to?)</h3>
        <p><em>to, into, onto, towards, through, across, along, over, past.</em></p>
        
        <h3>D. Other Groups</h3>
        <ul>
          <li><strong>Reason:</strong> for, because of, due to</li>
          <li><strong>Agent:</strong> by (The book was written <em>by</em> Jose.)</li>
          <li><strong>Topic:</strong> about, regarding, concerning</li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>3. AT, ON, IN (The "Big Three")</h2>
        
        <h3>3A. Time Rules</h3>
        <table class="lesson-table">
          <tr>
            <th>Preposition</th>
            <th>Usage</th>
            <th>Examples</th>
          </tr>
          <tr>
            <td><strong>AT</strong></td>
            <td>Specific, Exact Time</td>
            <td>at 5:00, at noon, at night, at the moment</td>
          </tr>
          <tr>
            <td><strong>ON</strong></td>
            <td>Days & Dates</td>
            <td>on Monday, on July 5, on my birthday, on Christmas Day</td>
          </tr>
          <tr>
            <td><strong>IN</strong></td>
            <td>Long Periods</td>
            <td>in 2025, in July, in the morning, in the past</td>
          </tr>
        </table>
        <p><strong>Common Errors:</strong><br>
        ❌ <em>on 1995</em> → ✅ <strong>in 1995</strong><br>
        ❌ <em>at Monday</em> → ✅ <strong>on Monday</strong></p>

        <h3>3B. Place Rules</h3>
        <table class="lesson-table">
          <tr>
            <th>Preposition</th>
            <th>Usage</th>
            <th>Examples</th>
          </tr>
          <tr>
            <td><strong>AT</strong></td>
            <td>Specific Point</td>
            <td>at home, at the bus stop, at the door, at school</td>
          </tr>
          <tr>
            <td><strong>IN</strong></td>
            <td>Enclosed Space / City / Country</td>
            <td>in the room, in the box, in Cebu, in the Philippines</td>
          </tr>
          <tr>
            <td><strong>ON</strong></td>
            <td>Surface</td>
            <td>on the table, on the wall, on the floor, on the screen</td>
          </tr>
        </table>
        <p><strong>Common Errors:</strong><br>
        ❌ <em>on the room</em> → ✅ <strong>in the room</strong><br>
        ❌ <em>in the table</em> → ✅ <strong>on the table</strong></p>
      </section>

      <section class="lesson-section">
        <h2>4. SINCE vs. FOR</h2>
        <p>This is a very common exam topic regarding the <strong>Present Perfect Tense</strong>.</p>
        <ul>
          <li><strong>FOR</strong> (Duration): Shows <em>how long</em>. <br>
          <em>Examples: for two hours, for five days, for many years.</em></li>
          
          <li><strong>SINCE</strong> (Starting Point): Shows <em>when it started</em>.<br>
          <em>Examples: since 2010, since last week, since 6:00 a.m.</em></li>
        </ul>
        <p><strong>Pattern:</strong><br>
        ❌ <em>I have lived here for 2010.</em><br>
        ✅ <em>I have lived here <strong>since</strong> 2010.</em></p>
      </section>

      <section class="lesson-section">
        <h2>5. BY vs. UNTIL</h2>
        <ul>
          <li><strong>BY</strong> (Deadline): "Not later than." The action happens before or at that moment.<br>
          <em>"Finish this by 5:00."</em></li>
          
          <li><strong>UNTIL</strong> (Continuation): "Up to that time." The action continues and stops at that moment.<br>
          <em>"I waited until 5:00."</em></li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>6. DURING vs. WHILE</h2>
        <ul>
          <li><strong>DURING + Noun:</strong> <em>during the meeting, during the night.</em></li>
          <li><strong>WHILE + Clause (Subject+Verb):</strong> <em>while I was studying, while he was sleeping.</em></li>
        </ul>
        <p>❌ <em>during I was studying</em> → ✅ <em>while I was studying</em></p>
      </section>

      <section class="lesson-section">
        <h2>7. Direction & Movement</h2>
        <ul>
          <li><strong>TO:</strong> Movement toward a specific place. <em>(Go to school)</em></li>
          <li><strong>INTO:</strong> From outside to inside. <em>(Walked into the room)</em></li>
          <li><strong>ONTO:</strong> From off to on top of. <em>(Jumped onto the table)</em></li>
          <li><strong>THROUGH:</strong> Passing inside something. <em>(Drive through the tunnel)</em></li>
          <li><strong>ALONG:</strong> Parallel movement. <em>(Walk along the beach)</em></li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>8. BETWEEN vs. AMONG</h2>
        <ul>
          <li><strong>BETWEEN:</strong> Usually for <strong>TWO</strong> items or distinct individuals.<br>
          <em>"Between you and me." "Between the three distinct buildings."</em></li>
          
          <li><strong>AMONG:</strong> For a group where individuals are not separated.<br>
          <em>"Among friends." "Among the trees."</em></li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>9. Common Combinations (Collocations)</h2>
        <p>Exams test which preposition naturally pairs with a verb or adjective.</p>
        
        <h3>Verb + Preposition</h3>
        <ul class="two-column-list">
          <li>Depend <strong>on</strong></li>
          <li>Listen <strong>to</strong></li>
          <li>Wait <strong>for</strong></li>
          <li>Apologize <strong>for</strong></li>
          <li>Belong <strong>to</strong></li>
          <li>Suffer <strong>from</strong></li>
          <li>Look <strong>at</strong> (see)</li>
          <li>Look <strong>for</strong> (search)</li>
          <li>Look <strong>after</strong> (care)</li>
        </ul>
        <p>❌ <em>I will wait you.</em> → ✅ <em>I will wait <strong>for</strong> you.</em></p>

        <h3>Adjective + Preposition</h3>
        <ul class="two-column-list">
          <li>Good <strong>at</strong> (skill)</li>
          <li>Interested <strong>in</strong></li>
          <li>Afraid <strong>of</strong></li>
          <li>Famous <strong>for</strong></li>
          <li>Similar <strong>to</strong></li>
          <li>Different <strong>from</strong> (Not 'than')</li>
          <li>Angry <strong>with</strong> (person)</li>
          <li>Angry <strong>about</strong> (thing)</li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>10. The Gerund Rule</h2>
        <p>If you put a verb after a preposition, it MUST be in the <strong>-ING</strong> form (Gerund).</p>
        <ul>
          <li><em>Interested in <strong>learning</strong>.</em> (Not 'learn')</li>
          <li><em>Good at <strong>drawing</strong>.</em></li>
          <li><em>Before <strong>going</strong>.</em></li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>11. Common Filipino/Exam Errors</h2>
        <ol>
          <li><strong>No Prep before Next/Last/This:</strong><br>
          ❌ <em>See you on next week.</em><br>
          ✅ <em>See you <strong>next week</strong>.</em></li>
          
          <li><strong>Discuss/Marry:</strong> These verbs do not need prepositions.<br>
          ❌ <em>Discuss about the topic.</em> → ✅ <em><strong>Discuss</strong> the topic.</em><br>
          ❌ <em>Married with him.</em> → ✅ <em>Married <strong>him</strong> (or to him).</em></li>
          
          <li><strong>Off of:</strong> In formal English, remove 'of'.<br>
          ❌ <em>Off of the table.</em> → ✅ <em><strong>Off</strong> the table.</em></li>
        </ol>
      </section>

      <section class="lesson-section">
        <h2>12. Final Exam Strategy</h2>
        <ul class="check-list">
          <li>Check for <strong>Subject-Verb Agreement</strong> even if there is a prepositional phrase in the middle.</li>
          <li>If the sentence has <strong>"has/have" (Present Perfect)</strong>, check if you need <strong>Since</strong> or <strong>For</strong>.</li>
          <li>Memorize the "Big Three": <strong>AT</strong> (Exact), <strong>ON</strong> (Days/Surface), <strong>IN</strong> (General/Enclosed).</li>
        </ul>
      </section>   `    
},

      <section class="lesson-section">
        <h2>1. What Are Antonyms?</h2>
        <p>
          <strong>Antonyms</strong> are words that have opposite meanings. The word comes from the Greek words
          <em>anti</em> (against) and <em>onym</em> (name).
        </p>
        <p>
          Mastering antonyms is not just about memorizing "Hot vs. Cold." In the Civil Service Exam,
          you must understand <strong>nuance</strong>, <strong>context</strong>, and <strong>prefixes</strong>.
        </p>
        <div class="highlight-box">
          <p><strong>Basic Examples:</strong></p>
          <ul>
            <li><strong>Good</strong> vs. <strong>Bad</strong></li>
            <li><strong>Entry</strong> vs. <strong>Exit</strong></li>
            <li><strong>Accelerate</strong> vs. <strong>Decelerate</strong></li>
          </ul>
        </div>
      </section>

      <section class="lesson-section">
        <h2>2. The Three Types of Antonyms</h2>
        <p>Understanding these types helps you eliminate wrong answers in difficult questions.</p>

        <h3>2.1 Gradable Antonyms (The Scale)</h3>
        <p>
          These are opposites that exist on a spectrum or scale. You can be "a little bit" of one or the other.
        </p>
        <ul>
          <li><strong>Hot</strong> vs. <strong>Cold</strong> (In between: Warm, Cool)</li>
          <li><strong>Fat</strong> vs. <strong>Thin</strong> (In between: Chubby, Slim)</li>
          <li><strong>Happy</strong> vs. <strong>Sad</strong></li>
        </ul>

        <h3>2.2 Complementary Antonyms (Binary)</h3>
        <p>
          These are "all or nothing." If you are one, you cannot be the other. There is no middle ground.
        </p>
        <ul>
          <li><strong>Dead</strong> vs. <strong>Alive</strong> (You cannot be "a little dead")</li>
          <li><strong>On</strong> vs. <strong>Off</strong></li>
          <li><strong>Pass</strong> vs. <strong>Fail</strong></li>
        </ul>

        <h3>2.3 Relational Antonyms (The Relationship)</h3>
        <p>
          These words are opposites because they describe a relationship from different viewpoints. One cannot exist without the other.
        </p>
        <ul>
          <li><strong>Teacher</strong> vs. <strong>Student</strong></li>
          <li><strong>Buy</strong> vs. <strong>Sell</strong></li>
          <li><strong>Husband</strong> vs. <strong>Wife</strong></li>
          <li><strong>Predator</strong> vs. <strong>Prey</strong></li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>3. Forming Antonyms using Prefixes</h2>
        <p>
          Many antonyms are created by adding a "negative prefix" to a base word.
          Recognizing these prefixes is a huge shortcut in exams.
        </p>

        <table class="lesson-table">
          <thead>
            <tr>
              <th>Prefix</th>
              <th>Meaning</th>
              <th>Examples</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>Un-</strong></td>
              <td>Not / Reverse</td>
              <td>Happy → <strong>Un</strong>happy<br>Lock → <strong>Un</strong>lock</td>
            </tr>
            <tr>
              <td><strong>Dis-</strong></td>
              <td>Away / Apart / Not</td>
              <td>Agree → <strong>Dis</strong>agree<br>Connect → <strong>Dis</strong>connect</td>
            </tr>
            <tr>
              <td><strong>In- / Im-</strong></td>
              <td>Not</td>
              <td>Visible → <strong>In</strong>visible<br>Possible → <strong>Im</strong>possible (before P/B/M)</td>
            </tr>
            <tr>
              <td><strong>Il- / Ir-</strong></td>
              <td>Not</td>
              <td>Legal → <strong>Il</strong>legal (before L)<br>Regular → <strong>Ir</strong>regular (before R)</td>
            </tr>
            <tr>
              <td><strong>Mis-</strong></td>
              <td>Wrongly</td>
              <td>Understand → <strong>Mis</strong>understand<br>Lead → <strong>Mis</strong>lead</td>
            </tr>
            <tr>
              <td><strong>Non-</strong></td>
              <td>Not</td>
              <td>Sense → <strong>Non</strong>sense<br>Profit → <strong>Non</strong>profit</td>
            </tr>
            <tr>
              <td><strong>Anti-</strong></td>
              <td>Against</td>
              <td>Social → <strong>Anti</strong>social<br>Virus → <strong>Anti</strong>virus</td>
            </tr>
          </tbody>
        </table>
      </section>

      <section class="lesson-section">
        <h2>4. The Context Trap (Crucial for Exams)</h2>
        <p>
          Words can have different meanings (polysemy). Therefore, the antonym depends on how the word is used in the sentence.
        </p>

        <h3>Example 1: The word "HARD"</h3>
        <ul>
          <li>
            Context: "The rock is <strong>hard</strong>."<br>
            Antonym: <strong>Soft</strong>
          </li>
          <li>
            Context: "The exam is <strong>hard</strong>."<br>
            Antonym: <strong>Easy</strong>
          </li>
        </ul>

        <h3>Example 2: The word "LIGHT"</h3>
        <ul>
          <li>
            Context: "The room is bright and <strong>light</strong>."<br>
            Antonym: <strong>Dark</strong>
          </li>
          <li>
            Context: "The feather is <strong>light</strong>."<br>
            Antonym: <strong>Heavy</strong>
          </li>
        </ul>

        <h3>Example 3: The word "SHARP"</h3>
        <ul>
          <li>
            Context: "The knife is <strong>sharp</strong>."<br>
            Antonym: <strong>Blunt</strong> or <strong>Dull</strong>
          </li>
          <li>
            Context: "He has a <strong>sharp</strong> mind."<br>
            Antonym: <strong>Slow</strong> or <strong>Stupid</strong>
          </li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>5. Exam Strategy: How to Find the Antonym</h2>
        <ol>
          <li>
            <strong>Define the word first:</strong> Before looking at the choices, define the main word in your head.
          </li>
          <li>
            <strong>Predict the opposite:</strong> Think of the opposite word before reading the options (A, B, C, D).
          </li>
          <li>
            <strong>Check the Part of Speech:</strong>
            <ul>
              <li>If the word is a <strong>Noun</strong>, the answer is a <strong>Noun</strong>. (<em>Courage</em> ≠ <em>Cowardly</em> ❌; <em>Courage</em> ≠ <em>Cowardice</em> ✅)</li>
              <li>If the word is a <strong>Verb</strong>, the answer is a <strong>Verb</strong>. (<em>Expand</em> ≠ <em>Small</em> ❌; <em>Expand</em> ≠ <em>Shrink</em> ✅)</li>
            </ul>
          </li>
          <li>
            <strong>Use Positive/Negative Charge:</strong>
            If the main word is <strong>Positive</strong> (e.g., <em>Benevolent</em>), the antonym must be <strong>Negative</strong> (e.g., <em>Cruel</em>). Eliminate the positive choices.
          </li>
        </ol>
      </section>

      <section class="lesson-section">
        <h2>6. Common Antonym List (Reviewer)</h2>
        <ul class="two-column-list">
          <li><strong>Abundant</strong> ≠ Scarce</li>
          <li><strong>Artificial</strong> ≠ Genuine/Natural</li>
          <li><strong>Arrogant</strong> ≠ Humble</li>
          <li><strong>Bravery</strong> ≠ Cowardice</li>

analogy: {
    title: "Analogy – Word Relationships and Logic",
    level: "Verbal Ability",
    fullHtml: `
      <section class="lesson-section">
        <h2>1. What is an Analogy?</h2>
        <p>
          An analogy tests your ability to identify the <strong>relationship</strong> between two words and apply that same logic to another pair.
        </p>
        <div class="highlight-box">
          <p><strong>The Format:</strong></p>
          <p style="font-size: 1.2em; text-align: center;"><strong>A : B :: C : D</strong></p>
          <p>This is read as: <em>"A is to B as C is to D."</em></p>
        </div>
        <p><strong>Example:</strong></p>
        <p><em>Finger : Hand :: Leaf : Tree</em></p>
        <p>
          <strong>Logic:</strong> A finger is a <strong>part of</strong> a hand, just as a leaf is a <strong>part of</strong> a tree.
        </p>
      </section>

      <section class="lesson-section">
        <h2>2. The "Bridge Sentence" Technique</h2>
        <p>
          The best way to solve analogies is to create a specific sentence that connects the first two words. This sentence is your <strong>"Bridge."</strong>
        </p>
        <p><strong>Step 1:</strong> Create a sentence for the first pair.</p>
        <ul>
          <li><strong>Pair:</strong> <em>Carpenter : Saw</em></li>
          <li><strong>Bridge Sentence:</strong> "A carpenter <strong>uses a</strong> saw to do his job."</li>
        </ul>
        <p><strong>Step 2:</strong> Test the choices with the SAME sentence.</p>
        <ul>
          <li><strong>Choice A (Painter : Brush):</strong> "A painter <strong>uses a</strong> brush to do his job." (✅ Correct)</li>
          <li><strong>Choice B (Lawyer : Briefcase):</strong> "A lawyer <strong>uses a</strong> briefcase to do his job?" (❌ Weak connection)</li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>3. Common Types of Relationships</h2>
        <p>In the Civil Service Exam, these are the most frequent patterns you will encounter:</p>

        <table class="lesson-table">
          <thead>
            <tr>
              <th>Relationship</th>
              <th>Example A : B</th>
              <th>Bridge / Logic</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>Synonyms</strong></td>
              <td><em>Big : Huge</em></td>
              <td>Means the same thing (Intensity usually increases).</td>
            </tr>
            <tr>
              <td><strong>Antonyms</strong></td>
              <td><em>Hot : Cold</em></td>
              <td>Opposite meanings.</td>
            </tr>
            <tr>
              <td><strong>Part to Whole</strong></td>
              <td><em>Wheel : Car</em></td>
              <td>A wheel is a <strong>part of</strong> a car.</td>
            </tr>
            <tr>
              <td><strong>Worker & Tool</strong></td>
              <td><em>Chef : Knife</em></td>
              <td>A chef <strong>uses a</strong> knife.</td>
            </tr>
            <tr>
              <td><strong>Worker & Product</strong></td>
              <td><em>Baker : Bread</em></td>
              <td>A baker <strong>makes</strong> bread.</td>
            </tr>
            <tr>
              <td><strong>Animal & Young</strong></td>
              <td><em>Cat : Kitten</em></td>
              <td>A kitten is a <strong>baby</strong> cat.</td>
            </tr>
            <tr>
              <td><strong>Animal & Sound</strong></td>
              <td><em>Dog : Bark</em></td>
              <td>A dog <strong>makes the sound</strong> bark.</td>
            </tr>
            <tr>
              <td><strong>Cause & Effect</strong></td>
              <td><em>Virus : Illness</em></td>
              <td>A virus <strong>causes</strong> illness.</td>
            </tr>
            <tr>
              <td><strong>Degree (Intensity)</strong></td>
              <td><em>Warm : Hot</em></td>
              <td>Hot is an <strong>extreme version</strong> of warm.</td>
            </tr>
            <tr>
              <td><strong>Function</strong></td>
              <td><em>Pen : Write</em></td>
              <td>A pen is used <strong>to</strong> write.</td>
            </tr>
             <tr>
              <td><strong>Geography</strong></td>
              <td><em>Manila : Philippines</em></td>
              <td>Manila is the <strong>capital of</strong> the Philippines.</td>
            </tr>
          </tbody>
        </table>
      </section>

      <section class="lesson-section">
        <h2>4. Advanced Tips & Traps</h2>

        <h3>4.1 Watch the Order!</h3>
        <p>
          The order of the words must be exactly the same.
        </p>
        <p><strong>Question:</strong> <em>Shoe : Foot :: ________ : ________</em></p>
        <p><strong>Bridge:</strong> A shoe is worn on the foot. (Item → Body Part)</p>
        <ul>
          <li>❌ <em>Hand : Glove</em> (This is Body Part → Item. <strong>Wrong order!</strong>)</li>
          <li>✅ <em>Glove : Hand</em> (Item → Body Part. <strong>Correct!</strong>)</li>
        </ul>

        <h3>4.2 Parts of Speech Must Match</h3>
        <p>
          If the first pair is <strong>Noun : Adjective</strong>, the answer must be <strong>Noun : Adjective</strong>.
        </p>

          padding: 12px;
          margin: 12px 0;
          color: #fca5a5;
        }
        .check-list {
          list-style-type: none;
          padding-left: 0;
        }
        .check-list li:before {
          content: "✓ ";
          color: var(--success);
          margin-right: 8px;
        }
        .two-column-list {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 10px;
        }
        @media (max-width: 768px) {
          .two-column-list {
            grid-template-columns: 1fr;
          }
        }
      `;
      document.head.appendChild(style);

      renderTips(lesson.quickTips || [
        "Read the entire sentence before choosing an answer.",
        "Eliminate obviously wrong options first.",
        "Trust your first instinct unless you find clear evidence against it."
      ]);
    }

    function getQuestionsForCurrent() {
      const topicQuestions = window.VERBAL_QUESTION_BANK[currentTopicId] || {};
      const levelQuestions = topicQuestions[currentLevel] || [];
      return levelQuestions.slice(0, currentItemCount);
    }

    function resetQuizState() {
      const questions = getQuestionsForCurrent();
      userAnswers = questions.map(() => null);
      currentIndex = 0;
      quizFinished = false;

      if (feedbackEl) {
        feedbackEl.textContent = "";
        feedbackEl.className = "feedback";
      }
      if (progressTextEl) {
        progressTextEl.textContent = "";
      }
      if (resultPanelEl) {
        resultPanelEl.classList.add("hidden");
      }
      if (quizHeaderEl) {
        quizHeaderEl.classList.remove("hidden");
      }
      if (quizCardEl) {
        quizCardEl.classList.remove("hidden");
      }
    }

    function renderQuiz() {
      const topic = VERBAL_TOPICS.find((t) => t.id === currentTopicId);
      quizTopicTitleEl.textContent = topic ? topic.label : "Verbal Ability";
      quizLevelLabelEl.textContent = capitalize(currentLevel);

      const questions = getQuestionsForCurrent();

      if (userAnswers.length !== questions.length) {
        userAnswers = questions.map(() => null);
      }

      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";

      if (!questions.length) {
        questionTextEl.textContent = "No practice questions are available yet for this topic and level. They will be added soon.";
        optionsListEl.innerHTML = "";
        progressTextEl.textContent = "0 / 0";
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        return;
      }

      if (currentIndex < 0) currentIndex = 0;
      if (currentIndex >= questions.length) currentIndex = questions.length - 1;

      const currentQ = questions[currentIndex];
      questionTextEl.textContent = currentQ.question;
      optionsListEl.innerHTML = "";

      currentQ.options.forEach((option) => {
        const li = document.createElement("li");
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "option-button";
        btn.textContent = option;

        btn.addEventListener("click", function () {
          handleAnswer(option);
        });

        li.appendChild(btn);
        optionsListEl.appendChild(li);
      });

      const stored = userAnswers[currentIndex];
      if (stored && stored.selected != null) {
        const buttons = optionsListEl.querySelectorAll(".option-button");
        buttons.forEach((btn) => {
          if (btn.textContent === currentQ.answer) {
            btn.classList.add("is-correct");
          }
          if (btn.textContent === stored.selected && !stored.correct) {
            btn.classList.add("is-incorrect");
          }
        });

        feedbackEl.textContent =
          (stored.correct ? "Correct! " : "Not quite. ") +
          (currentQ.explanation || "");
        feedbackEl.className =
          "feedback " + (stored.correct ? "feedback--correct" : "feedback--incorrect");
      }

      progressTextEl.textContent =
        "Question " + (currentIndex + 1) + " of " + questions.length;

      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = false;
      nextBtn.textContent =
        currentIndex === questions.length - 1 ? "Finish Quiz" : "Next";
    }

    function handleAnswer(selectedOption) {
      const questions = getQuestionsForCurrent();
      if (!questions.length) return;
      if (quizFinished) return;

      const currentQ = questions[currentIndex];
      const isCorrect = selectedOption === currentQ.answer;

      userAnswers[currentIndex] = {
        selected: selectedOption,
        correct: isCorrect
      };

      const buttons = optionsListEl.querySelectorAll(".option-button");
      buttons.forEach((btn) => {
        btn.classList.remove("is-correct", "is-incorrect");
        if (btn.textContent === currentQ.answer) {
          btn.classList.add("is-correct");
        }
        if (btn.textContent === selectedOption && !isCorrect) {
          btn.classList.add("is-incorrect");
        }
      });

      if (isCorrect) {
        feedbackEl.textContent = "Correct! " + (currentQ.explanation || "");
        feedbackEl.className = "feedback feedback--correct";
      } else {
        feedbackEl.textContent = "Not quite. " + (currentQ.explanation || "");
        feedbackEl.className = "feedback feedback--incorrect";
      }
    }

    function finishQuiz() {
      const questions = getQuestionsForCurrent();
      if (!questions.length) return;

      let correct = 0;
      let answered = 0;

      userAnswers.forEach((ans) => {
        if (ans && ans.selected != null) {
          answered++;
          if (ans.correct) correct++;
        }
      });

      const total = questions.length;
      const percent = total > 0 ? Math.round((correct / total) * 100) : 0;

      quizFinished = true;

      // Main score display
      if (resultScoreMain) {
        resultScoreMain.textContent = correct + " / " + total;
      }
      if (resultScoreText) {
        resultScoreText.textContent = "Score: " + percent + "%";
      }

      // Build Review Mistakes list with explanations
      if (mistakeListEl) {
        mistakeListEl.innerHTML = "";

        questions.forEach((q, index) => {
          const ans = userAnswers[index];
          const selected = ans ? ans.selected : null;
          const isCorrect = ans ? ans.correct : false;

          // Skip items that were answered correctly
          if (isCorrect) return;

          const item = document.createElement("div");
          item.className = "mistake-item";

          const title = document.createElement("p");
          title.className = "mistake-q-title";
          title.textContent = "Question " + (index + 1);
          item.appendChild(title);

          const qText = document.createElement("p");
          qText.className = "mistake-q-text";
          qText.textContent = q.question;
          item.appendChild(qText);

          const answersWrap = document.createElement("div");
          answersWrap.className = "mistake-answers";

          // Your answer
          const userP = document.createElement("p");
          userP.classList.add("wrong");
          userP.innerHTML = "<span class='label'>✗ Your answer:</span> " + (selected !== null && selected !== undefined ? selected : "<em>Not answered</em>");
          answersWrap.appendChild(userP);

          // Correct answer
          const correctP = document.createElement("p");
          correctP.classList.add("correct");
          correctP.innerHTML = "<span class='label'>✓ Correct answer:</span> " + q.answer;
          answersWrap.appendChild(correctP);

          // Explanation
          const explP = document.createElement("p");
          explP.classList.add("explanation");
          explP.innerHTML = "<span class='label'>👉 Why:</span> " + (q.explanation && q.explanation.trim().length ? q.explanation : "No explanation available.");
          answersWrap.appendChild(explP);

          item.appendChild(answersWrap);
          mistakeListEl.appendChild(item);
        });

        // If no mistakes
        if (!mistakeListEl.children.length) {
          const p = document.createElement("p");
          p.textContent = "Perfect score! No mistakes to review.";
          mistakeListEl.appendChild(p);
        }
      }

      // Show result panel, hide quiz card
      if (quizHeaderEl) quizHeaderEl.classList.add("hidden");
      if (quizCardEl) quizCardEl.classList.add("hidden");
      if (resultPanelEl) resultPanelEl.classList.remove("hidden");
    }

    function switchMode(mode) {
      currentMode = mode;

      modeTabs.forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.mode === mode);
      });

      if (mode === "study") {
        studyView.classList.add("view--active");
        practiceView.classList.remove("view--active");
      } else {
        practiceView.classList.add("view--active");
        studyView.classList.remove("view--active");
      }
    }

    function selectTopic(topicId) {
      currentTopicId = topicId;
      resetQuizState();
      updateActiveTopicPill();
      renderLesson();
      renderQuiz();
    }

    function attachEvents() {
      modeTabs.forEach((tab) => {
        tab.addEventListener("click", function () {
          const mode = tab.dataset.mode;
          if (mode && mode !== currentMode) {
            switchMode(mode);
          }
        });
      });

      levelChips.forEach((chip) => {
        chip.addEventListener("click", function () {
          const level = chip.dataset.level;
          if (!level || level === currentLevel) return;
          
          if (LOCKED_LEVELS.includes(level) && !IS_PRO_USER) {
            alert("This level is locked for free users. Upgrade to Pro to access advanced and expert levels.");
            return;
          }
          
          currentLevel = level;
          resetQuizState();
          levelChips.forEach((c) => {
            c.classList.toggle("active", c.dataset.level === level);
          });
          renderQuiz();
        });
      });

      itemChips.forEach((chip) => {
        chip.addEventListener("click", function () {
          const count = parseInt(chip.dataset.count, 10);
          if (!count || count === currentItemCount) return;

          currentItemCount = count;
          resetQuizState();

          itemChips.forEach((c) => {
            c.classList.toggle("active", c === chip);
          });

          renderQuiz();
        });
      });

      prevBtn.addEventListener("click", function () {
        const questions = getQuestionsForCurrent();
        if (!questions.length) return;
        if (currentIndex > 0) {
          currentIndex -= 1;
          renderQuiz();
        }
      });

      nextBtn.addEventListener("click", function () {
        const questions = getQuestionsForCurrent();
        if (!questions.length) return;

        if (currentIndex < questions.length - 1) {
          currentIndex += 1;
          renderQuiz();
        } else {
          finishQuiz();
        }
      });

      if (resultRetryBtn) {
        resultRetryBtn.addEventListener("click", function () {
          resetQuizState();
          renderQuiz();
          switchMode("practice");
        });
      }

      if (resultHomeBtn) {
        resultHomeBtn.addEventListener("click", function () {
          window.location.href = "index.html";
        });
      }
    }

    function initVerbalPage() {
      buildTopicsList();
      attachEvents();
      selectTopic(currentTopicId);
      switchMode("study");
    }

    // Initialize when page loads
    document.addEventListener('DOMContentLoaded', initVerbalPage);
  </script>
</body>
</html>
