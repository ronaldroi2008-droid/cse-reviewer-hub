      <section class="lesson-section">
        <h2>1. What is a preposition?</h2>
        <p>A preposition is a small word that shows the relationship between another word in the sentence and its object. It almost always has an <strong>object</strong> (usually a noun, pronoun, or gerund).</p>
        <p>It often shows relationships of:</p>
        <ul>
          <li><strong>Time</strong> (when?)</li>

        <h2>2. Prepositions Cheat Sheet</h2>
        <h3>A. Place (Where?)</h3>

        <h3>B. Time (When?)</h3>
        <p><em>at, on, in, by, before, after, during, until, since, for.</em></p>
        
        <h3>C. Direction (Where to?)</h3>
        <p><em>to, into, onto, towards, through, across, along, over, past.</em></p>
        
        <h3>D. Other Groups</h3>
        <ul>
          <li><strong>Reason:</strong> for, because of, due to</li>

          <li><strong>Topic:</strong> about, regarding, concerning</li>
        </ul>

      <section class="lesson-section">
        <h2>3. AT, ON, IN (The "Big Three")</h2>
        
        <h3>3A. Time Rules</h3>
        <table class="lesson-table">
          <tr>
            <th>Preposition</th>
            <th>Usage</th>

          </tr>

            <td>Days & Dates</td>

          </tr>
          <tr>
            <td><strong>IN</strong></td>

        <h3>3B. Place Rules</h3>
        <table class="lesson-table">

      <section class="lesson-section">
        <h2>4. SINCE vs. FOR</h2>
        <p>This is a very common exam topic regarding the <strong>Present Perfect Tense</strong>.</p>
        <ul>
          <li><strong>FOR</strong> (Duration): Shows <em>how long</em>. <br>

      <section class="lesson-section">
        <h2>7. Direction & Movement</h2>
        <ul>

      </section>

      <section class="lesson-section">
        <h2>8. BETWEEN vs. AMONG</h2>
        <ul>
          <li><strong>BETWEEN:</strong> Usually for <strong>TWO</strong> items or distinct individuals.<br>
          <em>"Between you and me." "Between the three distinct buildings."</em></li>
          
          <li><strong>AMONG:</strong> For a group where individuals are not separated.<br>
          <em>"Among friends." "Among the trees."</em></li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>9. Common Combinations (Collocations)</h2>
        <p>Exams test which preposition naturally pairs with a verb or adjective.</p>
        
        <h3>Verb + Preposition</h3>
        <ul class="two-column-list">
          <li>Depend <strong>on</strong></li>
          <li>Listen <strong>to</strong></li>
          <li>Wait <strong>for</strong></li>
          <li>Apologize <strong>for</strong></li>
          <li>Belong <strong>to</strong></li>
          <li>Suffer <strong>from</strong></li>
          <li>Look <strong>at</strong> (see)</li>
          <li>Look <strong>for</strong> (search)</li>
          <li>Look <strong>after</strong> (care)</li>
        </ul>
        <p>❌ <em>I will wait you.</em> → ✅ <em>I will wait <strong>for</strong> you.</em></p>

        <h3>Adjective + Preposition</h3>
        <ul class="two-column-list">

          <li>Different <strong>from</strong> (Not 'than')</li>

      </section>

      <section class="lesson-section">
        <h2>10. The Gerund Rule</h2>
        <p>If you put a verb after a preposition, it MUST be in the <strong>-ING</strong> form (Gerund).</p>

        <h2>11. Common Filipino/Exam Errors</h2>
        <ol>
          <li><strong>No Prep before Next/Last/This:</strong><br>

      <section class="lesson-section">
        <h2>1. What Are Antonyms?</h2>
        <p>
          <strong>Antonyms</strong> are words that have opposite meanings. The word comes from the Greek words
          <em>anti</em> (against) and <em>onym</em> (name).
        </p>
        <p>
          Mastering antonyms is not just about memorizing "Hot vs. Cold." In the Civil Service Exam,

      <section class="lesson-section">
        <h2>2. The Three Types of Antonyms</h2>
        <p>Understanding these types helps you eliminate wrong answers in difficult questions.</p>

        <h3>2.1 Gradable Antonyms (The Scale)</h3>
        <p>
          These are opposites that exist on a spectrum or scale. You can be "a little bit" of one or the other.
        </p>
        <ul>
          <li><strong>Hot</strong> vs. <strong>Cold</strong> (In between: Warm, Cool)</li>
          <li><strong>Fat</strong> vs. <strong>Thin</strong> (In between: Chubby, Slim)</li>
          <li><strong>Happy</strong> vs. <strong>Sad</strong></li>
        </ul>

        <h3>2.2 Complementary Antonyms (Binary)</h3>
        <p>
          These are "all or nothing." If you are one, you cannot be the other. There is no middle ground.
        </p>
        <ul>
          <li><strong>Dead</strong> vs. <strong>Alive</strong> (You cannot be "a little dead")</li>
          <li><strong>On</strong> vs. <strong>Off</strong></li>
          <li><strong>Pass</strong> vs. <strong>Fail</strong></li>

            </ul>
          </li>
          <li>
            <strong>Use Positive/Negative Charge:</strong>
            If the main word is <strong>Positive</strong> (e.g., <em>Benevolent</em>), the antonym must be <strong>Negative</strong> (e.g., <em>Cruel</em>). Eliminate the positive choices.

      <section class="lesson-section">
        <h2>6. Common Antonym List (Reviewer)</h2>

analogy: {
    title: "Analogy – Word Relationships and Logic",
    level: "Verbal Ability",
    fullHtml: `
      <section class="lesson-section">
        <h2>1. What is an Analogy?</h2>
        <p>
          An analogy tests your ability to identify the <strong>relationship</strong> between two words and apply that same logic to another pair.
        </p>
        <div class="highlight-box">
          <p><strong>The Format:</strong></p>
          <p style="font-size: 1.2em; text-align: center;"><strong>A : B :: C : D</strong></p>
          <p>This is read as: <em>"A is to B as C is to D."</em></p>
        </div>
        <p><strong>Example:</strong></p>
        <p><em>Finger : Hand :: Leaf : Tree</em></p>
        <p>
          <strong>Logic:</strong> A finger is a <strong>part of</strong> a hand, just as a leaf is a <strong>part of</strong> a tree.
        </p>
      </section>

      <section class="lesson-section">
        <h2>2. The "Bridge Sentence" Technique</h2>
        <p>
          The best way to solve analogies is to create a specific sentence that connects the first two words. This sentence is your <strong>"Bridge."</strong>
        </p>
        <p><strong>Step 1:</strong> Create a sentence for the first pair.</p>
        <ul>
          <li><strong>Pair:</strong> <em>Carpenter : Saw</em></li>
          <li><strong>Bridge Sentence:</strong> "A carpenter <strong>uses a</strong> saw to do his job."</li>
        </ul>
        <p><strong>Step 2:</strong> Test the choices with the SAME sentence.</p>
        <ul>
          <li><strong>Choice A (Painter : Brush):</strong> "A painter <strong>uses a</strong> brush to do his job." (✅ Correct)</li>
          <li><strong>Choice B (Lawyer : Briefcase):</strong> "A lawyer <strong>uses a</strong> briefcase to do his job?" (❌ Weak connection)</li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>3. Common Types of Relationships</h2>
        <p>In the Civil Service Exam, these are the most frequent patterns you will encounter:</p>

        <table class="lesson-table">
          <thead>
            <tr>
              <th>Relationship</th>
              <th>Example A : B</th>
              <th>Bridge / Logic</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>Synonyms</strong></td>
              <td><em>Big : Huge</em></td>
              <td>Means the same thing (Intensity usually increases).</td>
            </tr>
            <tr>
              <td><strong>Antonyms</strong></td>
              <td><em>Hot : Cold</em></td>
              <td>Opposite meanings.</td>
            </tr>
            <tr>
              <td><strong>Part to Whole</strong></td>
              <td><em>Wheel : Car</em></td>
              <td>A wheel is a <strong>part of</strong> a car.</td>
            </tr>
            <tr>
              <td><strong>Worker & Tool</strong></td>
              <td><em>Chef : Knife</em></td>
              <td>A chef <strong>uses a</strong> knife.</td>
            </tr>
            <tr>
              <td><strong>Worker & Product</strong></td>
              <td><em>Baker : Bread</em></td>
              <td>A baker <strong>makes</strong> bread.</td>
            </tr>
            <tr>
              <td><strong>Animal & Young</strong></td>
              <td><em>Cat : Kitten</em></td>
              <td>A kitten is a <strong>baby</strong> cat.</td>
            </tr>
            <tr>
              <td><strong>Animal & Sound</strong></td>
              <td><em>Dog : Bark</em></td>
              <td>A dog <strong>makes the sound</strong> bark.</td>
            </tr>
            <tr>
              <td><strong>Cause & Effect</strong></td>
              <td><em>Virus : Illness</em></td>
              <td>A virus <strong>causes</strong> illness.</td>
            </tr>
            <tr>
              <td><strong>Degree (Intensity)</strong></td>
              <td><em>Warm : Hot</em></td>
              <td>Hot is an <strong>extreme version</strong> of warm.</td>
            </tr>
            <tr>
              <td><strong>Function</strong></td>
              <td><em>Pen : Write</em></td>
              <td>A pen is used <strong>to</strong> write.</td>
            </tr>
             <tr>
              <td><strong>Geography</strong></td>
              <td><em>Manila : Philippines</em></td>
              <td>Manila is the <strong>capital of</strong> the Philippines.</td>
            </tr>
          </tbody>
        </table>
      </section>

      <section class="lesson-section">
        <h2>4. Advanced Tips & Traps</h2>

        <h3>4.1 Watch the Order!</h3>
        <p>
          The order of the words must be exactly the same.
        </p>
        <p><strong>Question:</strong> <em>Shoe : Foot :: ________ : ________</em></p>
        <p><strong>Bridge:</strong> A shoe is worn on the foot. (Item → Body Part)</p>
        <ul>
          <li>❌ <em>Hand : Glove</em> (This is Body Part → Item. <strong>Wrong order!</strong>)</li>
          <li>✅ <em>Glove : Hand</em> (Item → Body Part. <strong>Correct!</strong>)</li>
        </ul>

        <h3>4.2 Parts of Speech Must Match</h3>
        <p>
          If the first pair is <strong>Noun : Adjective</strong>, the answer must be <strong>Noun : Adjective</strong>.
        </p>
        <ul>
          <li><strong>Example:</strong> <em>Fox : Sly</em> (Noun : Adjective)</li>
          <li>❌ <em>Speed : Fast</em> (Noun : Adjective? Maybe, but "Speed" is usually a noun/verb)</li>
          <li>✅ <em>Ant : Industrious</em> (Noun : Adjective describing a characteristic)</li>
        </ul>

        <h3>4.3 "Nuance" or Degree</h3>
        <p>
          Sometimes two answers look correct. Choose the one with the closest "degree" or intensity.
        </p>
        <p><strong>Question:</strong> <em>Good : Excellent :: Bad : ________</em></p>
        <ul>
          <li>Choice A: <em>Naughty</em> (Too weak)</li>
          <li>Choice B: <em>Terrible</em> (Correct strength)</li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>5. Quick Practice Patterns</h2>
        <ul class="check-list">
          <li><strong>Odometer : Mileage</strong> :: Compass : Direction (Instrument : Measures)</li>
          <li><strong>Scissor : Cut</strong> :: Broom : Sweep (Tool : Action)</li>
          <li><strong>Lion : Pride</strong> :: Wolf : Pack (Animal : Group/Collective Noun)</li>
          <li><strong>Fire : Smoke</strong> :: Rain : Flood (Cause : Effect)</li>
        </ul>
      </section>
    `
  },

      <section class="lesson-section">
        <h2>1. What is Paragraph Organization?</h2>
        <p>
          In this test, you are presented with 4 to 6 sentences that are <strong>jumbled</strong> (scrambled).
          Your task is to arrange them in the correct logical order to form a coherent paragraph.
        </p>
        <div class="highlight-box">
          <p><strong>The Goal:</strong> Find the sequence that makes sense.</p>
          <p>It usually follows a structure:</p>
          <ol>
            <li><strong>Topic Sentence</strong> (Introduction / Main Idea)</li>
            <li><strong>Supporting Sentences</strong> (Details / Examples / Explanation)</li>
            <li><strong>Concluding Sentence</strong> (Summary / Result / Closing)</li>
          </ol>
        </div>
      </section>

      <section class="lesson-section">
        <h2>2. Strategy 1: Find the "Topic Sentence" (The Lead)</h2>
        <p>
          The most effective way to start is to find the <strong>First Sentence</strong>.
          The first sentence must be <strong>independent</strong>—it does not depend on previous sentences to be understood.
        </p>

        <h3>❌ Signs a sentence is NOT First:</h3>
        <ul class="check-list">
          <li><strong>Pronouns without Antecedents:</strong> Sentences starting with <em>He, She, It, They, These, Those</em> usually refer to a noun mentioned earlier.</li>
          <li><strong>Transition Words:</strong> Sentences starting with <em>However, Therefore, Also, Furthermore, Consequently</em> usually connect to a previous idea.</li>
          <li><strong>Specific Details:</strong> Sentences that give specific data or examples usually come after a general statement.</li>
        </ul>

        <h3>✅ Signs a sentence IS First:</h3>
        <ul class="check-list">
          <li><strong>Full Names:</strong> Uses the full name of a person or subject (e.g., "Dr. Jose Rizal" instead of "He").</li>
          <li><strong>General Statements:</strong> Introduces a broad topic (e.g., "Climate change is a global crisis.").</li>
          <li><strong>Setting the Scene:</strong> Establishes time and place.</li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>3. Strategy 2: Spot the "Signal Words"</h2>

        </p>

            <tr>
              <th>Type</th>
              <th>Keywords</th>
              <th>Function</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>Chronology</strong></td>
              <td>First, Second, Next, Then, Finally, Afterward</td>
              <td>Arranges events in time order.</td>
            </tr>
            <tr>
              <td><strong>Addition</strong></td>
              <td>Also, Moreover, Furthermore, In addition, And</td>
              <td>Adds related information.</td>
            </tr>
            <tr>
              <td><strong>Contrast</strong></td>
              <td>But, However, Yet, On the other hand, Although</td>
              <td>Introduces an opposing idea.</td>
            </tr>
            <tr>
              <td><strong>Result</strong></td>
              <td>Therefore, Thus, Hence, As a result, Consequently</td>
              <td>Shows the effect of a previous action.</td>
            </tr>
            <tr>
              <td><strong>Example</strong></td>
              <td>For example, For instance, Such as</td>
              <td>Provides proof for a general statement.</td>
            </tr>
          </tbody>
        </table>
      </section>

      <section class="lesson-section">
        <h2>4. Strategy 3: The Noun-Pronoun Rule</h2>
        <p>
          In English, we introduce the <strong>Noun</strong> first, then use the <strong>Pronoun</strong> later.

        <div class="highlight-box">
          <p><strong>Sentence A:</strong> <em><strong>It</strong> is very nutritious.</em></p>
          <p><strong>Sentence B:</strong> <em>An <strong>apple</strong> is a popular fruit.</em></p>
          <p><strong>Logic:</strong> B must come before A. We must know what "It" is.</p>

      <section class="lesson-section">
        <h2>5. Strategy 4: General to Specific</h2>
        <p>
          Paragraphs usually flow like an inverted pyramid:
        </p>

      <section class="lesson-section">
        <h2>6. Step-by-Step Walkthrough</h2>
        <p><strong>Arrange these sentences:</strong></p>
        <ol type="A">

        <h3>Analysis:</h3>

          <li>

            <ul>
              <li>(A) starts with "Consequently" (Result).</li>

        <h2>7. Quick Tips for the Exam</h2>

reading_comprehension: {
    title: "Reading Comprehension – The Art of Active Reading",
    level: "Verbal Ability",
    fullHtml: `
      <section class="lesson-section">
        <h2>1. The Golden Rule</h2>
        <div class="highlight-box">
          <p><strong>"If it is not in the text, it does not exist."</strong></p>
        </div>
        <p>
          In the Civil Service Exam, do not use your <em>stock knowledge</em> or personal opinion.
          The correct answer must always be found in or proven by the text provided.
          Even if a statement is factually true in real life, if it is not mentioned in the passage, it is <strong>INCORRECT</strong> as an answer.
        </p>
      </section>

      <section class="lesson-section">
        <h2>2. The Strategy: Don't Read Everything First!</h2>
        <p>Many examinees waste time reading the entire story immediately, only to forget the details when they reach the questions.</p>
        <p><strong>Use this efficient strategy:</strong></p>
        <ol>
          <li><strong>Read the Questions First:</strong> Skip the passage initially. Read the questions to know what you are looking for (Is it the Main Idea? A specific date? The meaning of a word?).</li>
          <li><strong>Scan for Keywords:</strong> Once you know the question, scan the text for specific keywords.</li>
          <li><strong>Read the Context:</strong> Read the sentence containing the keyword, plus the sentence before and after it.</li>
        </ol>
      </section>

      <section class="lesson-section">
        <h2>3. Five Common Types of Questions</h2>

        <h3>A. Main Idea / Best Title</h3>
        <p>This asks for the summary of the whole text.</p>
        <ul>
          <li><strong>Technique:</strong> Read the <strong>First Sentence</strong> and the <strong>Last Sentence</strong> of the passage. The main idea is usually located there.</li>
          <li><strong>Trap:</strong> Avoid choices that are <em>Too Broad</em> (covers too much) or <em>Too Narrow</em> (focuses on just one small detail).</li>
        </ul>

        <h3>B. Specific Detail</h3>
        <p>Asks for facts: <em>Who, What, Where, When</em>.</p>
        <ul>
          <li><strong>Technique:</strong> Scanning. Locate the specific word in the passage and verify the answer directly.</li>
        </ul>

        <h3>C. Vocabulary in Context</h3>
        <p>Asks for the meaning of a word based on how it is used.</p>
        <ul>
          <li><strong>Technique:</strong> Do not rely solely on the dictionary definition. Look at <strong>Context Clues</strong> (surrounding words).</li>
          <li><em>Example:</em> "She felt <strong>famished</strong>, so she ate three burgers." (Clue: 'ate three burgers' → Famished means hungry).</li>
        </ul>

        <h3>D. Inference (Conclusion)</h3>
        <p>The answer is not explicitly written, but it is a logical conclusion based on evidence.</p>
        <ul>
          <li><strong>Technique:</strong> Look for clues. <em>Example:</em> "John is soaking wet and holding a dripping umbrella." → Inference: It is raining outside.</li>
        </ul>

        <h3>E. Tone / Attitude</h3>
        <p>What is the author's emotion? (Angry, Objective, Sarcastic, Optimistic)</p>
        <ul>
          <li><strong>Technique:</strong> Look at the adjectives used (e.g., "disastrous," "magnificent," "regrettable").</li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>4. How to Spot Wrong Answers (Process of Elimination)</h2>
        <p>Usually, there are 4 choices. 2 are obviously wrong. The real battle is between the remaining 2.</p>

        <table class="lesson-table">
          <thead>
            <tr>
              <th>Type of Trap</th>
              <th>Explanation</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>Too Extreme</strong></td>
              <td>Avoid choices using words like <em>Always, Never, All, None, Only</em>. These are rarely correct. Safer words are <em>Often, Some, Many, Usually</em>.</td>
            </tr>
            <tr>
              <td><strong>Not Mentioned</strong></td>
              <td>The statement looks correct based on real-world facts, but it is <strong>not</strong> in the text.</td>
            </tr>
            <tr>
              <td><strong>Rotten Apple</strong></td>
              <td>The first half of the sentence is correct, but the second half is wrong. A small error makes the whole choice wrong.</td>
            </tr>
            <tr>
              <td><strong>Verbatim Trap</strong></td>
              <td>The choice copies a sentence from the text <strong>word-for-word</strong>, but it does not answer the specific question asked. It is just a distractor.</td>
            </tr>
          </tbody>
        </table>
      </section>

      <section class="lesson-section">
        <h2>5. Context Clues Types</h2>
        <p>How to guess the meaning of a difficult word:</p>
        <ul>
          <li><strong>Synonym:</strong> "The <em>blandishments</em>, or <strong>flattery</strong>, of the salesman..." (Blandishment = Flattery).</li>
          <li><strong>Antonym:</strong> "Unlike his <em>gregarious</em> brother, Tom is <strong>shy</strong>." (Gregarious ≠ Shy → Friendly/Outgoing).</li>
          <li><strong>Example:</strong> "Furniture, such as <em>tables and chairs</em>..."</li>
        </ul>
      </section>

      <section class="lesson-section">
        <h2>6. Quick Exam Walkthrough</h2>
        <p><strong>Passage:</strong></p>
        <p><em>"Dolphins are regarded as the friendliest creatures in the sea. Stories of them helping drowning sailors have been common since Roman times. The more we learn about dolphins, the more we realize that their society is more complex than people previously imagined. They look after other dolphins when they are ill, care for pregnant mothers, and protect the weakest in the community, as we do."</em></p>

        <p><strong>Q: What is the main idea of the passage?</strong></p>
        <ul>
          <li>A. Dolphins save sailors. (<strong>Too Narrow</strong> - this is just one detail)</li>
          <li>B. Dolphins are fish. (<strong>False</strong> - Not mentioned and factually wrong)</li>
          <li>C. Dolphins have complex social behavior similar to humans. (<strong>Correct</strong> - sums up the care, protection, and society mentioned)</li>
          <li>D. Roman times were dangerous. (<strong>Not Mentioned/Irrelevant</strong>)</li>
        </ul>
      </section>
    `

      <section class="lesson-section">
        <h2>1. What Are Synonyms?</h2>
        <p><strong>Synonyms</strong> are words that have the same or nearly the same meaning. For example, <em>big</em> and <em>large</em>, or <em>start</em> and <em>begin</em>.</p>

      </section>

      <section class="lesson-section">
        <h2>2. Strategies for Synonym Questions</h2>
        <p>In the Civil Service Exam, you are often given a sentence with an underlined word and asked to find the synonym. Here is how to solve it:</p>
        
        <h3>2.1 Use Context Clues</h3>
        <p>Read the whole sentence! The meaning depends on how the word is used.</p>

        </ul>

        <h3>2.3 Positive or Negative Charge</h3>
        <p>Determine if the word is positive, negative, or neutral. Eliminate choices that don't match.</p>
        <p><em>"The <strong>hostile</strong> crowd shouted."</em> (Negative) → Choices: <em>Friendly</em> (Positive - remove), <em>Kind</em> (Positive - remove), <em>Aggressive</em> (Negative - KEEP).</p>
      </section>

      <section class="lesson-section">
        <h2>3. Common Synonym Sets to Study</h2>
        <table class="lesson-table">
          <thead>
            <tr>
              <th>Word</th>
              <th>Synonyms</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>Important</strong></td>
              <td>Crucial, Vital, Essential, Significant</td>
            </tr>
            <tr>
              <td><strong>Happy</strong></td>
              <td>Elated, Joyful, Content, Delighted</td>
            </tr>
            <tr>
              <td><strong>Sad</strong></td>
              <td>Gloomy, Melancholy, Sorrowful, Dejected</td>
            </tr>
            <tr>
              <td><strong>Strong</strong></td>
              <td>Robust, Sturdy, Powerful, Potent</td>
            </tr>
            <tr>
              <td><strong>Weak</strong></td>
              <td>Frail, Feeble, Fragile, Vulnerable</td>
            </tr>
             <tr>
              <td><strong>Change</strong></td>
              <td>Alter, Modify, Transform, Evolve</td>
            </tr>
          </tbody>
        </table>
      </section>

      <section class="lesson-section">
        <h2>4. Exam Tip: "Near Synonyms"</h2>
        <p>Sometimes, no word is an <em>exact</em> match. You must choose the <strong>closest</strong> option.</p>
        <p><strong>Q:</strong> Synonym for <em>"Start"</em>?</p>
        <p><strong>Choices:</strong> <em>Create, Initiate, Make, Born</em></p>
        <p><strong>Answer:</strong> <em>Initiate</em> is the closest to "Start" in a formal context, even if "Create" is similar.</p>
     </section>
    `
  } 
}; 


    // ==========================================
    // 2. STATE + DOM REFERENCES
    // ==========================================

    let currentMode = "study";
    let currentTopicId = VERBAL_TOPICS[0]?.id || "analogy";
    let currentLevel = "beginner";
    let currentIndex = 0;
    let currentQuestionLimit = 10; // default 10 items per quiz

    const modeTabs = document.querySelectorAll(".mode-tab");
    const topicListEl = document.getElementById("topicList");
    const subtitleTopicEl = document.getElementById("subtitleTopic");

    const studyView = document.getElementById("studyView");
    const practiceView = document.getElementById("practiceView");

    const lessonTitleEl = document.getElementById("lessonTitle");
    const lessonIntroEl = document.getElementById("lessonIntro");
    const lessonBodyEl = document.getElementById("lessonBody");
    const tipCardEl = document.getElementById("tipCard");

    const quizTopicTitleEl = document.getElementById("quizTopicTitle");
    const quizLevelLabelEl = document.getElementById("quizLevelLabel");
    const questionTextEl = document.getElementById("questionText");
    const optionsListEl = document.getElementById("optionsList");
    const feedbackEl = document.getElementById("feedback");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const progressTextEl = document.getElementById("progressText");
    const levelChips = document.querySelectorAll(".level-chip");
    const countChips = document.querySelectorAll(".count-chip");

    // ==========================================
    // 3. HELPERS
    // ==========================================

    function capitalize(text) {
      if (!text) return "";
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function buildTopicsList() {
      topicListEl.innerHTML = "";
      VERBAL_TOPICS.forEach((topic) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "topic-pill";
        btn.dataset.topicId = topic.id;

        const labelSpan = document.createElement("span");
        labelSpan.className = "label";
        labelSpan.textContent = topic.label;

        const tagSpan = document.createElement("span");
        tagSpan.className = "tag";
        tagSpan.textContent = topic.tag || "Topic";

        btn.appendChild(labelSpan);
        btn.appendChild(tagSpan);

        btn.addEventListener("click", function () {
          selectTopic(topic.id);
        });

        topicListEl.appendChild(btn);
      });
    }

    function updateActiveTopicPill() {
      const pills = topicListEl.querySelectorAll(".topic-pill");
      pills.forEach((pill) => {
        const isActive = pill.dataset.topicId === currentTopicId;
        pill.classList.toggle("active", isActive);
      });

      const topic = VERBAL_TOPICS.find((t) => t.id === currentTopicId);
      if (topic && subtitleTopicEl) {
        subtitleTopicEl.textContent = topic.label;
      }
    }

    function renderTips(tips) {
      if (!tipCardEl) return;
      tipCardEl.innerHTML = "";

      const heading = document.createElement("h3");
      heading.textContent = "Quick exam tips";
      tipCardEl.appendChild(heading);

      const list = document.createElement("ul");
      (tips || []).forEach((tip) => {
        const li = document.createElement("li");
        li.textContent = tip;
        list.appendChild(li);
      });

      tipCardEl.appendChild(list);
    }

    function renderLesson() {
      const fallbackSection = {
        heading: "Overview",
        bullets: [
          "Review the basic definition and key rules for this topic.",
          "Study one or two fully worked examples step by step.",
          "Practice converting questions into simpler sentences you can analyze."
        ]
      };

      const fallbackTips = [
        "Underline keywords in every question.",
        "Eliminate obviously wrong options before choosing.",
        "If unsure, choose the option that best matches the core idea."
      ];

      const lesson = LESSONS[currentTopicId];

      if (!lesson) {
        lessonTitleEl.textContent = "Lesson coming soon";
        lessonIntroEl.textContent =
          "We are still building the full lesson notes for this topic. For now, focus on practice questions and your own notes.";
        lessonBodyEl.innerHTML = "";

        const sectionEl = document.createElement("section");
        const h3 = document.createElement("h3");
        h3.textContent = fallbackSection.heading;
        sectionEl.appendChild(h3);

        const ul = document.createElement("ul");
        fallbackSection.bullets.forEach((b) => {
          const li = document.createElement("li");
          li.textContent = b;
          ul.appendChild(li);
        });
        sectionEl.appendChild(ul);

        lessonBodyEl.appendChild(sectionEl);
        renderTips(fallbackTips);
        return;
      }

      lessonTitleEl.textContent = lesson.title || "Lesson";
      lessonIntroEl.textContent = lesson.intro || "";
      lessonBodyEl.innerHTML = "";

      // 1) Full rich HTML (Analogy)
      if (lesson.fullHtml) {
        lessonBodyEl.innerHTML = lesson.fullHtml;
      }
      // 2) Sections + bullets (Synonyms etc.)
      else if (lesson.sections && lesson.sections.length) {
        lesson.sections.forEach((section) => {
          const sectionEl = document.createElement("section");
          const h3 = document.createElement("h3");
          h3.textContent = section.heading;
          sectionEl.appendChild(h3);

          const ul = document.createElement("ul");
          (section.bullets || []).forEach((b) => {
            const li = document.createElement("li");
            li.textContent = b;
            ul.appendChild(li);
          });

          sectionEl.appendChild(ul);
          lessonBodyEl.appendChild(sectionEl);
        });
      }
      // 3) Fallback
      else {
        const sectionEl = document.createElement("section");
        const h3 = document.createElement("h3");
        h3.textContent = fallbackSection.heading;
        sectionEl.appendChild(h3);

        const ul = document.createElement("ul");
        fallbackSection.bullets.forEach((b) => {
          const li = document.createElement("li");
          li.textContent = b;
          ul.appendChild(li);
        });
        sectionEl.appendChild(ul);

        lessonBodyEl.appendChild(sectionEl);
      }

      renderTips(lesson.tips || fallbackTips);
    }

    function getQuestionsForCurrent() {
      const bank = window.VERBAL_QUESTION_BANK || {};
      const topicSet = bank[currentTopicId] || {};
      const levelQuestions = topicSet[currentLevel] || [];
      const limit = Math.min(currentQuestionLimit, levelQuestions.length);
      return levelQuestions.slice(0, limit);
    }

    function renderQuiz() {
      const topic = VERBAL_TOPICS.find((t) => t.id === currentTopicId);
      quizTopicTitleEl.textContent = topic
        ? "Verbal · " + topic.label
        : "Verbal Ability";
      quizLevelLabelEl.textContent = capitalize(currentLevel);

      const questions = getQuestionsForCurrent();
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";

      if (!questions.length) {
        questionTextEl.textContent =
          "No practice questions are available yet for this topic and level. They will be added soon.";
        optionsListEl.innerHTML = "";
        progressTextEl.textContent = "0 / 0";
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        return;
      }

      if (currentIndex < 0) currentIndex = 0;
      if (currentIndex >= questions.length) currentIndex = questions.length - 1;

      const currentQ = questions[currentIndex];
      questionTextEl.textContent = currentQ.question;
      optionsListEl.innerHTML = "";

      (currentQ.options || []).forEach((option) => {
        const li = document.createElement("li");
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "option-button";
        btn.textContent = option;

        btn.addEventListener("click", function () {
          handleAnswer(option);
        });

        li.appendChild(btn);
        optionsListEl.appendChild(li);
      });

      progressTextEl.textContent =
        "Question " + (currentIndex + 1) + " of " + questions.length;

      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === questions.length - 1;
    }

    function handleAnswer(selectedOption) {
      const questions = getQuestionsForCurrent();
      if (!questions.length) return;
      const currentQ = questions[currentIndex];

      const isCorrect = selectedOption === currentQ.answer;

      const buttons = optionsListEl.querySelectorAll(".option-button");
      buttons.forEach((btn) => {
        btn.classList.remove("is-correct", "is-incorrect");
        if (btn.textContent === currentQ.answer) {
          btn.classList.add("is-correct");
        }
        if (btn.textContent === selectedOption && !isCorrect) {
          btn.classList.add("is-incorrect");
        }
      });

      if (isCorrect) {
        feedbackEl.textContent = "Correct! " + (currentQ.explanation || "");
        feedbackEl.className = "feedback feedback--correct";
      } else {
        feedbackEl.textContent = "Not quite. " + (currentQ.explanation || "");
        feedbackEl.className = "feedback feedback--incorrect";
      }
    }

    function switchMode(mode) {
      currentMode = mode;

      modeTabs.forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.mode === mode);
      });

      if (mode === "study") {
        studyView.classList.add("view--active");
        practiceView.classList.remove("view--active");
      } else {
        practiceView.classList.add("view--active");
        studyView.classList.remove("view--active");
      }
    }

    function selectTopic(topicId) {
      currentTopicId = topicId;
      currentIndex = 0;
      updateActiveTopicPill();
      renderLesson();
      renderQuiz();
    }

    function attachEvents() {
      modeTabs.forEach((tab) => {
        tab.addEventListener("click", function () {
          const mode = tab.dataset.mode;
          if (mode && mode !== currentMode) {
            switchMode(mode);
          }
        });
      });

      levelChips.forEach((chip) => {
        chip.addEventListener("click", function () {
          const level = chip.dataset.level;
          if (!level || level === currentLevel) return;
          currentLevel = level;
          currentIndex = 0;
          levelChips.forEach((c) => {
            c.classList.toggle("active", c.dataset.level === level);
          });
          renderQuiz();
        });
      });

      countChips.forEach((chip) => {
        chip.addEventListener("click", function () {
          const count = parseInt(chip.dataset.count, 10);
          if (!count || count === currentQuestionLimit) return;

          currentQuestionLimit = count;
          currentIndex = 0;

          countChips.forEach((c) => {
            c.classList.toggle("active", c === chip);
          });

          renderQuiz();
        });
      });

      prevBtn.addEventListener("click", function () {
        const questions = getQuestionsForCurrent();
        if (!questions.length) return;
        if (currentIndex > 0) {
          currentIndex -= 1;
          renderQuiz();
        }
      });

      nextBtn.addEventListener("click", function () {
        const questions = getQuestionsForCurrent();
        if (!questions.length) return;
        if (currentIndex < questions.length - 1) {
          currentIndex += 1;
          renderQuiz();
        }
      });
    }

    function init() {
      buildTopicsList();
      attachEvents();
      selectTopic(currentTopicId);
      switchMode("study");
    }

    init();
  </script>
</body>
</html>
